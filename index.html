        // =====================================================
        // SESSIE-MODUS — Duolingo-stijl card flow
        // =====================================================
        const Session = {
            day: null,
            cards: [],
            idx: 0,
            correct: 0,
            wrong: 0,
            startTime: 0,
            els: {},
            init() {
                this.els.overlay = document.getElementById('sessionOverlay');
                if (!this.els.overlay) return false;
                this.els.body    = document.getElementById('sessionBody');
                this.els.fill    = document.getElementById('sessionProgressFill');
                this.els.hearts  = document.getElementById('sessionHearts');
                this.els.footer  = document.getElementById('sessionFooter');
                this.els.feedback= document.getElementById('sessionFeedback');
                const closeBtn = document.getElementById('sessionClose');
                if (closeBtn && !closeBtn._wired) {
                    closeBtn.addEventListener('click', () => this.exit());
                    closeBtn._wired = true;
                }
                if (!this._keyWired) {
                    this._keyWired = true;
                    document.addEventListener('keydown', (e) => {
                        if (!this.els.overlay || !this.els.overlay.classList.contains('is-open')) return;
                        if (e.key !== 'Enter') return;
                        if (this._feedbackActive) {
                            e.preventDefault();
                            const next = document.getElementById('sesNextBtn');
                            if (next) next.click();
                        }
                    });
                }
                return true;
            },
            ensureReady() {
                if (!this.els.overlay) return this.init();
                return true;
            },
            buildCards(day) {
                const cards = [];
                const inv = (typeof lesInvulOef !== 'undefined' && lesInvulOef[day]) || [];
                const zin = (typeof lesZinOef   !== 'undefined' && lesZinOef[day])   || [];
                inv.forEach(o => cards.push({ type: 'invul', zin: o.zin, blank: o.blank, hint: o.hint }));
                zin.forEach(o => cards.push({ type: 'vert',  nl: o.nl, es: o.es }));
                // simple shuffle so each session feels fresh
                for (let i = cards.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [cards[i], cards[j]] = [cards[j], cards[i]];
                }
                return cards;
            },
            start(day) {
                if (!this.ensureReady()) {
                    console.warn('Session overlay not in DOM yet');
                    return;
                }
                this.day = day;
                this.cards = this.buildCards(day);
                if (!this.cards.length) {
                    alert('Voor deze les zijn nog geen oefenkaarten beschikbaar.');
                    return;
                }
                this.idx = 0; this.correct = 0; this.wrong = 0;
                this.startTime = Date.now();
                this.els.hearts.textContent = '❤️❤️❤️';
                this.els.overlay.classList.add('is-open');
                document.body.style.overflow = 'hidden';
                this.renderCard();
            },
            exit() {
                this.els.overlay.classList.remove('is-open');
                document.body.style.overflow = '';
                this.hideFeedback();
            },
            updateProgress() {
                const pct = (this.idx / this.cards.length) * 100;
                this.els.fill.style.width = pct + '%';
            },
            renderCard() {
                this.updateProgress();
                this.hideFeedback();
                const c = this.cards[this.idx];
                let html = '';
                if (c.type === 'invul') {
                    const zinHTML = String(c.zin).replace('___', '<span class="ses-blank">&nbsp;&nbsp;&nbsp;</span>');
                    html = `
                        <div class="session-card">
                            <span class="ses-tag">Vul aan</span>
                            <p class="ses-prompt">Vul het juiste woord in.</p>
                            <div class="ses-zin">${zinHTML}</div>
                            <input type="text" class="ses-input" id="sesAnswer" placeholder="Typ je antwoord…" autocomplete="off" autocapitalize="off" spellcheck="false">
                            ${c.hint ? `<div class="ses-hint">${c.hint}</div>` : ''}
                        </div>`;
                } else {
                    html = `
                        <div class="session-card">
                            <span class="ses-tag">Vertaal naar het Spaans</span>
                            <p class="ses-prompt">${c.nl}</p>
                            <input type="text" class="ses-input" id="sesAnswer" placeholder="Schrijf je vertaling…" autocomplete="off" autocapitalize="off" spellcheck="false">
                            <div class="ses-hint">Tip: accenten zijn niet verplicht.</div>
                        </div>`;
                }
                this.els.body.innerHTML = html;
                this.els.footer.style.display = 'flex';
                const input = document.getElementById('sesAnswer');
                const btn = document.getElementById('sesCheckBtn');
                btn.disabled = true;
                btn.textContent = 'Controleer';
                input.addEventListener('input', () => { btn.disabled = !input.value.trim(); });
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !btn.disabled) { e.preventDefault(); this.check(); }
                });
                setTimeout(() => input.focus(), 50);
            },
            normalize(s) {
                return String(s || '')
                    .toLowerCase()
                    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                    .replace(/[¿¡!?.,;:"'()]/g, '')
                    .replace(/\s+/g, ' ')
                    .trim();
            },
            check() {
                const c = this.cards[this.idx];
                const input = document.getElementById('sesAnswer');
                const ans = input.value;
                const expected = c.type === 'invul' ? c.blank : c.es;
                const ok = this.normalize(ans) === this.normalize(expected);
                if (ok) this.correct++; else this.wrong++;
                this.showFeedback(ok, expected);
            },
            showFeedback(ok, expected) {
                const fb = this.els.feedback;
                fb.className = 'session-feedback ' + (ok ? 'correct' : 'wrong');
                fb.innerHTML = ok
                    ? `<div class="fb-title">✅ ¡Muy bien!</div>
                       <button class="ses-btn" id="sesNextBtn">Volgende</button>`
                    : `<div class="fb-title">❌ Niet helemaal</div>
                       <div class="fb-answer">Juist antwoord: <strong>${expected}</strong></div>
                       <button class="ses-btn" id="sesNextBtn">Ga door</button>`;
                this.els.footer.style.display = 'none';
                requestAnimationFrame(() => fb.classList.add('visible'));
                const nextBtn = document.getElementById('sesNextBtn');
                nextBtn.addEventListener('click', () => this.next());
                this._feedbackActive = true;
                setTimeout(() => { try { nextBtn.focus(); } catch(e) {} }, 30);
                if (!ok) {
                    const hearts = ['❤️❤️❤️', '❤️❤️🖤', '❤️🖤🖤', '🖤🖤🖤'];
                    this.els.hearts.textContent = hearts[Math.min(this.wrong, 3)];
                }
            },
            hideFeedback() {
                this.els.feedback.classList.remove('visible');
                this._feedbackActive = false;
            },
            next() {
                this.idx++;
                if (this.idx >= this.cards.length) { this.finish(); return; }
                this.renderCard();
            },
            finish() {
                this.updateProgress();
                this.els.fill.style.width = '100%';
                this.hideFeedback();
                this.els.footer.style.display = 'none';
                const total = this.correct + this.wrong;
                const pct = total ? Math.round((this.correct / total) * 100) : 0;
                const seconds = Math.max(1, Math.round((Date.now() - this.startTime) / 1000));
                const xp = Math.max(10, this.correct * 5 + (pct === 100 ? 15 : 0));
                const emoji = pct === 100 ? '🏆' : pct >= 70 ? '🎉' : pct >= 40 ? '💪' : '🌱';
                const titel = pct === 100 ? '¡Perfecto!' : pct >= 70 ? '¡Muy bien!' : pct >= 40 ? '¡Sigue así!' : 'Probeer nog eens!';
                this.els.body.innerHTML = `
                    <div class="session-result">
                        <div class="ses-result-emoji">${emoji}</div>
                        <h2>${titel}</h2>
                        <p style="opacity:0.8;margin:0 0 0.5rem;">Sessie voor Dag ${this.day} klaar.</p>
                        <div class="result-stats">
                            <div class="result-stat"><div class="label">Goed</div><div class="value">${this.correct}/${total}</div></div>
                            <div class="result-stat"><div class="label">XP</div><div class="value">+${xp}</div></div>
                            <div class="result-stat"><div class="label">Tijd</div><div class="value">${seconds}s</div></div>
                        </div>
                        <div style="display:flex;gap:0.6rem;margin-top:1.5rem;flex-wrap:wrap;justify-content:center;">
                            <button class="ses-btn" id="sesAgainBtn" style="background:var(--ochre);color:#fff;padding:0.85rem 1.2rem;border:none;border-radius:12px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 #b3631c;">Nog een keer</button>
                            <button class="ses-btn" id="sesDoneBtn" style="background:var(--terracotta);color:#fff;padding:0.85rem 1.2rem;border:none;border-radius:12px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 #8b271c;">Klaar</button>
                        </div>
                    </div>`;
                document.getElementById('sesAgainBtn').addEventListener('click', () => this.start(this.day));
                document.getElementById('sesDoneBtn').addEventListener('click', () => {
                    try { if (typeof awardXP === 'function') awardXP(xp, 'Sessie Dag ' + this.day); } catch(e) {}
                    if (pct >= 70) {
                        try { if (typeof completedDays !== 'undefined' && !completedDays.has(this.day)) markDayComplete(this.day); } catch(e) {}
                    }
                    try { if (typeof launchConfetti === 'function' && pct === 100) launchConfetti(); } catch(e) {}
                    this.exit();
                });
            }
        };
        function startLessonSession(day) {
            try { Session.start(day); } catch(e) { console.warn('Session start failed:', e); }
        }
        Session.init();

        // =====================================================
        // INLINE INVUL-OEFENINGEN (verweven met de theorie)
        // =====================================================
        function _inlineNorm(s) {
            return String(s || '')
                .toLowerCase()
                .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                .replace(/[¿¡!?.,;:'"()]/g, '')
                .replace(/\s+/g, ' ')
                .trim();
        }
        // Klein feest-effect bij een goed antwoord (zwevende emoji boven het veld)
        function _dcSparkle(el) {
            try {
                const r = el.getBoundingClientRect();
                const emo = ['✨','🎉','⭐','💫','🔥'][Math.floor(Math.random()*5)];
                const s = document.createElement('span');
                s.className = 'dc-sparkle';
                s.textContent = emo;
                s.style.left = (r.left + r.width/2 - 10 + (Math.random()*24-12)) + 'px';
                s.style.top = (r.top - 6) + 'px';
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 950);
            } catch(e) {}
        }
        function checkInlineBlank(input) {
            const expected = input.dataset.answer || '';
            const ok = input.value.trim() && _inlineNorm(input.value) === _inlineNorm(expected);
            input.classList.remove('ok', 'fout');
            void input.offsetWidth; // reflow zodat de pop/shake animatie opnieuw afspeelt
            if (input.value.trim()) input.classList.add(ok ? 'ok' : 'fout');
            if (ok && !input.dataset.restoring && !input._sparkled) { input._sparkled = true; _dcSparkle(input); }
            if (!ok) input._sparkled = false;
            // Feedback-zin tonen voor zin-vertaling rijen
            const row = input.closest('.inline-oef-row');
            if (row && row.classList.contains('zin-vert')) {
                const fb = row.querySelector('.inline-zin-feedback');
                if (fb) {
                    fb.classList.remove('show', 'ok-msg', 'fout-msg');
                    if (input.value.trim()) {
                        fb.classList.add('show', ok ? 'ok-msg' : 'fout-msg');
                        fb.textContent = ok ? '✅ Correct!' : `❌ Juist antwoord: ${expected}`;
                    }
                }
            }
            // Container alle blanken goed?
            const container = input.closest('.inline-oef');
            if (container) {
                const blanks = container.querySelectorAll('.inline-blank, .inline-zin-input');
                const allOk = blanks.length > 0 && Array.from(blanks).every(b => b.classList.contains('ok'));
                const result = container.querySelector('.inline-oef-result');
                if (result) result.classList.toggle('show', allOk);
                if (allOk && !container.dataset.awarded) {
                    container.dataset.awarded = '1';
                    try { if (typeof addTodayXP === 'function') addTodayXP(5); } catch(e) {}
                    try { if (typeof updateDailyStrip === 'function') updateDailyStrip(); } catch(e) {}
                }
            }
        }
        // Persist inline-blank antwoorden zodat ze blijven staan na navigatie
        function _inlineStorageKey(input) {
            const container = input.closest('.inline-oef');
            const oefId = (container && container.dataset && container.dataset.oefId) ? container.dataset.oefId : 'global';
            const blanks = container ? Array.from(container.querySelectorAll('.inline-blank, .inline-zin-input')) : [input];
            const idx = blanks.indexOf(input);
            const day = (typeof currentDay !== 'undefined' && currentDay) ? currentDay : '?';
            return 'dc-inline-' + day + '-' + oefId + '-' + idx;
        }
        function saveInlineAnswer(input) {
            try {
                const k = _inlineStorageKey(input);
                const v = input.value || '';
                if (v.trim()) localStorage.setItem(k, v);
                else localStorage.removeItem(k);
            } catch(e) {}
        }
        function restoreInlineAnswer(input) {
            try {
                if (input.value && input.value.trim()) return; // already filled
                const v = localStorage.getItem(_inlineStorageKey(input));
                if (v) {
                    input.value = v;
                    input.dataset.restoring = '1';
                    checkInlineBlank(input);
                    delete input.dataset.restoring;
                }
            } catch(e) {}
        }
        function bindInlineOef(scope) {
            scope = scope || document;
            scope.querySelectorAll('.inline-blank, .inline-zin-input').forEach(inp => {
                if (inp._wired) {
                    // Even if already wired, try restoring (lessons get re-rendered)
                    restoreInlineAnswer(inp);
                    return;
                }
                inp._wired = true;
                inp.addEventListener('blur', () => { checkInlineBlank(inp); saveInlineAnswer(inp); });
                inp.addEventListener('keydown', e => {
                    if (e.key === 'Enter') { e.preventDefault(); checkInlineBlank(inp); saveInlineAnswer(inp); inp.blur(); }
                });
                inp.addEventListener('input', () => {
                    if (inp.classList.contains('fout')) inp.classList.remove('fout');
                    const fb = inp.closest('.inline-oef-row')?.querySelector('.inline-zin-feedback');
                    if (fb) fb.classList.remove('show');
                    saveInlineAnswer(inp);
                });
                restoreInlineAnswer(inp);
            });
            scope.querySelectorAll('.inline-oef-reveal').forEach(btn => {
                if (btn._wired) return;
                btn._wired = true;
                btn.addEventListener('click', () => {
                    const row = btn.closest('.inline-oef-row');
                    const target = row ? row.querySelector('.inline-blank, .inline-zin-input') : null;
                    if (target) { target.value = target.dataset.answer; checkInlineBlank(target); saveInlineAnswer(target); }
                });
            });
        }
        // Wire up to MutationObserver so dynamically rendered lessons ook gebonden worden
        document.addEventListener('DOMContentLoaded', () => bindInlineOef(document));

        // =====================================================
        // ACCOUNT + CROSS-DEVICE SYNC (Firebase)
        // =====================================================
        // VUL HIERONDER je Firebase web-config in:
        //   Firebase console → Project settings (tandwiel) → "Your apps" →
        //   Web-app → "SDK setup and configuration" → kopieer het config-object.
        // De waarden hieronder zijn veilig om publiek in de code te zetten.
        const firebaseConfig = {
            apiKey: "AIzaSyBdvFBunJqnFDN-MlNfe51Z_rqMoAd2xEs",
            authDomain: "duocoengo.firebaseapp.com",
            projectId: "duocoengo",
            storageBucket: "duocoengo.firebasestorage.app",
            messagingSenderId: "586219796619",
            appId: "1:586219796619:web:32aaeb6eb79a3ffbe3fc8e",
            measurementId: "G-1Q484LDJNZ"
        };
        const FIREBASE_READY = !!(firebaseConfig.apiKey && firebaseConfig.apiKey.indexOf('PLAK_HIER') === -1);

        const SYNC_KEYS_EXACT = ['spanish_app_state_v1','completed_days','current_day','xp_total','duocoengo_daily_goal','streak_count','streak_best','streak_last_date','starred_words','daily_lesson_date','uitdaging_done_date','duocoengo_active_lang'];
        const SYNC_KEY_PREFIXES = ['dc-inline-','xp_day_','completed_days_','current_day_'];
        function _isSyncKey(k){ return SYNC_KEYS_EXACT.includes(k) || SYNC_KEY_PREFIXES.some(p => k.startsWith(p)); }

        // Bewaar de originele setItem en koppel auto-sync aan elke app-schrijfactie.
        const _origSetItem = localStorage.setItem.bind(localStorage);
        localStorage.setItem = function(k, v){ _origSetItem(k, v); if (currentUser && _isSyncKey(k)) schedulePush(); };

        let fbAuth = null, fbDb = null, currentUser = null, _syncStatus = '', _authMode = 'login', _pushTimer = null;

        function _parseJSON(s, fallback){ try { return JSON.parse(s); } catch(e){ return fallback; } }

        function collectSyncSnapshot(){
            const snap = {};
            for (let i = 0; i < localStorage.length; i++){
                const k = localStorage.key(i);
                if (_isSyncKey(k)) snap[k] = localStorage.getItem(k);
            }
            return snap;
        }
        function applySyncSnapshot(snap){
            Object.keys(snap).forEach(k => { try { _origSetItem(k, snap[k]); } catch(e){} });
        }
        function _unionArr(a, b){
            const x = _parseJSON(a, []) || [], y = _parseJSON(b, []) || [];
            return Array.from(new Set([...x, ...y]));
        }
        function _mergeState(a, b, newer){
            a = a || {}; b = b || {};
            const base = (newer === 'remote') ? Object.assign({}, b) : Object.assign({}, a);
            const aw = a.wordStats || {}, bw = b.wordStats || {}, outW = {};
            new Set([...Object.keys(aw), ...Object.keys(bw)]).forEach(w => {
                const x = aw[w], y = bw[w];
                if (!x){ outW[w] = y; return; }
                if (!y){ outW[w] = x; return; }
                outW[w] = ((x.seenCount || 0) >= (y.seenCount || 0)) ? x : y;
            });
            base.wordStats = outW;
            const ae = a.errorLog || [], be = b.errorLog || [], seen = new Set(), me = [];
            [...ae, ...be].forEach(e => { const id = (e.timestamp || '') + '|' + (e.spanish || ''); if (!seen.has(id)){ seen.add(id); me.push(e); } });
            me.sort((p, q) => (p.timestamp || '').localeCompare(q.timestamp || ''));
            base.errorLog = me.slice(-500);
            return base;
        }
        // Slim samenvoegen zodat voortgang nooit verloren gaat (max/union voor additieve velden).
        function mergeSnapshots(localSnap, remoteSnap, localTime, remoteTime){
            const out = {}, newer = (remoteTime >= localTime) ? 'remote' : 'local';
            const keys = new Set([...Object.keys(localSnap), ...Object.keys(remoteSnap)]);
            keys.forEach(k => {
                const lv = localSnap[k], rv = remoteSnap[k];
                if (lv == null){ out[k] = rv; return; }
                if (rv == null){ out[k] = lv; return; }
                if (k === 'xp_total' || k === 'streak_best' || k.startsWith('xp_day_')){
                    out[k] = String(Math.max(parseInt(lv) || 0, parseInt(rv) || 0));
                } else if (k === 'starred_words' || k.indexOf('completed_days') === 0){
                    out[k] = JSON.stringify(_unionArr(lv, rv));
                } else if (k === 'spanish_app_state_v1'){
                    out[k] = JSON.stringify(_mergeState(_parseJSON(lv, {}), _parseJSON(rv, {}), newer));
                } else {
                    out[k] = (newer === 'remote') ? rv : lv;
                }
            });
            return out;
        }

        function schedulePush(){
            if (!currentUser || !fbDb) return;
            clearTimeout(_pushTimer);
            _setSyncStatus('… opslaan');
            _pushTimer = setTimeout(pushNow, 1500);
        }
        async function pushNow(){
            if (!currentUser || !fbDb) return;
            try {
                const snap = collectSyncSnapshot();
                await fbDb.collection('users').doc(currentUser.uid).set({
                    state: snap, updatedAt: firebase.firestore.FieldValue.serverTimestamp(), v: 1
                }, { merge: true });
                _origSetItem('dc_last_sync_ms', String(Date.now()));
                _setSyncStatus('✓ gesynchroniseerd');
            } catch(e){ _setSyncStatus('⚠ offline — wijzigingen later opgeslagen'); }
        }
        async function doInitialSync(user){
            if (!fbDb) return;
            const localSnap = collectSyncSnapshot();
            const localTime = parseInt(localStorage.getItem('dc_last_sync_ms') || '0');
            let docSnap;
            try { docSnap = await fbDb.collection('users').doc(user.uid).get(); }
            catch(e){ _setSyncStatus('⚠ kon cloud niet laden'); return; }
            if (!docSnap.exists || !docSnap.data() || !docSnap.data().state){
                await pushNow(); return;   // nieuw account → lokale voortgang uploaden
            }
            const remoteSnap = docSnap.data().state || {};
            const remoteTime = (docSnap.data().updatedAt && docSnap.data().updatedAt.toMillis) ? docSnap.data().updatedAt.toMillis() : Date.now();
            const merged = mergeSnapshots(localSnap, remoteSnap, localTime, remoteTime);
            const mergedStr = JSON.stringify(merged), localStr = JSON.stringify(localSnap);
            if (mergedStr === localStr){
                if (JSON.stringify(remoteSnap) !== mergedStr) await pushNow();
                else _setSyncStatus('✓ up-to-date');
                return;
            }
            applySyncSnapshot(merged);
            _origSetItem('dc_last_sync_ms', String(Date.now()));
            if (!sessionStorage.getItem('dc_sync_reloaded')){
                sessionStorage.setItem('dc_sync_reloaded', '1');
                location.reload(); return;   // herladen zodat alle schermen de cloud-data tonen
            }
            _refreshAfterSync(); await pushNow();
        }
        function _refreshAfterSync(){
            try { if (typeof renderLessonPath === 'function') renderLessonPath(); } catch(e){}
            try { if (typeof updateDailyStrip === 'function') updateDailyStrip(); } catch(e){}
            try { if (typeof loadStreak === 'function') loadStreak(); } catch(e){}
            try { if (typeof loadStarred === 'function') loadStarred(); } catch(e){}
            _setSyncStatus('✓ gesynchroniseerd');
        }

        function initFirebaseSync(){
            if (!FIREBASE_READY) return;                       // nog niet geconfigureerd → stil afsluiten
            if (typeof firebase === 'undefined'){ console.warn('Firebase SDK niet geladen'); return; }
            try {
                firebase.initializeApp(firebaseConfig);
                fbAuth = firebase.auth();
                fbDb = firebase.firestore();
            } catch(e){ console.warn('Firebase init faalde', e); return; }
            const btn = document.getElementById('accountToggle');
            if (btn) btn.style.display = '';
            fbAuth.onAuthStateChanged(async (user) => {
                currentUser = user || null;
                updateAccountButton();
                renderAccountModalBody();
                if (currentUser){ await doInitialSync(currentUser); }
                else { sessionStorage.removeItem('dc_sync_reloaded'); }
            });
        }
        function updateAccountButton(){
            const btn = document.getElementById('accountToggle');
            if (!btn) return;
            if (currentUser){ btn.classList.add('logged-in'); btn.title = 'Ingelogd: ' + (currentUser.email || ''); }
            else { btn.classList.remove('logged-in'); btn.title = 'Inloggen / account aanmaken'; }
        }

        function ensureAccountModal(){
            if (document.getElementById('accountModalOverlay')) return;
            const style = document.createElement('style');
            style.textContent =
              '#accountModalOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:300;display:flex;align-items:center;justify-content:center;padding:1rem;}' +
              '#accountModal{background:var(--cream,#fff);color:inherit;max-width:380px;width:100%;border-radius:14px;padding:1.6rem;box-shadow:0 12px 40px rgba(0,0,0,0.3);position:relative;}' +
              '#accountModal h3{margin:0 0 0.3rem;}' +
              '#accountModal .am-close{position:absolute;top:0.6rem;right:0.9rem;background:none;border:none;font-size:1.5rem;cursor:pointer;opacity:0.6;line-height:1;}' +
              '#accountModal .am-field{display:block;width:100%;padding:0.7rem;margin:0.45rem 0;border:2px solid var(--ochre,#d9a441);border-radius:8px;font-size:1rem;box-sizing:border-box;background:rgba(255,255,255,0.6);}' +
              '#accountModal .am-msg{font-size:0.88rem;margin:0.5rem 0;min-height:1.2rem;color:var(--verde,#2d7a3a);}' +
              '#accountModal .am-link{background:none;border:none;color:var(--terracotta,#c0392b);cursor:pointer;text-decoration:underline;font-size:0.9rem;padding:0;}' +
              '[data-theme="dark"] #accountModal{background:#2a2218;}' +
              '[data-theme="dark"] #accountModal .am-field{background:rgba(0,0,0,0.25);color:#f5ecd9;}';
            document.head.appendChild(style);
            const ov = document.createElement('div');
            ov.id = 'accountModalOverlay';
            ov.style.display = 'none';
            ov.innerHTML = '<div id="accountModal"><button class="am-close" onclick="closeAccountModal()" aria-label="Sluiten">×</button><div id="accountModalContent"></div></div>';
            ov.addEventListener('click', e => { if (e.target === ov) closeAccountModal(); });
            document.body.appendChild(ov);
        }
        function openAccountModal(){ ensureAccountModal(); renderAccountModalBody(); document.getElementById('accountModalOverlay').style.display = 'flex'; }
        function closeAccountModal(){ const o = document.getElementById('accountModalOverlay'); if (o) o.style.display = 'none'; }
        function toggleAuthMode(){ _authMode = (_authMode === 'login') ? 'signup' : 'login'; renderAccountModalBody(); }
        function renderAccountModalBody(){
            const c = document.getElementById('accountModalContent');
            if (!c) return;
            if (currentUser){
                c.innerHTML =
                    '<h3>👤 Account</h3>' +
                    '<p style="opacity:0.8;font-size:0.92rem;margin:0.2rem 0 0.8rem;">Ingelogd als <strong>' + (currentUser.email || '') + '</strong></p>' +
                    '<div class="am-msg" id="amMsg">' + (_syncStatus || 'Je voortgang wordt automatisch op al je apparaten bewaard.') + '</div>' +
                    '<button class="btn" style="width:100%;margin-top:0.3rem;" onclick="syncNow()">🔄 Nu synchroniseren</button>' +
                    '<button class="btn" style="width:100%;margin-top:0.6rem;background:var(--deep-blue,#34495e);" onclick="accountLogout()">Uitloggen</button>';
            } else {
                const isLogin = _authMode === 'login';
                c.innerHTML =
                    '<h3>' + (isLogin ? 'Inloggen' : 'Account aanmaken') + '</h3>' +
                    '<p style="opacity:0.8;font-size:0.9rem;margin:0.2rem 0 0.8rem;">Log in om je voortgang op al je apparaten te bewaren.</p>' +
                    '<input class="am-field" id="amEmail" type="email" placeholder="E-mailadres" autocomplete="email">' +
                    '<input class="am-field" id="amPass" type="password" placeholder="Wachtwoord (min. 6 tekens)" autocomplete="' + (isLogin ? 'current-password' : 'new-password') + '">' +
                    '<div class="am-msg" id="amMsg"></div>' +
                    '<button class="btn" style="width:100%;" onclick="accountSubmit()">' + (isLogin ? 'Inloggen' : 'Aanmaken') + '</button>' +
                    '<p style="text-align:center;margin:0.8rem 0 0;font-size:0.9rem;">' +
                      (isLogin ? 'Nog geen account? ' : 'Al een account? ') +
                      '<button class="am-link" onclick="toggleAuthMode()">' + (isLogin ? 'Maak er een aan' : 'Inloggen') + '</button></p>';
                setTimeout(() => { const em = document.getElementById('amEmail'); if (em) em.focus(); }, 50);
                const pass = document.getElementById('amPass');
                if (pass) pass.addEventListener('keydown', e => { if (e.key === 'Enter'){ e.preventDefault(); accountSubmit(); } });
            }
        }
        function _amMsg(t, err){ const m = document.getElementById('amMsg'); if (m){ m.textContent = t; m.style.color = err ? '#c0392b' : 'var(--verde,#2d7a3a)'; } }
        function _setSyncStatus(t){ _syncStatus = t; const m = document.getElementById('amMsg'); if (m && currentUser) m.textContent = t; }
        async function accountSubmit(){
            const email = ((document.getElementById('amEmail') || {}).value || '').trim();
            const pass = (document.getElementById('amPass') || {}).value || '';
            if (!email || !pass){ _amMsg('Vul e-mail en wachtwoord in.', true); return; }
            if (!fbAuth){ _amMsg('Account-systeem nog niet geconfigureerd.', true); return; }
            _amMsg(_authMode === 'login' ? 'Inloggen…' : 'Account aanmaken…', false);
            try {
                if (_authMode === 'login') await fbAuth.signInWithEmailAndPassword(email, pass);
                else await fbAuth.createUserWithEmailAndPassword(email, pass);
                _amMsg('Gelukt!', false);
                setTimeout(closeAccountModal, 500);
            } catch(e){ _amMsg(_authErrNl(e), true); }
        }
        async function accountLogout(){ if (fbAuth){ try { await fbAuth.signOut(); } catch(e){} } _setSyncStatus(''); renderAccountModalBody(); }
        function syncNow(){ _setSyncStatus('… opslaan'); pushNow(); }
        function _authErrNl(e){
            const c = (e && e.code) || '';
            if (c.indexOf('invalid-email') >= 0) return 'Ongeldig e-mailadres.';
            if (c.indexOf('email-already-in-use') >= 0) return 'Dit e-mailadres heeft al een account. Log in.';
            if (c.indexOf('weak-password') >= 0) return 'Wachtwoord te zwak (min. 6 tekens).';
            if (c.indexOf('wrong-password') >= 0 || c.indexOf('invalid-credential') >= 0) return 'Onjuist e-mailadres of wachtwoord.';
            if (c.indexOf('user-not-found') >= 0) return 'Geen account met dit e-mailadres. Maak er een aan.';
            if (c.indexOf('too-many-requests') >= 0) return 'Te veel pogingen. Probeer het later opnieuw.';
            if (c.indexOf('network') >= 0) return 'Netwerkfout. Controleer je verbinding.';
            return 'Er ging iets mis. Probeer het opnieuw.';
        }
        window.addEventListener('load', initFirebaseSync);

        // Initialize the app when page loads
        init();
    </script>

    <!-- Sessie-modus overlay -->
    <div class="session-overlay" id="sessionOverlay" role="dialog" aria-modal="true" aria-label="Oefensessie">
        <div class="session-header">
            <button class="session-close" id="sessionClose" aria-label="Sluit sessie">×</button>
            <div class="session-progress-track"><div class="session-progress-fill" id="sessionProgressFill"></div></div>
            <div class="session-hearts" id="sessionHearts">❤️❤️❤️</div>
        </div>
        <div class="session-body" id="sessionBody"></div>
        <div class="session-footer" id="sessionFooter">
            <button class="ses-btn" id="sesCheckBtn" disabled onclick="Session.check()">Controleer</button>
        </div>
        <div class="session-feedback" id="sessionFeedback"></div>
    </div>
</body>
