<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuoCoengo - Jouw Complete Spaanse Cursus</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Crimson+Text:wght@400;600&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --terracotta: #c0392b; --ochre: #e67e22; --deep-blue: #2c3e50;
            --cream: #fdf6ec; --warm-white: #fffdf8; --shadow: rgba(44, 62, 80, 0.15);
            --fiesta-yellow: #f1c40f; --verde: #27ae60;
        }
        body {
            font-family: 'Crimson Text', serif;
            background: linear-gradient(135deg, var(--cream) 0%, #fce8d0 50%, #fdf2e0 100%);
            color: var(--deep-blue); line-height: 1.8; min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        header {
            text-align: center; padding: 2rem 0; margin-bottom: 2rem;
            background: linear-gradient(135deg, rgba(192,57,43,0.08) 0%, rgba(230,126,34,0.08) 50%, rgba(241,196,15,0.06) 100%);
            border-radius: 16px; border-bottom: 4px solid var(--terracotta);
            position: relative; overflow: hidden;
        }
        header::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--terracotta), var(--ochre), var(--fiesta-yellow), var(--verde), var(--ochre), var(--terracotta));
        }
        h1 {
            font-family: 'Playfair Display', serif; font-size: 3rem;
            font-weight: 900; color: var(--terracotta); margin-bottom: 0.5rem;
            text-shadow: 2px 2px 0 rgba(230,126,34,0.15);
        }
        .subtitle { font-size: 1.2rem; color: var(--deep-blue); opacity: 0.8; }
        .progress-bar {
            width: 100%; height: 12px; background: var(--cream);
            border-radius: 6px; overflow: hidden; margin: 1rem 0;
        }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, var(--terracotta) 0%, var(--ochre) 50%, var(--fiesta-yellow) 100%);
            transition: width 0.5s ease;
        }
        .nav-tabs { display: flex; gap: 0; margin-bottom: 2rem; border-bottom: 3px solid var(--terracotta); }
        .tab {
            padding: 1rem 2rem; background: var(--warm-white); border: none;
            cursor: pointer; font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem; font-weight: 600; color: var(--deep-blue);
            transition: all 0.3s ease; flex: 1; text-align: center;
        }
        .tab.active { background: var(--terracotta); color: var(--warm-white); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .lesson-card {
            background: var(--warm-white); border-radius: 8px; padding: 2.5rem;
            margin-bottom: 2rem; box-shadow: 4px 4px 0 var(--shadow);
            border-left: 6px solid var(--terracotta);
        }
        h2 {
            font-family: 'Playfair Display', serif; font-size: 2.2rem;
            color: var(--terracotta); margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--ochre); padding-bottom: 0.5rem;
        }
        h3 {
            font-family: 'Cormorant Garamond', serif; font-size: 1.6rem;
            color: var(--deep-blue); margin-top: 2rem; margin-bottom: 1rem;
        }
        h4 {
            font-family: 'Cormorant Garamond', serif; font-size: 1.3rem;
            color: var(--deep-blue); margin-top: 1.5rem; margin-bottom: 0.8rem;
        }
        .day-selector {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 1rem; margin-bottom: 2rem;
        }
        .day-button {
            padding: 1rem; background: var(--warm-white); border: 2px solid var(--ochre);
            border-radius: 8px; cursor: pointer; font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem; font-weight: 600; color: var(--deep-blue);
            transition: all 0.3s ease; position: relative;
        }
        .day-button:hover { background: var(--ochre); color: var(--warm-white); transform: scale(1.05); }
        .day-button.active { background: var(--terracotta); color: var(--warm-white); transform: scale(1.08); }
        .day-button.completed::after {
            content: '✓'; position: absolute; top: -8px; right: -8px;
            background: var(--verde); color: white; width: 24px; height: 24px;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 14px;
        }
        .grammar-box {
            background: rgba(232, 169, 98, 0.08); padding: 1.5rem;
            border-left: 4px solid var(--ochre); margin: 1rem 0; border-radius: 4px;
        }
        .example-box {
            background: rgba(232, 169, 98, 0.1); padding: 1.2rem;
            border-left: 4px solid var(--ochre); margin: 0.8rem 0; border-radius: 4px;
        }
        .example-spanish { 
            color: var(--terracotta); font-weight: 600; font-size: 1.15rem; 
            margin-bottom: 0.3rem;
        }
        .vocab-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 0.8rem; margin: 1rem 0;
        }
        .vocab-item {
            background: var(--cream); padding: 0.9rem; border-radius: 6px;
            border: 1px solid var(--ochre);
        }
        .vocab-word { 
            font-size: 1.15rem; font-weight: 600; color: var(--terracotta); 
            margin-bottom: 0.3rem;
        }
        .vocab-meaning { color: var(--deep-blue); font-size: 0.95rem; }
        .conjugation-table {
            width: 100%; border-collapse: collapse; margin: 1rem 0;
            background: var(--warm-white);
        }
        .conjugation-table th, .conjugation-table td {
            padding: 0.8rem; text-align: left; border: 1px solid var(--ochre);
        }
        .conjugation-table th {
            background: rgba(232, 169, 98, 0.2); font-weight: 600;
            color: var(--deep-blue);
        }
        .btn {
            padding: 1rem 2rem; background: var(--terracotta); color: var(--warm-white);
            border: none; border-radius: 6px; cursor: pointer;
            font-family: 'Cormorant Garamond', serif; font-size: 1.1rem;
            font-weight: 600; transition: all 0.3s ease;
            box-shadow: 3px 3px 0 var(--shadow); margin-top: 1.5rem;
        }
        .btn:hover { background: #b85443; transform: translateY(-2px); }
        ul { margin-left: 2rem; margin-top: 0.5rem; }
        li { margin-bottom: 0.6rem; line-height: 1.6; }
        ol { margin-left: 2rem; margin-top: 0.5rem; }
        p { margin-bottom: 1rem; line-height: 1.8; }
        strong { color: var(--deep-blue); font-weight: 600; }
        em { font-style: italic; color: var(--deep-blue); }

        /* === Oefenen tab === */
        .oef-menu { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 2rem; }
        .oef-mode-btn {
            flex: 1; min-width: 180px; padding: 1.5rem 1rem;
            background: var(--warm-white); border: 2px solid var(--ochre);
            border-radius: 8px; cursor: pointer; font-family: 'Cormorant Garamond', serif;
            font-size: 1.15rem; font-weight: 600; color: var(--deep-blue);
            transition: all 0.3s ease; text-align: center;
        }
        .oef-mode-btn:hover, .oef-mode-btn.active {
            background: var(--terracotta); color: var(--warm-white); border-color: var(--terracotta);
        }
        .oef-mode-btn .oef-icon { font-size: 2rem; display: block; margin-bottom: 0.4rem; }
        .oef-panel { display: none; }
        .oef-panel.active { display: block; }

        /* Dag filter checkboxes */
        .dag-filter { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 1rem 0; }
        .dag-check { display: flex; align-items: center; gap: 0.3rem; cursor: pointer; font-size: 0.95rem; }
        .dag-check input { accent-color: var(--terracotta); width: 16px; height: 16px; cursor: pointer; }

        /* Flashcard */
        .flashcard-wrap { perspective: 1000px; margin: 1.5rem auto; max-width: 500px; }
        .flashcard {
            width: 100%; height: 220px; position: relative;
            transform-style: preserve-3d; transition: transform 0.5s ease;
            cursor: pointer;
        }
        .flashcard.flipped { transform: rotateY(180deg); }
        .flashcard-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 2rem; text-align: center;
            box-shadow: 4px 4px 0 var(--shadow);
        }
        .flashcard-front {
            background: var(--warm-white); border: 3px solid var(--terracotta);
        }
        .flashcard-back {
            background: var(--terracotta); color: var(--warm-white);
            transform: rotateY(180deg);
        }
        .fc-word { font-size: 2.2rem; font-family: 'Playfair Display', serif; font-weight: 700; }
        .fc-hint { font-size: 0.95rem; opacity: 0.6; margin-top: 0.5rem; }
        .fc-meaning { font-size: 1.8rem; font-family: 'Cormorant Garamond', serif; font-weight: 600; }
        .flashcard-actions { display: flex; gap: 1rem; justify-content: center; margin-top: 1rem; flex-wrap: wrap; }
        .btn-goed { background: #5a8a3f; }
        .btn-goed:hover { background: #4a7233; }
        .btn-fout { background: #8b2b2b; }
        .btn-fout:hover { background: #721f1f; }
        .btn-skip { background: var(--deep-blue); }
        .btn-skip:hover { background: #0f2535; }
        .fc-stats { display: flex; gap: 2rem; justify-content: center; margin: 1.5rem 0; flex-wrap: wrap; }
        .fc-stat { text-align: center; }
        .fc-stat .num { font-size: 1.8rem; font-weight: 700; color: var(--terracotta); font-family: 'Playfair Display', serif; }
        .fc-stat .lbl { font-size: 0.85rem; opacity: 0.7; }
        .fc-progress-label { text-align: center; font-size: 0.95rem; opacity: 0.7; margin-bottom: 0.5rem; }

        /* Typ oefening */
        .typ-vraag { font-size: 1.5rem; font-family: 'Playfair Display', serif; color: var(--deep-blue); margin: 1.5rem 0 1rem; text-align: center; }
        .typ-input {
            width: 100%; max-width: 400px; display: block; margin: 0 auto 1rem;
            padding: 0.8rem 1.2rem; font-size: 1.2rem; font-family: 'Crimson Text', serif;
            border: 2px solid var(--ochre); border-radius: 6px; background: var(--cream);
            color: var(--deep-blue); outline: none; text-align: center;
        }
        .typ-input:focus { border-color: var(--terracotta); }
        .typ-feedback {
            text-align: center; font-size: 1.1rem; padding: 0.8rem 1.5rem;
            border-radius: 6px; margin: 1rem auto; max-width: 400px;
            font-family: 'Cormorant Garamond', serif; font-weight: 600;
        }
        .typ-feedback.correct { background: rgba(90,138,63,0.15); color: #3a5c28; border: 1px solid #5a8a3f; }
        .typ-feedback.accent { background: rgba(232,169,98,0.2); color: #7a5500; border: 1px solid var(--ochre); }
        .typ-feedback.fout { background: rgba(139,43,43,0.12); color: #8b2b2b; border: 1px solid #8b2b2b; }

        /* Quiz */
        .quiz-vraag { font-size: 1.4rem; font-family: 'Playfair Display', serif; margin: 1.5rem 0 1rem; text-align: center; color: var(--deep-blue); }
        .quiz-opties { display: flex; flex-direction: column; gap: 0.8rem; max-width: 500px; margin: 0 auto; }
        .quiz-opt {
            padding: 1rem 1.5rem; background: var(--warm-white); border: 2px solid var(--ochre);
            border-radius: 8px; cursor: pointer; font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem; color: var(--deep-blue); transition: all 0.2s ease; text-align: left;
        }
        .quiz-opt:hover:not(:disabled) { background: var(--ochre); color: var(--warm-white); }
        .quiz-opt.correct { background: #5a8a3f; color: white; border-color: #5a8a3f; }
        .quiz-opt.fout { background: #8b2b2b; color: white; border-color: #8b2b2b; }
        .quiz-opt:disabled { cursor: default; opacity: 0.8; }
        .quiz-score { font-size: 2.5rem; font-family: 'Playfair Display', serif; color: var(--terracotta); text-align: center; margin: 1rem 0; }
        .quiz-score-lbl { text-align: center; font-size: 1.1rem; opacity: 0.8; }
        .empty-state { text-align: center; padding: 3rem; opacity: 0.6; font-size: 1.1rem; }
        .empty-state .empty-icon { font-size: 3rem; display: block; margin-bottom: 1rem; }
        .btn-sm { padding: 0.6rem 1.2rem; font-size: 0.95rem; margin-top: 0.5rem; }

        /* === Les-oefeningen (3b) === */
        .les-oef-wrap { margin-top: 2.5rem; padding-top: 2rem; border-top: 2px solid var(--ochre); }
        .les-oef-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .les-oef-tab {
            padding: 0.5rem 1.2rem; background: var(--cream); border: 2px solid var(--ochre);
            border-radius: 20px; cursor: pointer; font-family: 'Cormorant Garamond', serif;
            font-size: 1rem; font-weight: 600; color: var(--deep-blue); transition: all 0.2s;
        }
        .les-oef-tab.active { background: var(--terracotta); color: white; border-color: var(--terracotta); }
        .les-oef-panel { display: none; }
        .les-oef-panel.active { display: block; }

        /* Invuloefening */
        .invul-zin { font-size: 1.15rem; line-height: 2.2; margin: 0.8rem 0; }
        .invul-input {
            display: inline-block; min-width: 120px; border: none; border-bottom: 2px solid var(--terracotta);
            background: transparent; font-family: 'Crimson Text', serif; font-size: 1.1rem;
            color: var(--deep-blue); padding: 0 0.3rem; outline: none; text-align: center;
        }
        .invul-input.correct-inp { border-color: #5a8a3f; background: rgba(90,138,63,0.1); border-radius: 4px; }
        .invul-input.fout-inp { border-color: #8b2b2b; background: rgba(139,43,43,0.08); border-radius: 4px; }
        .invul-result { font-size: 0.9rem; margin-left: 0.4rem; font-weight: 600; }
        .invul-result.ok { color: #5a8a3f; }
        .invul-result.nee { color: #8b2b2b; }

        /* Zin-vertaling */
        .zin-blok { background: var(--cream); border-radius: 8px; padding: 1.2rem 1.5rem; margin: 1rem 0; border-left: 4px solid var(--ochre); }
        .zin-nl { font-size: 1.1rem; color: var(--deep-blue); margin-bottom: 0.6rem; }
        .zin-input {
            width: 100%; padding: 0.7rem 1rem; font-size: 1.05rem; font-family: 'Crimson Text', serif;
            border: 2px solid var(--ochre); border-radius: 6px; background: var(--warm-white);
            color: var(--deep-blue); outline: none;
        }
        .zin-input:focus { border-color: var(--terracotta); }
        .zin-feedback { margin-top: 0.5rem; font-size: 0.95rem; font-weight: 600; padding: 0.4rem 0.8rem; border-radius: 4px; display: none; }
        .zin-feedback.show { display: block; }
        .zin-feedback.ok { background: rgba(90,138,63,0.12); color: #3a5c28; }
        .zin-feedback.nee { background: rgba(139,43,43,0.1); color: #8b2b2b; }

        /* Gesprekssimulator */
        .sim-chat { background: var(--cream); border-radius: 8px; padding: 1rem; margin: 1rem 0; min-height: 180px; max-height: 340px; overflow-y: auto; display: flex; flex-direction: column; gap: 0.7rem; }
        .sim-msg { max-width: 80%; padding: 0.7rem 1rem; border-radius: 12px; font-size: 1.05rem; line-height: 1.5; }
        .sim-msg.bot { background: var(--terracotta); color: white; border-radius: 12px 12px 12px 0; align-self: flex-start; }
        .sim-msg.user { background: var(--deep-blue); color: white; border-radius: 12px 12px 0 12px; align-self: flex-end; }
        .sim-msg.hint { background: rgba(232,169,98,0.25); color: var(--deep-blue); border-radius: 8px; font-size: 0.9rem; font-style: italic; align-self: center; max-width: 95%; text-align: center; }
        .sim-opties { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.5rem; }
        .sim-opt {
            padding: 0.7rem 1.2rem; background: var(--warm-white); border: 2px solid var(--ochre);
            border-radius: 8px; cursor: pointer; font-family: 'Crimson Text', serif; font-size: 1rem;
            color: var(--deep-blue); text-align: left; transition: all 0.2s;
        }
        .sim-opt:hover { background: var(--ochre); color: white; }
        .sim-opt.gekozen { background: var(--deep-blue); color: white; border-color: var(--deep-blue); }
        .sim-opt.correct-keuze { background: #5a8a3f; color: white; border-color: #5a8a3f; }
        .sim-opt.fout-keuze { background: #8b2b2b; color: white; border-color: #8b2b2b; }
        .sim-score { text-align: center; font-size: 1.1rem; margin-top: 0.8rem; color: var(--terracotta); font-weight: 600; }

        /* === Thema's (3c) === */
        .thema-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .thema-btn {
            padding: 1.5rem 1rem; background: var(--warm-white); border: 2px solid var(--ochre);
            border-radius: 8px; cursor: pointer; font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem; font-weight: 600; color: var(--deep-blue); text-align: center;
            transition: all 0.3s ease;
        }
        .thema-btn:hover, .thema-btn.active { background: var(--terracotta); color: white; border-color: var(--terracotta); }
        .thema-btn .thema-icon { font-size: 1.8rem; display: block; margin-bottom: 0.4rem; }
        .thema-content { display: none; }
        .thema-content.active { display: block; }
        /* Mini oefeningen */
        .mini-oef-blok { margin-bottom: 1.5rem; padding: 1rem; background: rgba(232,169,98,0.06); border-radius: 8px; border: 1px solid rgba(232,169,98,0.2); }
        .mini-oef-blok h4 { margin-top: 0; margin-bottom: 0.8rem; color: var(--terracotta); font-size: 1.1rem; }
        .mini-mc-vraag { margin-bottom: 1rem; }
        .mini-mc-zin { font-weight: 600; margin-bottom: 0.5rem; font-size: 1.05rem; }
        .mini-mc-opts { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .mini-mc-opt { padding: 0.4rem 1rem; border: 2px solid var(--ochre); border-radius: 6px; background: var(--warm-white); cursor: pointer; font-family: inherit; font-size: 0.95rem; transition: all 0.2s; }
        .mini-mc-opt:hover:not(:disabled) { background: var(--ochre); color: white; }
        .mini-mc-opt.mc-correct { background: #2d7a3a; color: white; border-color: #2d7a3a; }
        .mini-mc-opt.mc-fout { background: #c0392b; color: white; border-color: #c0392b; }
        .mini-mc-fb { margin-top: 0.3rem; font-size: 0.9rem; font-weight: 600; }
        .mini-mc-fb.ok { color: #2d7a3a; }
        .mini-mc-fb.nee { color: #c0392b; }
        .koppel-container { display: flex; gap: 2rem; }
        .koppel-col { display: flex; flex-direction: column; gap: 0.5rem; flex: 1; }
        .koppel-item { padding: 0.5rem 1rem; border: 2px solid var(--ochre); border-radius: 6px; cursor: pointer; text-align: center; font-size: 0.95rem; transition: all 0.2s; background: var(--warm-white); }
        .koppel-item:hover:not(.koppel-done) { background: rgba(232,169,98,0.2); }
        .koppel-selected { background: var(--ochre) !important; color: white; }
        .koppel-done { background: #2d7a3a !important; color: white; border-color: #2d7a3a; cursor: default; opacity: 0.8; }
        .koppel-wrong { background: #c0392b !important; color: white; border-color: #c0392b; }
        .koppel-score { margin-top: 0.5rem; font-weight: 600; }
        .mini-wz-vraag { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
        .mini-wz-hint { font-weight: 600; min-width: 120px; }
        .mini-wz-input { padding: 0.3rem 0.6rem; border: 1px solid var(--ochre); border-radius: 4px; font-family: inherit; font-size: 0.95rem; width: 150px; }
        .mini-wz-fb { font-size: 0.9rem; font-weight: 600; }
        .mini-wz-fb.ok { color: #2d7a3a; }
        .mini-wz-fb.nee { color: #c0392b; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div style="font-size: 2.5rem; margin-bottom: 0.3rem;">🇪🇸</div>
            <h1>DuoCoengo</h1>
            <p class="subtitle">Jouw complete 20-daagse Spaanse cursus</p>
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar" style="width: 0%"></div>
            </div>
        </header>

        <div class="nav-tabs">
            <button class="tab active" data-tab="lessen" onclick="switchTab('lessen')">Lessen</button>
            <button class="tab" data-tab="voortgang" onclick="switchTab('voortgang')">Voortgang</button>
            <button class="tab" data-tab="oefenen" onclick="switchTab('oefenen')">Oefenen</button>
            <button class="tab" data-tab="themas" onclick="switchTab('themas')">Thema's</button>
        </div>

        <div id="lessen-tab" class="tab-content active">
            <div class="lesson-card">
                <h2>Selecteer een dag</h2>
                <div class="day-selector" id="daySelector"></div>
            </div>
            <div id="lessonContent"></div>
        </div>

        <div id="voortgang-tab" class="tab-content">
            <div class="lesson-card">
                <h2>Jouw Voortgang</h2>
                <div id="progressContent"></div>
            </div>
        </div>

        <div id="oefenen-tab" class="tab-content">
            <div id="oefelenContent"></div>
        </div>

        <div id="themas-tab" class="tab-content">
            <div id="themasContent"></div>
        </div>
    </div>
    <script>
        let currentDay = 1;
        let completedDays = new Set();

        const lessonsHTML = {
1: `
<h3>🎯 Leerdoelen</h3>
<ul>
<li>Begrijpen wat Spaans is als grammaticaal systeem en hoe het verschilt van het Nederlands</li>
<li>Persoonlijke voornaamwoorden herkennen en gebruiken</li>
<li>Het werkwoord ser in de tegenwoordige tijd correct vervoegen</li>
<li>Eenvoudige zinnen maken over identiteit, nationaliteit en beroep</li>

<h3>🎯 Leerdoelen</h3>
<ul>
<li>Uitleggen wat directe en indirecte objectvoornaamwoorden zijn</li>
<li>Beide typen objectvoornaamwoorden herkennen en correct gebruiken</li>
<li>De vaste positie van objectvoornaamwoorden in de zin toepassen</li>
<li>Directe en indirecte objectvoornaamwoorden correct combineren</li>
<li>Veelgemaakte positiefouten vermijden</li>
</ul>

<h3>📚 Grammatica</h3>

<h4>1. Wat zijn objectvoornaamwoorden</h4>
<div class="grammar-box">
<p>Objectvoornaamwoorden vervangen zelfstandige naamwoorden die object zijn in de zin.</p>
<p>Er zijn twee typen:</p>
<ul>
<li><strong>Directe objectvoornaamwoorden</strong>: vervangen het directe object (wat of wie de handeling ondergaat)</li>
<li><strong>Indirecte objectvoornaamwoorden</strong>: vervangen het indirecte object (aan wie of voor wie)</li>
</ul>
<p>Dit onderscheid is grammaticaal, niet betekenisgebonden.</p>
</div>

<h4>2. Directe objectvoornaamwoorden</h4>
<table class="conjugation-table">
<tr><th>Persoon</th><th>Vorm</th></tr>
<tr><td>yo</td><td><strong>me</strong></td></tr>
<tr><td>tú</td><td><strong>te</strong></td></tr>
<tr><td>él</td><td><strong>lo</strong></td></tr>
<tr><td>ella</td><td><strong>la</strong></td></tr>
<tr><td>usted</td><td><strong>lo / la</strong></td></tr>
<tr><td>nosotros/as</td><td><strong>nos</strong></td></tr>
<tr><td>vosotros/as</td><td><strong>os</strong></td></tr>
<tr><td>ellos</td><td><strong>los</strong></td></tr>
<tr><td>ellas</td><td><strong>las</strong></td></tr>
<tr><td>ustedes</td><td><strong>los / las</strong></td></tr>
</table>
<div class="grammar-box">
<p><strong>Extra: lo als neutraal voornaamwoord</strong></p>
<p><strong>lo</strong> kan ook neutraal zijn — het verwijst dan niet naar een specifiek mannelijk woord, maar naar een idee, situatie of onbepaald "het".</p>
<ul>
<li><strong>Ya lo sé.</strong> Dat weet ik al. (algemeen "het")</li>
<li><strong>Lo entiendo.</strong> Ik begrijp het. (de situatie)</li>
</ul>
<p>Geslacht en getal: lo/la stemmen overeen met het geslacht; los/las ook met het getal.</p>
</div>

<h4>3. Indirecte objectvoornaamwoorden herhaald</h4>
<table class="conjugation-table">
<tr><th>Spaans</th><th>Nederlands</th></tr>
<tr><td>me</td><td>mij / aan mij</td></tr>
<tr><td>te</td><td>jou / aan jou</td></tr>
<tr><td>le</td><td>hem / haar / u / aan hem/haar/u</td></tr>
<tr><td>nos</td><td>ons / aan ons</td></tr>
<tr><td>os</td><td>jullie / aan jullie</td></tr>
<tr><td>les</td><td>hen / u / aan hen/u</td></tr>
</table>

<h4>4. Positie in de zin</h4>
<div class="grammar-box">
<p><strong>Basisregel: Objectvoornaamwoorden staan VOOR het vervoegde werkwoord.</strong></p>
<p>Voorbeelden:</p>
<ul>
<li><strong>Lo veo.</strong> Ik zie het.</li>
<li><strong>Te llamo.</strong> Ik bel je.</li>
<li><strong>Me lo dice.</strong> Hij vertelt het mij.</li>
</ul>
<p><strong>Uitzondering:</strong> Bij infinitief, gerundio of bevestigende gebiedende wijs kunnen ze erachter vastgeplakt worden:</p>
<ul>
<li><strong>Voy a verlo.</strong> / <strong>Lo voy a ver.</strong> Ik ga het zien.</li>
<li><strong>Estoy mirándola.</strong> / <strong>La estoy mirando.</strong> Ik ben het aan het bekijken.</li>
</ul>
<p>Beide posities zijn correct.</p>
</div>

<h4>5. Combinatie van twee objectvoornaamwoorden</h4>
<div class="grammar-box">
<p>Wanneer directe en indirecte objectvoornaamwoorden samen voorkomen:</p>
<p><strong>Vaste volgorde: indirect + direct + werkwoord</strong></p>
<p>Voorbeelden:</p>
<ul>
<li><strong>Me lo da.</strong> Hij geeft het mij. (indirect: me, direct: lo)</li>
<li><strong>Te la muestro.</strong> Ik laat het je zien. (indirect: te, direct: la)</li>
<li><strong>Nos los explican.</strong> Zij leggen ze ons uit. (indirect: nos, direct: los)</li>
</ul>
</div>

<h4>6. De belangrijkste regel: le/les → se</h4>
<div class="grammar-box">
<p><strong>BELANGRIJK:</strong> Wanneer <strong>le</strong> of <strong>les</strong> samenvalt met <strong>lo/la/los/las</strong>, verandert <strong>le/les</strong> in <strong>se</strong>.</p>
<p>Dit is een harde grammaticale regel zonder uitzonderingen.</p>
<p><strong>Voorbeelden:</strong></p>
<ul>
<li>~~Le lo doy~~ → <strong>Se lo doy.</strong> Ik geef het hem/haar.</li>
<li>~~Les las muestro~~ → <strong>Se las muestro.</strong> Ik laat ze hen zien.</li>
<li>~~Le la explico~~ → <strong>Se la explico.</strong> Ik leg het haar uit.</li>
</ul>
<p><strong>Waarom?</strong> Omdat <em>le lo</em> en <em>les los</em> fonetisch onmogelijk uit te spreken zijn in het Spaans.</p>
</div>

<h4>7. Verduidelijking bij se</h4>
<div class="grammar-box">
<p><strong>se</strong> is ambigu: het kan betekenen "hem", "haar", "u", "hen" of "u (mv)".</p>
<p>Als de context onduidelijk is, voeg je een verduidelijkende uitdrukking toe met <strong>a</strong>:</p>
<ul>
<li><strong>Se lo doy a él.</strong> Ik geef het aan hem.</li>
<li><strong>Se lo doy a ella.</strong> Ik geef het aan haar.</li>
<li><strong>Se lo doy a usted.</strong> Ik geef het aan u.</li>
<li><strong>Se lo doy a ellos.</strong> Ik geef het aan hen.</li>
</ul>
<p>Deze toevoeging is optioneel maar vaak noodzakelijk voor duidelijkheid.</p>
</div>

<h4>8. Positie van ontkenning</h4>
<div class="grammar-box">
<p>Bij ontkenning staat <strong>no</strong> vóór het eerste objectvoornaamwoord:</p>
<ul>
<li><strong>No lo veo.</strong> Ik zie het niet.</li>
<li><strong>No me lo explica.</strong> Hij legt het mij niet uit.</li>
<li><strong>No se la doy.</strong> Ik geef het hem/haar niet.</li>
</ul>
<p>Nooit: <em>lo no veo</em> — de volgorde is altijd: no + (ind.obj) + (dir.obj) + werkwoord.</p>
</div>

<h4>9. Veelgemaakte fouten en correcties</h4>
<div class="grammar-box">
<table class="conjugation-table">
<tr><th>❌ Fout</th><th>✅ Goed</th><th>Uitleg</th></tr>
<tr><td>Veo lo.</td><td>Lo veo.</td><td>Objectvoornaamwoord staat VOOR het werkwoord</td></tr>
<tr><td>Le lo doy.</td><td>Se lo doy.</td><td>le + lo wordt altijd se + lo</td></tr>
<tr><td>Lo doy se a ella.</td><td>Se lo doy a ella.</td><td>Volgorde is indirect + direct + werkwoord</td></tr>
<tr><td>Me lo no dice.</td><td>No me lo dice.</td><td>no staat vóór alle objectvoornaamwoorden</td></tr>
</table>
</div>

<h3>🎯 Leerdoelen</h3>

<h3>📚 Grammatica</h3>

<h4>1. Drie hoofdvragen over ruimte</h4>
<div class="grammar-box">
<p>Spaans maakt strikte verschillen afhankelijk van de vraag die je beantwoordt:</p>
<table class="conjugation-table">
<tr><th>Vraag</th><th>Spaans</th><th>Gebruik</th></tr>
<tr><td>Waar?</td><td><strong>¿dónde?</strong></td><td>statische locatie → en</td></tr>
<tr><td>Waarheen?</td><td><strong>¿adónde?</strong></td><td>beweging naar bestemming → a</td></tr>
<tr><td>Vanwaar?</td><td><strong>¿de dónde?</strong></td><td>herkomst, oorsprong → de</td></tr>
</table>
<p>Deze drie vragen vereisen elk een ander voorzetsel.</p>
</div>

<h4>2. Kernvoorzetsels: statisch</h4>
<div class="grammar-box">
<p><strong>en</strong> = in, op, aan (algemene locatie)</p>
<p>Gebruik voor algemene locatie, binnen een ruimte, op een plek (zonder beweging).</p>
<p>Voorbeelden:</p>
<ul>
<li><strong>Estoy en casa.</strong> Ik ben thuis.</li>
<li><strong>El libro está en la mesa.</strong> Het boek ligt op tafel.</li>
<li><strong>Vivimos en España.</strong> Wij wonen in Spanje.</li>
</ul>
</div>

<h4>3. Kernvoorzetsels: dynamisch</h4>
<div class="grammar-box">
<p><strong>a</strong> = naar, bij (met beweging)</p>
<p>Gebruik voor richting, bestemming, doel van beweging.</p>
<p>Voorbeelden:</p>
<ul>
<li><strong>Voy a casa.</strong> Ik ga naar huis.</li>
<li><strong>Vengo a Madrid.</strong> Ik kom naar Madrid.</li>
<li><strong>Vamos al trabajo.</strong> Wij gaan naar het werk. (a + el = al)</li>
</ul>
</div>

<h4>4. Kernvoorzetsels: herkomst</h4>
<div class="grammar-box">
<p><strong>de</strong> = van, uit (herkomst, oorsprong)</p>
<p>Gebruik voor herkomst, bezit, materiaal, vanaf een punt.</p>
<p>Voorbeelden:</p>
<ul>
<li><strong>Vengo de casa.</strong> Ik kom van huis.</li>
<li><strong>Soy de Holanda.</strong> Ik kom uit Nederland.</li>
<li><strong>El libro de María.</strong> Het boek van María.</li>
</ul>
</div>

<h4>5. Por en para in ruimtelijke betekenis</h4>
<div class="grammar-box">
<p><strong>por</strong> = door, langs, via (route, gebied)</p>
<p>Gebruik voor route die je aflegt, gebied waar je doorheen gaat.</p>
<p>Voorbeelden:</p>
<ul>
<li><strong>Paso por el parque.</strong> Ik loop door het park.</li>
<li><strong>Viajo por España.</strong> Ik reis door Spanje.</li>
</ul>

<p><strong>para</strong> = naar (met doel, eindbestemming)</p>
<p>Gebruik voor bestemming met intentie, richting met specifiek doel.</p>
<p>Voorbeelden:</p>
<ul>
<li><strong>Salgo para Madrid.</strong> Ik vertrek richting Madrid.</li>
<li><strong>Este regalo es para ti.</strong> Dit cadeau is voor jou.</li>
</ul>

<p><strong>Let op:</strong> <strong>Voy por Madrid</strong> = Ik ga door Madrid (route)<br>
<strong>Voy para Madrid</strong> = Ik ga naar Madrid (bestemming)</p>
<p><em>Dit is NIET uitwisselbaar!</em></p>
</div>

<h4>5. Samentrekking met lidwoorden</h4>
<div class="grammar-box">
<p><strong>VERPLICHTE samentrekking:</strong></p>
<ul>
<li><strong>a + el = al</strong></li>
<li><strong>de + el = del</strong></li>
</ul>
<p>Voorbeelden:</p>
<ul>
<li><strong>Voy al trabajo.</strong> (a + el trabajo)</li>
<li><strong>Vengo del parque.</strong> (de + el parque)</li>
</ul>
<p><strong>GEEN samentrekking bij:</strong> a + la, de + la, a + los, de + las</p>
<p><strong>GEEN samentrekking bij eigennamen met El:</strong> Voy a El Cairo (NIET: al Cairo).</p>
</div>

<h3>📚 Grammatica</h3>

<h4>1. Absolute tijd - basiswoorden</h4>
<table class="conjugation-table">
<tr><th>Spaans</th><th>Nederlands</th></tr>
<tr><td>hoy</td><td>vandaag</td></tr>

<tr><td>anteayer</td><td>eergisteren</td></tr>
<tr><td>mañana</td><td>morgen</td></tr>

<tr><td>ya</td><td>al / nu</td></tr>

</table>

<h4>2. Dagdelen</h4>
<table class="conjugation-table">
<tr><th>Spaans</th><th>Nederlands</th></tr>
<tr><td>mañana</td><td>ochtend (ook: morgen!)</td></tr>
<tr><td>tarde</td><td>middag / namiddag</td></tr>
<tr><td>noche</td><td>avond / nacht</td></tr>
<tr><td>madrugada</td><td>vroege ochtend (0:00–6:00)</td></tr>
<tr><td>mediodía</td><td>middag (12:00)</td></tr>
<tr><td>medianoche</td><td>middernacht (0:00)</td></tr>
</table>
<div class="grammar-box">
<p><strong>Let op: mañana heeft twee betekenissen!</strong></p>
<ul>
<li><strong>mañana</strong> (zelfstandig naamwoord) = ochtend: <em>por la mañana</em> = 's ochtends</li>
<li><strong>mañana</strong> (bijwoord) = morgen: <em>para mañana</em> = voor morgen</li>
</ul>
<p>Context bepaalt de betekenis. Dit is een veelgemaakte verwarringsbron.</p>
</div>

<h4>3. Kloktijd</h4>
<div class="grammar-box">
<p><strong>Vraag:</strong> ¿Qué hora es? (Hoe laat is het?)</p>
<p><strong>Antwoord:</strong></p>
<ul>
<li>Es la una. — Het is één uur. (alleen voor 1:00)</li>
<li>Son las dos. — Het is twee uur. (voor 2:00 en verder)</li>
<li>Son las tres y media. — Het is half vier (3:30).</li>
<li>Son las cuatro y cuarto. — Het is kwart over vier (4:15).</li>
<li>Son las cinco menos cuarto. — Het is kwart voor vijf (4:45).</li>
</ul>
<p><strong>Tijdstip met a:</strong> ¿A qué hora? → A las tres. (Om drie uur.)</p>
<p><strong>Let op:</strong> Tijdstip = a, niet en: <em>a las tres</em> (NIET: en las tres).</p>
</div>

<h4>4. Duur uitdrukken met por</h4>
<div class="grammar-box">
<p><strong>por</strong> = gedurende, voor (tijdsduur)</p>
<p>Gebruik voor tijdsduur, periode waarin iets gebeurt, hoe lang iets duurt.</p>
<p>Voorbeelden:</p>
<ul>
<li><strong>Estudio por la mañana.</strong> Ik studeer 's ochtends (gedurende de ochtend).</li>
<li><strong>Trabajo por dos horas.</strong> Ik werk twee uur (lang).</li>
<li><strong>Viajo por tres días.</strong> Ik reis drie dagen (lang).</li>
</ul>
</div>

<h4>5. Deadline uitdrukken met para</h4>
<div class="grammar-box">
<p><strong>para</strong> = tegen, voor, met het oog op (deadline/tijdstip)</p>
<p>Gebruik voor deadline, tijdstip waarop iets klaar moet zijn.</p>
<p>Voorbeelden:</p>
<ul>
<li><strong>Es para mañana.</strong> Het is voor morgen (deadline).</li>
<li><strong>Estudio para el examen.</strong> Ik studeer voor het examen.</li>
<li><strong>Lo necesito para el lunes.</strong> Ik heb het nodig tegen maandag.</li>
</ul>
</div>

<h4>6. Por vs para met tijd: het verschil</h4>
<div class="grammar-box">
<p><strong>por la mañana</strong> = 's ochtends (gedurende de ochtend, algemeen)</p>
<p><strong>para mañana</strong> = voor morgen, tegen morgen (deadline)</p>

<p><strong>Vergelijk:</strong></p>
<ul>
<li><strong>Trabajo por la mañana.</strong> Ik werk 's ochtends (gewoonte).</li>
<li><strong>El informe es para mañana.</strong> Het rapport is voor morgen (deadline).</li>
</ul>
<p><em>Dit onderscheid is fundamenteel en niet optioneel!</em></p>
</div>

<h4>7. Frequentie</h4>
<div class="grammar-box">
<p>Hoe vaak iets gebeurt:</p>
<ul>
<li><strong>cada día</strong> - elke dag</li>
<li><strong>todos los días</strong> - alle dagen</li>
<li><strong>una vez</strong> - een keer</li>
<li><strong>dos veces</strong> - twee keer</li>
<li><strong>a veces</strong> - soms</li>
</ul>

<p><strong>Met por voor frequentie:</strong></p>
<ul>
<li><strong>una vez por semana</strong> - een keer per week</li>
<li><strong>dos veces por mes</strong> - twee keer per maand</li>
<li><strong>tres veces por año</strong> - drie keer per jaar</li>
</ul>
<p>Extra frequentiewoorden: <strong>de vez en cuando</strong> (af en toe), <strong>casi siempre</strong> (bijna altijd), <strong>casi nunca</strong> (bijna nooit), <strong>por día</strong> (per dag).</p>
</div>

<h4>8. Veelgemaakte fouten</h4>

<h4>1. Wat is de pretérito indefinido?</h4>
<div class="grammar-box">
<p>De <strong>pretérito indefinido</strong> (ook wel <strong>pretérito perfecto simple</strong> genoemd) is een <strong>voltooide verleden tijd</strong>.</p>

<p><strong>Gebruik:</strong></p>
<ul>

<h4>2. Regelmatige vervoeging -ar werkwoorden</h4>
<table class="conjugation-table">
<tr><th>Persoon</th><th>Uitgang</th><th>Voorbeeld: hablar</th></tr>
<tr><td>yo</td><td><strong>-é</strong></td><td><strong>hablé</strong></td></tr>
<tr><td>tú</td><td><strong>-aste</strong></td><td><strong>hablaste</strong></td></tr>
<tr><td>él/ella/usted</td><td><strong>-ó</strong></td><td><strong>habló</strong></td></tr>
<tr><td>nosotros/as</td><td><strong>-amos</strong></td><td><strong>hablamos</strong></td></tr>
<tr><td>vosotros/as</td><td><strong>-asteis</strong></td><td><strong>hablasteis</strong></td></tr>

</table>
<p><strong>Let op:</strong> yo eindigt op <strong>-é</strong> (met accent!), él/ella/usted eindigt op <strong>-ó</strong> (met accent!). Deze accenten zijn <strong>verplicht</strong>.</p>

<h3>📚 Grammatica</h3>

<h4>1. Basisstructuur van vergelijkingen</h4>
<div class="grammar-box">
<p>Er zijn drie hoofdtypes:</p>
<ul>
<li><strong>Meer dan</strong> → más … que</li>
<li><strong>Minder dan</strong> → menos … que</li>
<li><strong>Even … als</strong> → tan … como</li>
</ul>
<p><strong>Structuur:</strong> bijvoeglijk naamwoord / bijwoord + vergelijkingswoord + tweede element</p>
</div>

<h4>2. Meer dan – más … que</h4>
<div class="grammar-box">
<p><strong>Structuur:</strong> más + adjectief / bijwoord + que</p>
</div>
<div class="example-box">
<div class="example-spanish">Juan es más alto que Pedro.</div>
<div>Juan is groter dan Pedro.</div>
</div>
<div class="example-box">
<div class="example-spanish">Madrid es más grande que Valencia.</div>
<div>Madrid is groter dan Valencia.</div>
</div>
<div class="example-box">
<div class="example-spanish">Este libro es más interesante que el otro.</div>
<div>Dit boek is interessanter dan het andere.</div>
</div>
<div class="example-box">
<div class="example-spanish">Trabajo más que tú.</div>
<div>Ik werk meer dan jij.</div>
</div>

<h4>3. Minder dan – menos … que</h4>
<div class="grammar-box">
<p><strong>Structuur:</strong> menos + adjectief / bijwoord + que</p>
</div>
<div class="example-box">
<div class="example-spanish">Ella es menos alta que su hermana.</div>
<div>Zij is minder groot dan haar zus.</div>
</div>
<div class="example-box">
<div class="example-spanish">Este trabajo es menos difícil que el anterior.</div>
<div>Dit werk is minder moeilijk dan het vorige.</div>
</div>

<h4>4. Even … als – tan … como</h4>
<div class="grammar-box">
<p><strong>Structuur:</strong> tan + adjectief + como</p>
<p><em>Tan wordt gebruikt bij adjectieven en bijwoorden. Niet más bij gelijkheid.</em></p>
<p>❌ Es más alto como tú. &nbsp;→&nbsp; ✅ Es tan alto como tú.</p>

22: `
<h3>🎯 Leerdoelen</h3>

<h3>📚 Grammatica</h3>

<h4>1. Wat is de subjuntivo?</h4>
<div class="grammar-box">
<p>De subjuntivo is een <strong>modus</strong> (geen tijd). Hij drukt uit dat de spreker de inhoud als niet-feitelijk, gewenst, betwijfeld of afhankelijk beschouwt. In het Nederlands bestaat dit grotendeels niet.</p>
<p><strong>Kernregel:</strong> Twee subjecten + twee werkwoorden + verbindingswoord <em>que</em> → kans op subjuntivo.</p>
</div>

<h4>2. Vervoeging regelmatige werkwoorden</h4>
<div class="grammar-box">
<p>De vervoeging is als een "omgekeerde present indicatief": <strong>-ar</strong> krijgt <strong>-e</strong> uitgangen, <strong>-er/-ir</strong> krijgt <strong>-a</strong> uitgangen.</p>
</div>
<table class="conjugation-table">
<tr><th>Persoon</th><th>-ar (hablar)</th><th>-er (comer)</th><th>-ir (vivir)</th></tr>
<tr><td>yo</td><td>habl<strong>e</strong></td><td>com<strong>a</strong></td><td>viv<strong>a</strong></td></tr>
<tr><td>tú</td><td>habl<strong>es</strong></td><td>com<strong>as</strong></td><td>viv<strong>as</strong></td></tr>
<tr><td>él/ella</td><td>habl<strong>e</strong></td><td>com<strong>a</strong></td><td>viv<strong>a</strong></td></tr>
<tr><td>nosotros</td><td>habl<strong>emos</strong></td><td>com<strong>amos</strong></td><td>viv<strong>amos</strong></td></tr>
<tr><td>vosotros</td><td>habl<strong>éis</strong></td><td>com<strong>áis</strong></td><td>viv<strong>áis</strong></td></tr>
<tr><td>ellos</td><td>habl<strong>en</strong></td><td>com<strong>an</strong></td><td>viv<strong>an</strong></td></tr>
</table>

<h4>3. Onregelmatige werkwoorden in de subjuntivo</h4>

<tr><td>tener</td><td>tenga</td><td>tengan</td></tr>

<h4>4. Triggerconstructies — wanneer subjuntivo?</h4>
<div class="grammar-box">
<p><strong>(a) Wil, wens, verlangen:</strong></p>

<p><strong>(b) Emotie:</strong></p>
<ul>
<li>alegrarse de que, tener miedo de que, sorprender que, molestar que</li>

<p><strong>(c) Twijfel, ontkenning:</strong></p>

<p><strong>(d) Onpersoonlijke uitdrukkingen:</strong></p>
<ul>
<li>es importante que, es necesario que, es posible que, es mejor que</li>

                document.getElementById('oef-sub').innerHTML = `<div class="lesson-card" style="margin-top:1.5rem;"><div class="empty-state"><span class="empty-icon">📭</span>Geen vocabulaire gevonden voor de geselecteerde dagen.</div></div>`;
                return;
            }
            // Shuffle
            fcDeck = fcDeck.sort(() => Math.random() - 0.5);
            fcIndex = 0; fcTodayCorrect = 0; fcTodaySeen = 0; fcFlipped = false;
            renderFlashcard();
        }

        // Flashcard: toon Spaans woord → gebruiker typt Nederlands → flip → Goed/Fout
        function renderFlashcard() {
            const sub = document.getElementById('oef-sub');
            if (fcIndex >= fcDeck.length) {
                const acc = fcTodaySeen > 0 ? Math.round((fcTodayCorrect / fcTodaySeen) * 100) : 0;
                sub.innerHTML = `
                    <div class="lesson-card" style="margin-top:1.5rem;">
                        <h3 style="margin-top:0;">🎉 Klaar!</h3>

            }
            const kaart = fcDeck[fcIndex];

            sub.innerHTML = `

                    </div>
                </div>`;

            // Bind events via DOM
            const flipBtn = document.getElementById('fcFlipBtn');
            const skipBtn = document.getElementById('fcSkipBtn');
            const typInp = document.getElementById('fcTypInput');
            const goedBtn = document.getElementById('fcGoedBtn');
            const foutBtn = document.getElementById('fcFoutBtn');
            if (typInp) { setTimeout(() => typInp.focus(), 50); }
            if (typInp) typInp.addEventListener('keydown', e => { if (e.key === 'Enter') flipCard(); });
            if (flipBtn) flipBtn.addEventListener('click', flipCard);
            if (skipBtn) skipBtn.addEventListener('click', () => fcOordeel('skip'));
            if (goedBtn) goedBtn.addEventListener('click', () => fcOordeel('correct'));
            if (foutBtn) foutBtn.addEventListener('click', () => fcOordeel('fout'));
        }

        function flipCard() {
            if (fcFlipped) return;
            const card = document.getElementById('fcCard');
            const typWrap = document.getElementById('fcTypWrap');
            const actions = document.getElementById('fcActions');
            if (!card) return;
            fcFlipped = true;
            card.classList.add('flipped');
            if (typWrap) typWrap.style.display = 'none';
            if (actions) actions.style.display = 'flex';
        }

        function fcOordeel(result) {
            const kaart = fcDeck[fcIndex];
            if (result !== 'skip') {
                fcTodaySeen++;
                if (result === 'correct') fcTodayCorrect++;
                recordWordResult(kaart.spanish, kaart.meaning, result);
            }
            fcIndex++;
            fcFlipped = false;
            renderFlashcard();
        }

        // =====================================================
        // MODUS 2: TYP OEFENING
        // =====================================================
        let typDeck = [];
        let typIndex = 0;
        let typCorrect = 0;
        let typGezien = 0;
        let typBeantwoord = false;

        function renderTypSetup(container) {
            container.innerHTML = `
                <div class="lesson-card" style="margin-top:1.5rem;">
                    <h3 style="margin-top:0;">⌨️ Typ oefening</h3>
                    <p style="opacity:0.8;">Je ziet een Nederlandse betekenis — typ het Spaanse woord.</p>
                    ${buildDagFilterHTML('typ')}
                    <button class="btn" onclick="startTyp()" style="margin-top:1rem;">Start oefening</button>
                </div>
            `;
        }

        let typFouten = []; // Track fouten voor overzicht

        function startTyp() {
            const dagen = getGekozenDagen('typ');
            if (dagen.length === 0) { alert('Selecteer minimaal 1 dag.'); return; }
            typDeck = parseVocabFromDays(dagen).sort(() => Math.random() - 0.5);
            if (typDeck.length === 0) {
                document.getElementById('oef-sub').innerHTML = `<div class="lesson-card" style="margin-top:1.5rem;"><div class="empty-state"><span class="empty-icon">📭</span>Geen vocabulaire gevonden.</div></div>`;
                return;
            }
            typIndex = 0; typCorrect = 0; typGezien = 0; typBeantwoord = false; typFouten = [];
            renderTypVraag();
        }

        function renderTypVraag() {
            const sub = document.getElementById('oef-sub');
            if (typIndex >= typDeck.length) {
                const acc = typGezien > 0 ? Math.round((typCorrect/typGezien)*100) : 0;

                if (typFouten.length > 0) {

                        ${typFouten.map(f => `<div style="margin-bottom:0.6rem; padding:0.5rem; background:rgba(192,57,43,0.06); border-radius:4px; border-left:3px solid #c0392b;">
                            <span style="opacity:0.7;">🇳🇱 ${f.meaning}</span> → <strong style="color:#c0392b;">${f.jouweAntwoord || '(leeg)'}</strong> → <strong style="color:#2d7a3a;">${f.correct}</strong>
                        </div>`).join('')}

                sub.innerHTML = `
                    <div class="lesson-card" style="margin-top:1.5rem;">
                        <h3 style="margin-top:0;">🎉 Klaar!</h3>

                            <div class="fc-stat"><div class="num">${typGezien}</div><div class="lbl">Vragen</div></div>
                            <div class="fc-stat"><div class="num">${typCorrect}</div><div class="lbl">Goed</div></div>
                            <div class="fc-stat"><div class="num">${acc}%</div><div class="lbl">Nauwkeurigheid</div></div>

            const v = typDeck[typIndex];
            sub.innerHTML = `
                <div class="lesson-card" style="margin-top:1.5rem;">
                    <div class="fc-progress-label">Vraag ${typIndex+1} van ${typDeck.length} &nbsp;|&nbsp; Goed: ${typCorrect}</div>
                    <div class="progress-bar" style="margin-bottom:1rem;">
                        <div class="progress-fill" style="width:${Math.round((typIndex/typDeck.length)*100)}%"></div>
                    </div>
                    <div class="typ-vraag">🇳🇱 ${v.meaning}</div>
                    <p style="text-align:center;opacity:0.6;font-size:0.9rem;">Dag ${v.day}</p>
                    <input class="typ-input" id="typInput" type="text" placeholder="Typ het Spaanse woord…"
                        onkeydown="if(event.key==='Enter') controleerTyp()">
                    <div style="text-align:center; display:flex; justify-content:center; gap:0.8rem; margin-top:0.5rem;">
                        <button class="btn" onclick="controleerTyp()">Controleer</button>
                        <button class="btn btn-skip" id="typVolgendeBtn" onclick="typVolgende()" style="display:none;">Volgende →</button>
                    </div>
                    <div id="typFeedback"></div>
                </div>`;
            setTimeout(() => {
                const inp = document.getElementById('typInput');
                if (inp) inp.focus();

        function controleerTyp() {
            if (typBeantwoord) return;
            const inp = document.getElementById('typInput');
            if (!inp) return;
            const antwoord = inp.value;
            const v = typDeck[typIndex];
            const result = checkAnswer(antwoord, v.spanish);

            typBeantwoord = true;
            typGezien++;
            if (result === 'correct' || result === 'accent') typCorrect++;
            else typFouten.push({ meaning: v.meaning, correct: v.spanish, jouweAntwoord: antwoord });
            recordWordResult(v.spanish, v.meaning, result);

            inp.disabled = true;

            const fb = document.getElementById('typFeedback');
            if (result === 'correct') {
                fb.innerHTML = `<div class="typ-feedback correct">✅ Correct! <strong>${v.spanish}</strong></div>`;
            } else if (result === 'accent') {
                fb.innerHTML = `<div class="typ-feedback accent">⚠️ Bijna! Het accent is belangrijk: <strong>${v.spanish}</strong></div>`;
            } else {
                fb.innerHTML = `<div class="typ-feedback fout">❌ Helaas. Het juiste antwoord: <strong>${v.spanish}</strong></div>`;
            }
            document.getElementById('typVolgendeBtn').style.display = 'inline-block';
            typBeantwoord = false;
        }

        function typVolgende() {
            typIndex++;
            renderTypVraag();
        }

        // =====================================================
        // MODUS 3: MINI QUIZ (multiple choice)
        // =====================================================
        let quizVragen = [];
        let quizIndex = 0;
        let quizScore = 0;
        const QUIZ_LENGTE = 10;

        function renderQuizSetup(container) {
            container.innerHTML = `
                <div class="lesson-card" style="margin-top:1.5rem;">
                    <h3 style="margin-top:0;">🎯 Mini quiz</h3>
                    <p style="opacity:0.8;">Wat betekent het Spaanse woord? Kies het juiste antwoord (${QUIZ_LENGTE} vragen).</p>
                    ${buildDagFilterHTML('quiz')}
                    <button class="btn" onclick="startQuiz()" style="margin-top:1rem;">Start quiz</button>
                </div>
            `;
        }

        function startQuiz() {
            const dagen = getGekozenDagen('quiz');
            if (dagen.length === 0) { alert('Selecteer minimaal 1 dag.'); return; }
            const vocab = parseVocabFromDays(dagen);
            if (vocab.length < 4) {
                alert('Je hebt minimaal 4 vocabulaire-items nodig voor een quiz. Selecteer meer dagen.');
                return;
            }
            // Genereer vragen
            const shuffle = arr => arr.sort(() => Math.random() - 0.5);
            const pool = shuffle([...vocab]);
            quizVragen = [];
            for (let i = 0; i < Math.min(QUIZ_LENGTE, pool.length); i++) {
                const correct = pool[i];
                // 3 distractors uit de rest
                const rest = vocab.filter(v => v.spanish !== correct.spanish);
                const distractors = shuffle(rest).slice(0, 3);
                const opties = shuffle([correct, ...distractors]);
                quizVragen.push({ correct, opties });
            }
            quizIndex = 0; quizScore = 0;
            renderQuizVraag();
        }

        function renderQuizVraag() {
            const sub = document.getElementById('oef-sub');
            if (quizIndex >= quizVragen.length) {
                const pct = Math.round((quizScore/quizVragen.length)*100);
                let emoji = pct >= 80 ? '🏆' : pct >= 50 ? '👍' : '💪';
                sub.innerHTML = `
                    <div class="lesson-card" style="margin-top:1.5rem; text-align:center;">
                        <h3 style="margin-top:0;">${emoji} Quiz klaar!</h3>
                        <div class="quiz-score">${quizScore} / ${quizVragen.length}</div>
                        <div class="quiz-score-lbl">${pct}% goed — ${pct>=80?'Uitstekend!':pct>=50?'Goed gedaan!':'Blijf oefenen!'}</div>
                        <button class="btn" onclick="startModus('quiz')" style="margin-top:1.5rem;">Opnieuw</button>
                    </div>`;
                return;
            }
            const q = quizVragen[quizIndex];
            const optiesHTML = q.opties.map((opt, i) =>
                `<button class="quiz-opt" id="qopt${i}" onclick="quizAntwoord(${i}, '${opt.spanish.replace(/'/g,"\\'")}', '${q.correct.spanish.replace(/'/g,"\\'")}')">
                    ${opt.meaning}
                </button>`
            ).join('');
            sub.innerHTML = `
                <div class="lesson-card" style="margin-top:1.5rem;">
                    <div class="fc-progress-label">Vraag ${quizIndex+1} van ${quizVragen.length} &nbsp;|&nbsp; Score: ${quizScore}</div>
                    <div class="progress-bar" style="margin-bottom:1rem;">
                        <div class="progress-fill" style="width:${Math.round((quizIndex/quizVragen.length)*100)}%"></div>
                    </div>
                    <div class="quiz-vraag">Wat betekent: <strong style="color:var(--terracotta)">${q.correct.spanish}</strong>?</div>
                    <div class="quiz-opties">${optiesHTML}</div>
                    <div id="quizVolgende" style="display:none;text-align:center;margin-top:1.5rem;">
                        <button class="btn btn-skip" onclick="quizVolgende()">Volgende →</button>
                    </div>
                </div>`;
        }

        function quizAntwoord(gekozenIdx, gekozenSpaans, correctSpaans) {
            // Disable alle knoppen
            document.querySelectorAll('.quiz-opt').forEach(b => b.disabled = true);
            const isCorrect = gekozenSpaans === correctSpaans;
            // Markeer goed/fout
            document.querySelectorAll('.quiz-opt').forEach((b, i) => {
                const optSpaans = quizVragen[quizIndex].opties[i].spanish;
                if (optSpaans === correctSpaans) b.classList.add('correct');
                else if (i === gekozenIdx && !isCorrect) b.classList.add('fout');
            });
            if (isCorrect) {
                quizScore++;
                recordWordResult(correctSpaans, quizVragen[quizIndex].correct.meaning, 'correct');
            } else {
                recordWordResult(correctSpaans, quizVragen[quizIndex].correct.meaning, 'fout');
            }
            document.getElementById('quizVolgende').style.display = 'block';
        }

        function quizVolgende() {
            quizIndex++;
            renderQuizVraag();
        }

        // =====================================================
        // STAP 2: SLIMME HERHALING (spaced repetition light)
        // =====================================================

        // Bereken een prioriteitsscore voor een woord (hoger = meer urgent herhalen)
        function herhalenScore(ws) {
            const now = Date.now();
            const hoursSinceSeen = ws.lastSeenISO
                ? (now - new Date(ws.lastSeenISO).getTime()) / 3600000
                : 9999;
            const accuracy = ws.seenCount > 0 ? ws.correctCount / ws.seenCount : 0;
            const foutPenalty = ws.lastResult === 'fout' ? 50 : 0;
            const oudheidBonus = Math.min(hoursSinceSeen, 168); // max 1 week
            const nieuwBonus = ws.seenCount < 3 ? 30 : 0;
            // Hoge score = hoog prioriteit
            return foutPenalty + oudheidBonus + nieuwBonus + (1 - accuracy) * 40;
        }

        // Geeft uitleg waarom een woord gekozen is (in eenvoudige taal)
        function herhalenReden(ws) {
            if (!ws.lastSeenISO) return 'Nieuw woord, nog nooit geoefend';
            const hours = (Date.now() - new Date(ws.lastSeenISO).getTime()) / 3600000;
            const accuracy = ws.seenCount > 0 ? Math.round((ws.correctCount / ws.seenCount) * 100) : 0;
            if (ws.lastResult === 'fout') return `Vorige keer fout (${accuracy}% correct)`;
            if (ws.seenCount < 3) return `Weinig geoefend (${ws.seenCount}×)`;
            if (hours > 48) return `Lang niet gezien (${Math.round(hours / 24)} dagen geleden)`;
            return `Accuracy laag (${accuracy}%)`;
        }

        // Info voor het menu (hoeveel woorden klaarstaan)
        function getHerhalenInfo() {
            const allVocab = parseVocabFromDays(getAllDays());
            const state = getAppState();
            let ongezien = 0, teHerhalen = 0;
            allVocab.forEach(v => {
                const ws = state.wordStats[v.spanish.toLowerCase()];
                if (!ws) ongezien++;
                else if (herhalenScore(ws) > 20) teHerhalen++;
            });
            if (ongezien + teHerhalen === 0) {
                return { uitleg: '✅ Geen woorden om te herhalen. Goed gedaan!' };
            }
            return { uitleg: `${teHerhalen} woorden om te herhalen, ${ongezien} nog nooit geoefend.` };
        }

        // Kiest de beste woorden op basis van spaced repetition score
        function kiesHerhalenDeck(aantal) {
            const allVocab = parseVocabFromDays(getAllDays());
            const state = getAppState();

            const gescoord = allVocab.map(v => {
                const ws = state.wordStats[v.spanish.toLowerCase()];
                const score = ws ? herhalenScore(ws) : 999; // ongeziene woorden altijd hoog
                const reden = ws ? herhalenReden(ws) : 'Nieuw woord, nog nooit geoefend';
                return { ...v, score, reden, ws };
            });

            gescoord.sort((a, b) => b.score - a.score);
            return gescoord.slice(0, aantal);
        }

        // Flashcard-weergave voor herhaal-deck (met uitleg)
        let hrDeck = [];
        let hrIndex = 0;
        let hrCorrect = 0;
        let hrFlipped = false;

        function startHerhalen() {
            const aantalEl = document.getElementById('herhalenAantal');
            const aantal = aantalEl ? parseInt(aantalEl.value) : 15;
            hrDeck = kiesHerhalenDeck(aantal);

                    <div class="lesson-card" style="margin-top:1.5rem;">

                    </div>`;
                return;
            }
            hrIndex = 0; hrCorrect = 0; hrFlipped = false;
            renderHerhalenFlashcard();
        }

        // Herhaling flashcard: typ eerst, dan flip, dan Goed/Fout
        function renderHerhalenFlashcard() {
            const sub = document.getElementById('oef-sub');

                const acc = hrDeck.length > 0 ? Math.round((hrCorrect / hrDeck.length) * 100) : 0;
                sub.innerHTML = `
                    <div class="lesson-card" style="margin-top:1.5rem;">
                        <h3 style="margin-top:0;">🎉 Herhaling klaar!</h3>
                        <div class="fc-stats">
                            <div class="fc-stat"><div class="num">${hrDeck.length}</div><div class="lbl">Gezien</div></div>
                            <div class="fc-stat"><div class="num">${hrCorrect}</div><div class="lbl">Goed</div></div>
                            <div class="fc-stat"><div class="num">${acc}%</div><div class="lbl">Nauwkeurigheid</div></div>
                        </div>
                        <button class="btn" onclick="loadOefelenMenu()">Terug naar menu</button>
                    </div>`;
                return;
            }
            const kaart = hrDeck[hrIndex];
            sub.innerHTML = `
                <div class="lesson-card" style="margin-top:1.5rem;">
                    <div class="fc-progress-label">Herhaling ${hrIndex+1} van ${hrDeck.length} &nbsp;|&nbsp; Goed: ${hrCorrect}</div>
                    <div class="progress-bar" style="margin-bottom:1rem;">
                        <div class="progress-fill" style="width:${Math.round((hrIndex/hrDeck.length)*100)}%"></div>
                    </div>
                    <div style="text-align:center; margin-bottom:0.8rem;">
                        <span style="background:rgba(232,169,98,0.2); padding:0.3rem 0.8rem; border-radius:20px; font-size:0.88rem; color:var(--deep-blue);">
                            💡 ${kaart.reden}
                        </span>
                    </div>
                    <div class="flashcard-wrap">
                        <div class="flashcard" id="hrCard">

                            </div>
                        </div>
                    </div>
                    <div id="hrTypWrap" style="margin-top:1rem;text-align:center;">
                        <p style="opacity:0.7;font-size:0.95rem;margin-bottom:0.5rem;">Typ de Nederlandse betekenis, draai dan de kaart om.</p>
                        <input class="typ-input" id="hrTypInput" placeholder="Typ de betekenis…" style="margin-bottom:0.8rem;">
                        <br>
                        <button class="btn btn-sm" id="hrFlipBtn">Draai kaart om →</button>
                        <button class="btn btn-skip btn-sm" id="hrSkipBtn" style="margin-left:0.5rem;">⏭ Overslaan</button>
                    </div>
                    <div class="flashcard-actions" id="hrActions" style="display:none;">
                        <button class="btn btn-goed btn-sm" id="hrGoedBtn">👍 Goed</button>
                        <button class="btn btn-fout btn-sm" id="hrFoutBtn">👎 Fout</button>
                    </div>
                </div>`;

            const flipBtn = document.getElementById('hrFlipBtn');
            const skipBtn = document.getElementById('hrSkipBtn');
            const typInp = document.getElementById('hrTypInput');
            const goedBtn = document.getElementById('hrGoedBtn');
            const foutBtn = document.getElementById('hrFoutBtn');
            if (typInp) { setTimeout(() => typInp.focus(), 50); }
            if (typInp) typInp.addEventListener('keydown', e => { if (e.key === 'Enter') hrFlipCard(); });
            if (flipBtn) flipBtn.addEventListener('click', hrFlipCard);
            if (skipBtn) skipBtn.addEventListener('click', () => hrOordeel('skip'));
            if (goedBtn) goedBtn.addEventListener('click', () => hrOordeel('correct'));
            if (foutBtn) foutBtn.addEventListener('click', () => hrOordeel('fout'));
        }

        function hrFlipCard() {
            if (hrFlipped) return;
            const card = document.getElementById('hrCard');
            const typWrap = document.getElementById('hrTypWrap');
            const actions = document.getElementById('hrActions');
            if (!card) return;
            hrFlipped = true;
            card.classList.add('flipped');
            if (typWrap) typWrap.style.display = 'none';
            if (actions) actions.style.display = 'flex';
        }

        function hrOordeel(result) {
            const kaart = hrDeck[hrIndex];
            if (result !== 'skip') {
                if (result === 'correct') hrCorrect++;
                recordWordResult(kaart.spanish, kaart.meaning, result);
            }
            hrIndex++;

        // Rendert de interactieve oefensectie onderaan een les
        // Bouw les-oefeningen via DOM (geen inline onclick-strings met speciale tekens)
        function renderLesOefeningen(day) {
            const invul = lesInvulOef[day] || [];
            const zinnen = lesZinOef[day] || [];
            const sim = lesSims[day] || null;
            const mini = lesMiniOef[day] || [];
            if (invul.length === 0 && zinnen.length === 0 && !sim && mini.length === 0) return '';

            window._lesDay = day;

            const hasInvul = invul.length > 0;
            const hasZin = zinnen.length > 0;
            const hasMini = mini.length > 0;

            let tabs = '';
            let firstActive = true;
            if (hasMini) { tabs += `<button class="les-oef-tab ${firstActive?'active':''}" data-panel="lop-mini">Mini oefeningen</button>`; firstActive = false; }
            if (hasInvul) { tabs += `<button class="les-oef-tab ${firstActive?'active':''}" data-panel="lop-invul">Invuloefening</button>`; firstActive = false; }
            if (hasZin) { tabs += `<button class="les-oef-tab ${firstActive?'active':''}" data-panel="lop-zinnen">Zinnen vertalen</button>`; firstActive = false; }
            if (sim) { tabs += `<button class="les-oef-tab ${firstActive?'active':''}" data-panel="lop-sim">Gesprekssimulator</button>`; firstActive = false; }

            // Mini exercises HTML
            let miniHTML = '';
            if (hasMini) {
                let miniContent = mini.map((oef, oi) => {
                    if (oef.type === 'meerkeuze') {
                        const vr = oef.vragen.map((v, vi) => {
                            const opts = v.opties.map((o, idx) =>
                                `<button class="mini-mc-opt" data-oef="${oi}" data-vraag="${vi}" data-idx="${idx}">${o}</button>`
                            ).join('');
                            return `<div class="mini-mc-vraag" id="miniMc${oi}_${vi}">
                                <div class="mini-mc-zin">${v.vraag}</div>
                                <div class="mini-mc-opts">${opts}</div>
                                <div class="mini-mc-fb" id="miniMcFb${oi}_${vi}"></div>
                            </div>`;
                        }).join('');
                        return `<div class="mini-oef-blok"><h4>${oef.titel}</h4>${vr}</div>`;
                    } else if (oef.type === 'koppel') {
                        const shuffledRight = [...oef.items].sort(() => Math.random() - 0.5);
                        const leftItems = oef.items.map((item, idx) =>
                            `<div class="koppel-item koppel-left" data-oef="${oi}" data-idx="${idx}" data-match="${item.right}">${item.left}</div>`
                        ).join('');
                        const rightItems = shuffledRight.map((item, idx) =>
                            `<div class="koppel-item koppel-right" data-oef="${oi}" data-ridx="${idx}" data-val="${item.right}">${item.right}</div>`
                        ).join('');
                        return `<div class="mini-oef-blok"><h4>${oef.titel}</h4>
                            <p style="opacity:0.7;font-size:0.9rem;margin-bottom:0.5rem;">Klik links, dan rechts om te koppelen.</p>
                            <div class="koppel-container" id="koppelWrap${oi}">
                                <div class="koppel-col">${leftItems}</div>
                                <div class="koppel-col">${rightItems}</div>
                            </div>
                            <div class="koppel-score" id="koppelScore${oi}"></div>
                        </div>`;
                    } else if (oef.type === 'woordzoeker') {
                        const vr = oef.vragen.map((v, vi) =>
                            `<div class="mini-wz-vraag" id="miniWz${oi}_${vi}">
                                <span class="mini-wz-hint">${v.hint} →</span>
                                <input class="mini-wz-input" id="miniWzInp${oi}_${vi}" placeholder="..." data-oef="${oi}" data-idx="${vi}">
                                <span class="mini-wz-fb" id="miniWzFb${oi}_${vi}"></span>
                            </div>`
                        ).join('');
                        return `<div class="mini-oef-blok"><h4>${oef.titel}</h4>${vr}</div>`;
                    }
                    return '';
                }).join('');
                miniHTML = `<div class="les-oef-panel active" id="lop-mini">
                    <p style="opacity:0.8;margin-bottom:1rem;">Snelle oefeningetjes bij deze les!</p>
                    ${miniContent}
                </div>`;
            }

            let invulHTML = '';
            if (hasInvul) {
                const rijen = invul.map((v, i) => {
                    const parts = v.zin.split('___');
                    return `<div class="invul-zin" id="invulRij${i}">
                        ${parts[0]}<input class="invul-input" id="invulInp${i}" data-idx="${i}" placeholder="…">${parts[1]||''}
                        <button class="invul-check-btn" data-idx="${i}" style="background:none;border:1px solid var(--ochre);border-radius:4px;padding:0.1rem 0.6rem;cursor:pointer;font-size:0.85rem;color:var(--deep-blue);margin-left:0.3rem;">✓</button>
                        <span class="invul-result" id="invulRes${i}"></span>
                    </div>`;
                }).join('');
                invulHTML = `
                    <div class="les-oef-panel ${!hasMini?'active':''}" id="lop-invul">
                        <p style="opacity:0.8;margin-bottom:1rem;">Vul het juiste Spaanse woord in. Enter of ✓ = controleer.</p>
                        <div id="invulForm">${rijen}</div>
                        <div style="margin-top:1rem;display:flex;gap:0.8rem;flex-wrap:wrap;">
                            <button class="btn btn-sm" id="invulAllesBtn">Controleer alles</button>
                            <button class="btn btn-sm" id="invulResetBtn" style="background:var(--deep-blue)">↺ Opnieuw</button>
                        </div>
                        <div id="invulScore" style="margin-top:1rem;font-weight:600;color:var(--terracotta);"></div>
                    </div>`;
            }

            let zinHTML = '';
            if (hasZin) {
                const blokken = zinnen.map((z, i) =>
                    `<div class="zin-blok">
                        <div class="zin-nl">🇳🇱 ${z.nl}</div>
                        <input class="zin-input" id="zinInp${i}" data-idx="${i}" placeholder="Typ de Spaanse vertaling…">
                        <div class="zin-feedback" id="zinFb${i}"></div>
                    </div>`
                ).join('');
                zinHTML = `
                    <div class="les-oef-panel ${!hasMini&&!hasInvul?'active':''}" id="lop-zinnen">
                        <p style="opacity:0.8;margin-bottom:1rem;">Vertaal naar het Spaans. Enter = controleer.</p>
                        ${blokken}
                        <button class="btn btn-sm" id="zinAllesBtn" style="margin-top:1rem;">Controleer alles</button>
                    </div>`;
            }

            let simHTML = '';
            if (sim) {
                simHTML = `
                    <div class="les-oef-panel ${!hasMini&&!hasInvul&&!hasZin?'active':''}" id="lop-sim">
                        <p style="opacity:0.8;margin-bottom:0.8rem;">Kies de juiste reactie in het gesprek.</p>
                        <div id="simChat" class="sim-chat"></div>
                        <div id="simOpties" class="sim-opties"></div>
                        <div class="sim-score" id="simScore"></div>
                        <button class="btn btn-sm" id="simOpnieuwBtn" style="margin-top:1rem;">↺ Opnieuw</button>
                    </div>`;
            }

            return `
                <div class="les-oef-wrap" id="lesOefWrap">
                    <h3 style="margin-top:0;">✍️ Interactief oefenen</h3>
                    <div class="les-oef-tabs">${tabs}</div>
                    ${miniHTML}${invulHTML}${zinHTML}${simHTML}
                </div>`;
        }

        // Bind alle event listeners voor les-oefeningen via DOM (geen inline onclick met speciale tekens)
        function bindLesOefelenEvents(day) {
            const invul = lesInvulOef[day] || [];
            const zinnen = lesZinOef[day] || [];
            const sim = lesSims[day] || null;

            // Tab switching
            document.querySelectorAll('#lesOefWrap .les-oef-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    const panelId = this.dataset.panel;
                    document.querySelectorAll('#lesOefWrap .les-oef-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('#lesOefWrap .les-oef-panel').forEach(p => p.classList.remove('active'));
                    this.classList.add('active');
                    const panel = document.getElementById(panelId);
                    if (panel) panel.classList.add('active');
                    if (panelId === 'lop-sim') startSim(day);
                });
            });

            // Invul: ✓ knoppen en Enter
            invul.forEach((v, i) => {
                const inp = document.getElementById(`invulInp${i}`);
                const btn = document.querySelector(`.invul-check-btn[data-idx="${i}"]`);
                if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') controleerInvul(i, v.blank, v.hint); });
                if (btn) btn.addEventListener('click', () => controleerInvul(i, v.blank, v.hint));
            });
            const invulAlles = document.getElementById('invulAllesBtn');
            const invulReset = document.getElementById('invulResetBtn');
            if (invulAlles) invulAlles.addEventListener('click', () => controleerAlleInvul(day));
            if (invulReset) invulReset.addEventListener('click', () => resetInvul(day));

            // Zinnen: Enter
            zinnen.forEach((z, i) => {
                const inp = document.getElementById(`zinInp${i}`);
                if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') controleerZin(i, z.es, z.nl); });
            });
            const zinAlles = document.getElementById('zinAllesBtn');
            if (zinAlles) zinAlles.addEventListener('click', () => controleerAlleZinnen(day));

            // Sim opnieuw
            const simBtn = document.getElementById('simOpnieuwBtn');
            if (simBtn) simBtn.addEventListener('click', () => startSim(day));

            // Mini oefeningen events
            const mini = lesMiniOef[day] || [];
            mini.forEach((oef, oi) => {
                if (oef.type === 'meerkeuze') {
                    oef.vragen.forEach((v, vi) => {
                        document.querySelectorAll(`.mini-mc-opt[data-oef="${oi}"][data-vraag="${vi}"]`).forEach(btn => {
                            btn.addEventListener('click', function() {
                                const idx = parseInt(this.dataset.idx);
                                const fb = document.getElementById(`miniMcFb${oi}_${vi}`);
                                const parent = document.getElementById(`miniMc${oi}_${vi}`);
                                parent.querySelectorAll('.mini-mc-opt').forEach((b, bi) => {
                                    b.disabled = true;
                                    if (bi === v.correct) b.classList.add('mc-correct');
                                    else if (bi === idx && idx !== v.correct) b.classList.add('mc-fout');
                                    else b.style.opacity = '0.4';
                                });
                                fb.textContent = idx === v.correct ? '✅ Goed!' : '❌ Helaas, het juiste antwoord is gemarkeerd.';
                                fb.className = 'mini-mc-fb ' + (idx === v.correct ? 'ok' : 'nee');
                            });
                        });
                    });
                } else if (oef.type === 'koppel') {
                    const wrap = document.getElementById(`koppelWrap${oi}`);
                    if (wrap) {
                        let selectedLeft = null;
                        let matchCount = 0;
                        wrap.querySelectorAll('.koppel-left').forEach(el => {
                            el.addEventListener('click', function() {
                                if (this.classList.contains('koppel-done')) return;
                                wrap.querySelectorAll('.koppel-left').forEach(l => l.classList.remove('koppel-selected'));
                                this.classList.add('koppel-selected');
                                selectedLeft = this;
                            });
                        });
                        wrap.querySelectorAll('.koppel-right').forEach(el => {
                            el.addEventListener('click', function() {
                                if (!selectedLeft || this.classList.contains('koppel-done')) return;
                                const match = selectedLeft.dataset.match;
                                const val = this.dataset.val;
                                if (match === val) {
                                    selectedLeft.classList.add('koppel-done');
                                    this.classList.add('koppel-done');
                                    selectedLeft.classList.remove('koppel-selected');
                                    matchCount++;
                                    const score = document.getElementById(`koppelScore${oi}`);
                                    if (matchCount === oef.items.length && score) {
                                        score.textContent = '✅ Alles gekoppeld!';
                                        score.style.color = '#2d7a3a';
                                    }
                                } else {
                                    selectedLeft.classList.add('koppel-wrong');
                                    this.classList.add('koppel-wrong');
                                    setTimeout(() => {
                                        selectedLeft.classList.remove('koppel-wrong', 'koppel-selected');
                                        this.classList.remove('koppel-wrong');
                                    }, 600);
                                }
                                selectedLeft = null;
                            });
                        });
                    }
                } else if (oef.type === 'woordzoeker') {
                    oef.vragen.forEach((v, vi) => {
                        const inp = document.getElementById(`miniWzInp${oi}_${vi}`);
                        if (inp) {
                            inp.addEventListener('keydown', function(e) {
                                if (e.key === 'Enter') {
                                    const fb = document.getElementById(`miniWzFb${oi}_${vi}`);
                                    const result = checkAnswer(this.value, v.antwoord);
                                    this.disabled = true;
                                    if (result === 'correct') {
                                        fb.textContent = '✅';
                                        fb.className = 'mini-wz-fb ok';
                                        this.classList.add('correct-inp');
                                    } else if (result === 'accent') {
                                        fb.textContent = `⚠️ (${v.antwoord})`;
                                        fb.className = 'mini-wz-fb ok';
                                        this.classList.add('correct-inp');
                                    } else {
                                        fb.innerHTML = `❌ ${v.antwoord}`;
                                        fb.className = 'mini-wz-fb nee';
                                        this.classList.add('fout-inp');
                                    }
                                }
                            });
                        }
                    });
                }
            });
        }

            wrap.querySelectorAll('.les-oef-tab').forEach(t => t.classList.remove('active'));
            wrap.querySelectorAll('.les-oef-panel').forEach(p => p.classList.remove('active'));
