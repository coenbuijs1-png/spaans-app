        function controleerInvul(idx, correct, hint) {
            const inp = document.getElementById(`invulInp${idx}`);
            const res = document.getElementById(`invulRes${idx}`);
            if (!inp || inp.disabled) return;
            const result = checkAnswer(inp.value, correct);
            inp.disabled = true;
            if (result === 'correct') {
                inp.classList.add('correct-inp');
                res.textContent = '✅';
                res.className = 'invul-result ok';
            } else if (result === 'accent') {
                inp.classList.add('correct-inp');
                res.textContent = `⚠️ (${correct})`;
                res.className = 'invul-result ok';
            } else {
                inp.classList.add('fout-inp');
                res.innerHTML = `❌ → <strong>${correct}</strong> <em style="font-size:0.82rem">(${hint})</em>`;
                res.className = 'invul-result nee';
            }
        }

        function controleerAlleInvul(day) {
            const oef = lesInvulOef[day] || [];
            let goed = 0;
            oef.forEach((v, i) => {
                controleerInvul(i, v.blank, v.hint);
                const inp = document.getElementById(`invulInp${i}`);
                if (inp && inp.classList.contains('correct-inp')) goed++;
            });
            const score = document.getElementById('invulScore');
            if (score) score.textContent = `Score: ${goed} / ${oef.length}`;
        }

        function resetInvul(day) {
            const oef = lesInvulOef[day] || [];
            oef.forEach((_, i) => {
                const inp = document.getElementById(`invulInp${i}`);
                const res = document.getElementById(`invulRes${i}`);
                if (inp) { inp.value = ''; inp.disabled = false; inp.className = 'invul-input'; }
                if (res) { res.textContent = ''; res.className = 'invul-result'; }
            });
            const score = document.getElementById('invulScore');
            if (score) score.textContent = '';
        }

        function controleerZin(idx, correct, nl) {
            const inp = document.getElementById(`zinInp${idx}`);
            const fb = document.getElementById(`zinFb${idx}`);
            if (!inp || !fb || inp.disabled) return;
            // Zins-vergelijking: case-insensitive, diacritics-tolerant, trim interpunctie
            const strip = s => stripDiacritics(s.replace(/[¿¡.,!?]/g,'').trim().toLowerCase());
            const inp_s = strip(inp.value);
            const cor_s = strip(correct);
            inp.disabled = true;
            fb.classList.add('show');
            if (inp_s === cor_s) {
                fb.className = 'zin-feedback show ok';
                fb.textContent = '✅ Correct!';
            } else if (inp_s === strip(inp.value) && inp.value.trim() !== '') {
                // Probeer losser: accenten negeren
                fb.className = 'zin-feedback show nee';
                fb.innerHTML = `❌ Antwoord: <strong>${correct}</strong>`;
            } else {
                fb.className = 'zin-feedback show nee';
                fb.innerHTML = `❌ Antwoord: <strong>${correct}</strong>`;
            }
        }

        function controleerAlleZinnen(day) {
            const zinnen = lesZinOef[day] || [];
            zinnen.forEach((z, i) => controleerZin(i, z.es, z.nl));
        }

        // Gesprekssimulator state
        let simStap = 0;
        let simScore = 0;
        let simDay = null;
        let simKlaar = false;

        function startSim(day) {
            simDay = day;
            simStap = 0;
            simScore = 0;
            simKlaar = false;
            const chat = document.getElementById('simChat');
            const opties = document.getElementById('simOpties');
            const score = document.getElementById('simScore');
            if (!chat) return;
            chat.innerHTML = '';
            opties.innerHTML = '';
            score.textContent = '';
            renderSimStap();
        }

        function renderSimStap() {
            const sim = lesSims[simDay];
            if (!sim) return;
            const chat = document.getElementById('simChat');
            const opties = document.getElementById('simOpties');

            if (simStap >= sim.stappen.length) {
                // Klaar
                opties.innerHTML = '';
                const sc = document.getElementById('simScore');
                if (sc) sc.textContent = `🎉 Klaar! Score: ${simScore} / ${sim.stappen.length}`;
                return;
            }

            const stap = sim.stappen[simStap];
            // Bot bericht
            const botMsg = document.createElement('div');
            botMsg.className = 'sim-msg bot';
            botMsg.textContent = stap.bot;
            chat.appendChild(botMsg);

            // Hint
            const hintMsg = document.createElement('div');
            hintMsg.className = 'sim-msg hint';
            hintMsg.textContent = `💡 "${stap.hint}"`;
            chat.appendChild(hintMsg);

            chat.scrollTop = chat.scrollHeight;

            // Opties
            opties.innerHTML = stap.opties.map((opt, i) =>
                `<button class="sim-opt" id="simOpt${i}" onclick="kiesSim(${i})">${opt.tekst}</button>`
            ).join('');
        }

        function kiesSim(idx) {
            const sim = lesSims[simDay];
            if (!sim || simKlaar) return;
            const stap = sim.stappen[simStap];
            const gekozen = stap.opties[idx];
            const chat = document.getElementById('simChat');
            const opties = document.getElementById('simOpties');

            // Disable alle knoppen
            document.querySelectorAll('.sim-opt').forEach((b, i) => {
                b.disabled = true;
                if (stap.opties[i].correct) b.classList.add('correct-keuze');
                else if (i === idx && !gekozen.correct) b.classList.add('fout-keuze');
                else b.style.opacity = '0.5';
            });

            // User bericht in chat
            const userMsg = document.createElement('div');
            userMsg.className = 'sim-msg user';
            userMsg.textContent = gekozen.tekst;
            chat.appendChild(userMsg);

            // Feedback bericht
            const fbMsg = document.createElement('div');
            fbMsg.className = 'sim-msg hint';
            fbMsg.textContent = gekozen.uitleg;
            chat.appendChild(fbMsg);
            chat.scrollTop = chat.scrollHeight;

            if (gekozen.correct) simScore++;
            simStap++;

            setTimeout(() => {
                opties.innerHTML = '';
                renderSimStap();
            }, 1200);
        }

                    { nl: 'Wat is de hoofdstad van Argentinië?', es: '¿Cuál es la capital de Argentina?' },

                    { nl: 'Welke taal spreek jij?', es: '¿Qué idioma hablas?' },
                ],
                sim: null
            },
            politiek: {
                icon: '🏛️', naam: "Politiek & maatschappij",
                vocab: [
                    { spanish: 'el gobierno', meaning: 'de regering' },
                    { spanish: 'el presidente', meaning: 'de president' },
                    { spanish: 'el partido', meaning: 'de partij' },

                    { spanish: 'votar', meaning: 'stemmen' },

                    { spanish: 'el impuesto', meaning: 'de belasting' },
                    { spanish: 'la libertad', meaning: 'de vrijheid' },
                    { spanish: 'la igualdad', meaning: 'de gelijkheid' },
                    { spanish: 'el medio ambiente', meaning: 'het milieu' },
                ],
                zinnen: [
                    { nl: 'De verkiezingen zijn volgende maand.', es: 'Las elecciones son el mes que viene.' },
                    { nl: 'Ik stem op de groene partij.', es: 'Voto al partido verde.' },
                    { nl: 'De wet moet worden veranderd.', es: 'La ley tiene que ser cambiada.' },
                    { nl: 'Vrijheid is een fundamenteel recht.', es: 'La libertad es un derecho fundamental.' },
                    { nl: 'Het milieu is ons belangrijkste probleem.', es: 'El medio ambiente es nuestro problema más importante.' },
                ],
                sim: null
            },
            studeren: {
                icon: '📚', naam: "Studeren",
                vocab: [
                    { spanish: 'la universidad', meaning: 'de universiteit' },
                    { spanish: 'el examen', meaning: 'het examen' },
                    { spanish: 'aprobar', meaning: 'slagen' },
                    { spanish: 'suspender', meaning: 'zakken' },
                    { spanish: 'la nota', meaning: 'het cijfer' },
                    { spanish: 'la asignatura', meaning: 'het vak' },
                    { spanish: 'el horario', meaning: 'het rooster' },
                    { spanish: 'la biblioteca', meaning: 'de bibliotheek' },
                    { spanish: 'el apunte', meaning: 'de aantekening' },
                    { spanish: 'el trabajo', meaning: 'de scriptie / het werk' },
                    { spanish: 'la beca', meaning: 'de beurs' },
                    { spanish: 'matricularse', meaning: 'zich inschrijven' },
                    { spanish: 'el título', meaning: 'het diploma / de titel' },
                    { spanish: 'el compañero de clase', meaning: 'de klasgenoot' },
                    { spanish: 'el profesor / la profesora', meaning: 'de docent' },
                ],
                zinnen: [
                    { nl: 'Ik studeer rechten aan de universiteit.', es: 'Estudio derecho en la universidad.' },
                    { nl: 'Ik heb mijn examen gehaald.', es: 'He aprobado el examen.' },
                    { nl: 'Welk vak vind jij het moeilijkst?', es: '¿Qué asignatura te parece más difícil?' },
                    { nl: 'Ik heb een studiebeurs gekregen.', es: 'Me han concedido una beca.' },
                    { nl: 'De bibliotheek sluit om negen uur.', es: 'La biblioteca cierra a las nueve.' },
                ],
                sim: {
                    titel: 'Op de universiteit',
                    stappen: [
                        { bot: '¿En qué año estás?', hint: 'In welk jaar zit jij?', opties: [
                            { tekst: 'Estoy en segundo año de económicas.', correct: true, uitleg: '✅ Goed! estar in + jaar van studie' },
                            { tekst: 'Soy en segundo año.', correct: false, uitleg: 'Fout — voor positie/situatie gebruik je estar' },
                            { tekst: 'Tengo segundo año.', correct: false, uitleg: 'Fout — tener werkt hier niet' },
                        ]},
                        { bot: '¿Has aprobado todos los exámenes?', hint: 'Heb jij alle examens gehaald?', opties: [
                            { tekst: 'Sí, todos menos el de matemáticas.', correct: true, uitleg: '✅ Perfect! menos = behalve' },
                            { tekst: 'Sí, he aprobado todos los exámenes siempre.', correct: false, uitleg: 'Bijna — siempre (altijd) klinkt overdreven' },
                            { tekst: 'Sí, estoy aprobado.', correct: false, uitleg: 'Fout — pretérito perfecto: he aprobado' },
                        ]},
                        { bot: '¿Cuándo es tu próximo examen?', hint: 'Wanneer is jouw volgende examen?', opties: [
                            { tekst: 'El martes que viene, a las diez de la mañana.', correct: true, uitleg: '✅ Excellent! dag + tijdstip correct vermeld' },
                            { tekst: 'Es en el martes.', correct: false, uitleg: 'Fout — geen lidwoord bij dag: el martes (zonder es en el)' },
                            { tekst: 'Tengo examen mañana en diez.', correct: false, uitleg: 'Fout — tijdstip: a las diez' },
                        ]},
                    ]
                }
            },
        };

        // Thema state
        let huidigThema = null;
        let themaSimStap = 0;
        let themaSimScore = 0;

        function loadThemasMenu() {
            const el = document.getElementById('themasContent');
            const themaKeys = Object.keys(themas);
            el.innerHTML = `
                <div class="lesson-card">
                    <h2>Thema's</h2>
                    <p style="margin-bottom:1.5rem;">Kies een thema om woorden en zinnen te oefenen.</p>
                    <div class="thema-grid">
                        ${themaKeys.map(k => `
                            <button class="thema-btn" data-thema="${k}" onclick="openThema('${k}')">
                                <span class="thema-icon">${themas[k].icon}</span>
                                ${themas[k].naam}
                            </button>`).join('')}
                    </div>
                </div>
                <div id="thema-detail"></div>
            `;
        }

        function openThema(key) {
            huidigThema = key;
            document.querySelectorAll('.thema-btn').forEach(b => b.classList.toggle('active', b.dataset.thema === key));
            const t = themas[key];
            const detail = document.getElementById('thema-detail');

            const zinBlokken = t.zinnen.map((z, i) =>
                `<div class="zin-blok">
                    <div class="zin-nl">🇳🇱 ${z.nl}</div>
                    <input class="zin-input tzm-inp" id="tzmInp${i}" data-idx="${i}" placeholder="Typ de Spaanse vertaling…">
                    <div class="zin-feedback" id="tzmFb${i}"></div>
                </div>`
            ).join('');

            const simPanel = t.sim ? `
                <div class="les-oef-panel" id="thema-sim">
                    <h4 style="margin-top:0;">${t.sim.titel}</h4>
                    <div id="themaSimChat" class="sim-chat"></div>
                    <div id="themaSimOpties" class="sim-opties"></div>
                    <div class="sim-score" id="themaSimScore"></div>
                    <button class="btn btn-sm" id="themaSimOpnieuw" style="margin-top:1rem;">↺ Opnieuw</button>
                </div>` : '';

            const simTabHtml = t.sim ? `<button class="les-oef-tab thema-tab" data-panel="thema-sim" data-startsim="1">💬 Simulator</button>` : '';

            detail.innerHTML = `
                <div class="lesson-card" style="margin-top:1.5rem;">
                    <h3 style="margin-top:0;">${t.icon} ${t.naam}</h3>
                    <div class="les-oef-tabs">
                        <button class="les-oef-tab thema-tab active" data-panel="thema-vocab">📖 Vocabulaire</button>
                        <button class="les-oef-tab thema-tab" data-panel="thema-flash" data-startflash="1">🃏 Flashcards</button>
                        <button class="les-oef-tab thema-tab" data-panel="thema-zinnen">✍️ Zinnen</button>
                        ${simTabHtml}
                    </div>
                    <div class="les-oef-panel active" id="thema-vocab">
                        <div class="vocab-grid">
                            ${t.vocab.map(v => `<div class="vocab-item"><div class="vocab-word">${v.spanish}</div><div class="vocab-meaning">${v.meaning}</div></div>`).join('')}
                        </div>
                    </div>
                    <div class="les-oef-panel" id="thema-flash">
                        <div id="themaFlashContent"><p style="opacity:0.6">Klik op de Flashcards tab om te starten.</p></div>
                    </div>
                    <div class="les-oef-panel" id="thema-zinnen">
                        <p style="opacity:0.8;margin-bottom:1rem;">Vertaal naar het Spaans. Enter = controleer.</p>
                        ${zinBlokken}
                        <button class="btn btn-sm" id="tzmAllesBtn" style="margin-top:1rem;">Controleer alles</button>
                    </div>
                    ${simPanel}
                </div>`;

            // Bind tab events
            detail.querySelectorAll('.thema-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    const card = this.closest('.lesson-card');
                    card.querySelectorAll('.thema-tab').forEach(t => t.classList.remove('active'));
                    card.querySelectorAll('.les-oef-panel').forEach(p => p.classList.remove('active'));
                    this.classList.add('active');
                    const panel = document.getElementById(this.dataset.panel);
                    if (panel) panel.classList.add('active');
                    if (this.dataset.startflash) startThemaFlash(key);
                    if (this.dataset.startsim) startThemaSim(key);
                });
            });

            // Bind zin events
            t.zinnen.forEach((z, i) => {
                const inp = document.getElementById(`tzmInp${i}`);
                if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') controleerThemaZin(i, z.es); });
            });
            const tzmAlles = document.getElementById('tzmAllesBtn');
            if (tzmAlles) tzmAlles.addEventListener('click', () => controleerAlleThemaZinnen(key));

            // Bind sim opnieuw
            const simOpnieuw = document.getElementById('themaSimOpnieuw');
            if (simOpnieuw) simOpnieuw.addEventListener('click', () => startThemaSim(key));

            detail.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function switchThemaPanel(btn, panelId) {
            const wrap = btn.closest('.lesson-card');
            wrap.querySelectorAll('.les-oef-tab').forEach(t => t.classList.remove('active'));
            wrap.querySelectorAll('.les-oef-panel').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(panelId).classList.add('active');
        }

        // Thema flashcards
        let tFlashDeck = [], tFlashIdx = 0, tFlashCorrect = 0, tFlashFlipped = false, tFlashKey = null;

        function startThemaFlash(key) {
            tFlashKey = key;
            tFlashDeck = [...themas[key].vocab].sort(() => Math.random() - 0.5);
            tFlashIdx = 0; tFlashCorrect = 0; tFlashFlipped = false;
            renderThemaFlashcard();
        }

        // Thema flashcard: typ eerst, dan flip, dan Goed/Fout
        function renderThemaFlashcard() {
            const cont = document.getElementById('themaFlashContent');
            if (!cont) return;
            if (tFlashIdx >= tFlashDeck.length) {
                const acc = Math.round((tFlashCorrect / tFlashDeck.length) * 100);
                cont.innerHTML = `
                    <div class="fc-stats" style="margin:1rem 0;">
                        <div class="fc-stat"><div class="num">${tFlashDeck.length}</div><div class="lbl">Gezien</div></div>
                        <div class="fc-stat"><div class="num">${tFlashCorrect}</div><div class="lbl">Goed</div></div>
                        <div class="fc-stat"><div class="num">${acc}%</div><div class="lbl">Score</div></div>
                    </div>
                    <button class="btn btn-sm" id="tflashOpnieuw">↺ Opnieuw</button>`;
                document.getElementById('tflashOpnieuw').addEventListener('click', () => startThemaFlash(tFlashKey));
                return;
            }
            const k = tFlashDeck[tFlashIdx];
            cont.innerHTML = `
                <div class="fc-progress-label" style="margin-bottom:0.5rem;">Kaart ${tFlashIdx+1} van ${tFlashDeck.length}</div>
                <div class="progress-bar" style="margin-bottom:1rem;">
                    <div class="progress-fill" style="width:${Math.round((tFlashIdx/tFlashDeck.length)*100)}%"></div>
                </div>
                <div class="flashcard-wrap">
                    <div class="flashcard" id="tfc">
                        <div class="flashcard-face flashcard-front">
                            <div class="fc-word">${k.spanish}</div>
                        </div>
                        <div class="flashcard-face flashcard-back">
                            <div class="fc-meaning">${k.meaning}</div>
                        </div>
                    </div>
                </div>
                <div id="tTypWrap" style="margin-top:1rem;text-align:center;">
                    <p style="opacity:0.7;font-size:0.95rem;margin-bottom:0.5rem;">Typ de Nederlandse betekenis, draai dan de kaart om.</p>
                    <input class="typ-input" id="tTypInp" placeholder="Typ de betekenis…" style="margin-bottom:0.8rem;">
                    <br>
                    <button class="btn btn-sm" id="tFlipBtn">Draai kaart om →</button>
                    <button class="btn btn-skip btn-sm" id="tSkipBtn" style="margin-left:0.5rem;">⏭ Overslaan</button>
                </div>
                <div class="flashcard-actions" id="tfcAct" style="display:none; margin-top:1rem;">
                    <button class="btn btn-goed btn-sm" id="tGoedBtn">👍 Goed</button>
                    <button class="btn btn-fout btn-sm" id="tFoutBtn">👎 Fout</button>
                </div>`;

            const flipBtn = document.getElementById('tFlipBtn');
            const skipBtn = document.getElementById('tSkipBtn');
            const typInp = document.getElementById('tTypInp');
            const goedBtn = document.getElementById('tGoedBtn');
            const foutBtn = document.getElementById('tFoutBtn');
            if (typInp) { setTimeout(() => typInp.focus(), 50); }
            if (typInp) typInp.addEventListener('keydown', e => { if (e.key === 'Enter') tFlipCard(); });
            if (flipBtn) flipBtn.addEventListener('click', tFlipCard);
            if (skipBtn) skipBtn.addEventListener('click', () => tFlashOordeel('skip'));
            if (goedBtn) goedBtn.addEventListener('click', () => tFlashOordeel('correct'));
            if (foutBtn) foutBtn.addEventListener('click', () => tFlashOordeel('fout'));
        }

        function tFlipCard() {
            if (tFlashFlipped) return;
            const c = document.getElementById('tfc');
            const typWrap = document.getElementById('tTypWrap');
            const actions = document.getElementById('tfcAct');
            if (!c) return;
            tFlashFlipped = true;
            c.classList.add('flipped');
            if (typWrap) typWrap.style.display = 'none';
            if (actions) actions.style.display = 'flex';
        }

        function tFlashOordeel(result) {
            const k = tFlashDeck[tFlashIdx];
            if (result !== 'skip') {
                if (result === 'correct') tFlashCorrect++;
                recordWordResult(k.spanish, k.meaning, result);
            }
            tFlashIdx++; tFlashFlipped = false;
            renderThemaFlashcard();
        }

        // Thema zin controle
        function controleerThemaZin(idx, correct) {
            const inp = document.getElementById(`tzmInp${idx}`);
            const fb = document.getElementById(`tzmFb${idx}`);
            if (!inp || !fb || inp.disabled) return;
            const strip = s => stripDiacritics(s.replace(/[¿¡.,!?]/g,'').trim().toLowerCase());
            inp.disabled = true;
            fb.classList.add('show');
            if (strip(inp.value) === strip(correct)) {
                fb.className = 'zin-feedback show ok';
                fb.textContent = '✅ Correct!';
            } else {
                fb.className = 'zin-feedback show nee';
                fb.innerHTML = `❌ Antwoord: <strong>${correct}</strong>`;
            }
        }

        function controleerAlleThemaZinnen(key) {
            themas[key].zinnen.forEach((z,i) => controleerThemaZin(i, z.es));
        }

        // Thema simulator
        function startThemaSim(key) {
            const t = themas[key];
            if (!t.sim) return;
            themaSimStap = 0; themaSimScore = 0;
            const chat = document.getElementById('themaSimChat');
            const opties = document.getElementById('themaSimOpties');
            const score = document.getElementById('themaSimScore');
            if (!chat) return;
            chat.innerHTML = ''; opties.innerHTML = ''; score.textContent = '';
            renderThemaSimStap(key);
        }

        function renderThemaSimStap(key) {
            const t = themas[key];
            if (!t.sim) return;
            const chat = document.getElementById('themaSimChat');
            const opties = document.getElementById('themaSimOpties');
            if (themaSimStap >= t.sim.stappen.length) {
                opties.innerHTML = '';
                const sc = document.getElementById('themaSimScore');
                if (sc) sc.textContent = `🎉 Klaar! Score: ${themaSimScore} / ${t.sim.stappen.length}`;
                return;
            }
            const stap = t.sim.stappen[themaSimStap];
            const botMsg = document.createElement('div');
            botMsg.className = 'sim-msg bot'; botMsg.textContent = stap.bot;
            chat.appendChild(botMsg);
            const hintMsg = document.createElement('div');
            hintMsg.className = 'sim-msg hint'; hintMsg.textContent = `💡 "${stap.hint}"`;
            chat.appendChild(hintMsg);
            chat.scrollTop = chat.scrollHeight;
            opties.innerHTML = stap.opties.map((o,i) =>
                `<button class="sim-opt" id="tsOpt${i}" onclick="kiesThemaSim('${key}',${i})">${o.tekst}</button>`
            ).join('');
        }

        function kiesThemaSim(key, idx) {
            const t = themas[key];
            const stap = t.sim.stappen[themaSimStap];
            const gekozen = stap.opties[idx];
            const chat = document.getElementById('themaSimChat');
            const opties = document.getElementById('themaSimOpties');
            document.querySelectorAll(`#themaSimOpties .sim-opt`).forEach((b,i) => {
                b.disabled = true;
                if (stap.opties[i].correct) b.classList.add('correct-keuze');
                else if (i === idx && !gekozen.correct) b.classList.add('fout-keuze');
                else b.style.opacity = '0.5';
            });
            const userMsg = document.createElement('div');
            userMsg.className = 'sim-msg user'; userMsg.textContent = gekozen.tekst;
            chat.appendChild(userMsg);
            const fbMsg = document.createElement('div');
            fbMsg.className = 'sim-msg hint'; fbMsg.textContent = gekozen.uitleg;
            chat.appendChild(fbMsg);
            chat.scrollTop = chat.scrollHeight;
            if (gekozen.correct) themaSimScore++;
            themaSimStap++;
            setTimeout(() => { opties.innerHTML = ''; renderThemaSimStap(key); }, 1200);
        }

        // Initialize the app when page loads
        init();
    </script>
