<ul>
<li>~~Le lo doy~~ → <strong>Se lo doy.</strong> Ik geef het hem/haar.</li>
<li>~~Les las muestro~~ → <strong>Se las muestro.</strong> Ik laat ze hen zien.</li>
<li>~~Le la explico~~ → <strong>Se la explico.</strong> Ik leg het haar uit.</li>
</ul>
<p><strong>Waarom?</strong> Omdat <em>le lo</em> en <em>les los</em> fonetisch onmogelijk uit te spreken zijn in het Spaans.</p>
</div>

<h4>7. Verduidelijking bij se</h4>
<div class="grammar-box">
<p><strong>se</strong> is ambigu: het kan betekenen "hem", "haar", "u", "hen" of "u (mv)".</p>
<p>Als de context onduidelijk is, voeg je een verduidelijkende uitdrukking toe met <strong>a</strong>:</p>
<ul>
<li><strong>Se lo doy a él.</strong> Ik geef het aan hem.</li>
<li><strong>Se lo doy a ella.</strong> Ik geef het aan haar.</li>
<li><strong>Se lo doy a usted.</strong> Ik geef het aan u.</li>
<li><strong>Se lo doy a ellos.</strong> Ik geef het aan hen.</li>
</ul>
<p>Deze toevoeging is optioneel maar vaak noodzakelijk voor duidelijkheid.</p>
</div>

<h4>8. Positie van ontkenning</h4>
<div class="grammar-box">
<p>Bij ontkenning staat <strong>no</strong> vóór het eerste objectvoornaamwoord:</p>
<ul>
<li><strong>No lo veo.</strong> Ik zie het niet.</li>
<li><strong>No me lo explica.</strong> Hij legt het mij niet uit.</li>
<li><strong>No se la doy.</strong> Ik geef het hem/haar niet.</li>
</ul>
<p>Nooit: <em>lo no veo</em> — de volgorde is altijd: no + (ind.obj) + (dir.obj) + werkwoord.</p>
</div>

<table class="conjugation-table">

<tr><td>Le lo doy.</td><td>Se lo doy.</td><td>le + lo wordt altijd se + lo</td></tr>
<tr><td>Lo doy se a ella.</td><td>Se lo doy a ella.</td><td>Volgorde is indirect + direct + werkwoord</td></tr>
<tr><td>Me lo no dice.</td><td>No me lo dice.</td><td>no staat vóór alle objectvoornaamwoorden</td></tr>

</div>

<h3>📚 Grammatica</h3>

<h4>1. Drie hoofdvragen over ruimte</h4>
<div class="grammar-box">
<p>Spaans maakt strikte verschillen afhankelijk van de vraag die je beantwoordt:</p>
<table class="conjugation-table">
<tr><th>Vraag</th><th>Spaans</th><th>Gebruik</th></tr>
<tr><td>Waar?</td><td><strong>¿dónde?</strong></td><td>statische locatie → en</td></tr>
<tr><td>Waarheen?</td><td><strong>¿adónde?</strong></td><td>beweging naar bestemming → a</td></tr>
<tr><td>Vanwaar?</td><td><strong>¿de dónde?</strong></td><td>herkomst, oorsprong → de</td></tr>
</table>
<p>Deze drie vragen vereisen elk een ander voorzetsel.</p>
</div>

<h4>2. Kernvoorzetsels: statisch</h4>
<div class="grammar-box">
<p><strong>en</strong> = in, op, aan (algemene locatie)</p>
<p>Gebruik voor algemene locatie, binnen een ruimte, op een plek (zonder beweging).</p>
<p>Voorbeelden:</p>
<ul>
<li><strong>Estoy en casa.</strong> Ik ben thuis.</li>
<li><strong>El libro está en la mesa.</strong> Het boek ligt op tafel.</li>
<li><strong>Vivimos en España.</strong> Wij wonen in Spanje.</li>
</ul>
</div>

<h4>3. Kernvoorzetsels: dynamisch</h4>
<div class="grammar-box">
<p><strong>a</strong> = naar, bij (met beweging)</p>
<p>Gebruik voor richting, bestemming, doel van beweging.</p>
<p>Voorbeelden:</p>
<ul>
<li><strong>Voy a casa.</strong> Ik ga naar huis.</li>
<li><strong>Vengo a Madrid.</strong> Ik kom naar Madrid.</li>
<li><strong>Vamos al trabajo.</strong> Wij gaan naar het werk. (a + el = al)</li>
</ul>
</div>

<h4>4. Kernvoorzetsels: herkomst</h4>
<div class="grammar-box">
<p><strong>de</strong> = van, uit (herkomst, oorsprong)</p>
<p>Gebruik voor herkomst, bezit, materiaal, vanaf een punt.</p>
<p>Voorbeelden:</p>
<ul>
<li><strong>Vengo de casa.</strong> Ik kom van huis.</li>
<li><strong>Soy de Holanda.</strong> Ik kom uit Nederland.</li>
<li><strong>El libro de María.</strong> Het boek van María.</li>
</ul>
</div>

<h4>5. Por en para in ruimtelijke betekenis</h4>
<div class="grammar-box">
<p><strong>por</strong> = door, langs, via (route, gebied)</p>
<p>Gebruik voor route die je aflegt, gebied waar je doorheen gaat.</p>
<p>Voorbeelden:</p>
<ul>
<li><strong>Paso por el parque.</strong> Ik loop door het park.</li>
<li><strong>Viajo por España.</strong> Ik reis door Spanje.</li>
</ul>

<p><strong>para</strong> = naar (met doel, eindbestemming)</p>
<p>Gebruik voor bestemming met intentie, richting met specifiek doel.</p>
<p>Voorbeelden:</p>
<ul>
<li><strong>Salgo para Madrid.</strong> Ik vertrek richting Madrid.</li>
<li><strong>Este regalo es para ti.</strong> Dit cadeau is voor jou.</li>
</ul>

<p><strong>Let op:</strong> <strong>Voy por Madrid</strong> = Ik ga door Madrid (route)<br>
<strong>Voy para Madrid</strong> = Ik ga naar Madrid (bestemming)</p>
<p><em>Dit is NIET uitwisselbaar!</em></p>
</div>

<h4>5. Samentrekking met lidwoorden</h4>
<div class="grammar-box">
<p><strong>VERPLICHTE samentrekking:</strong></p>
<ul>
<li><strong>a + el = al</strong></li>
<li><strong>de + el = del</strong></li>
</ul>
<p>Voorbeelden:</p>
<ul>
<li><strong>Voy al trabajo.</strong> (a + el trabajo)</li>
<li><strong>Vengo del parque.</strong> (de + el parque)</li>
</ul>
<p><strong>GEEN samentrekking bij:</strong> a + la, de + la, a + los, de + las</p>
<p><strong>GEEN samentrekking bij eigennamen met El:</strong> Voy a El Cairo (NIET: al Cairo).</p>
</div>

<li>Es la una. — Het is één uur. (alleen voor 1:00)</li>

<li>Son las tres y media. — Het is half vier (3:30).</li>

<p><strong>Tijdstip met a:</strong> ¿A qué hora? → A las tres. (Om drie uur.)</p>
<p><strong>Let op:</strong> Tijdstip = a, niet en: <em>a las tres</em> (NIET: en las tres).</p>

<h4>5. Deadline uitdrukken met para</h4>

<h4>6. Por vs para met tijd: het verschil</h4>
<div class="grammar-box">
<p><strong>por la mañana</strong> = 's ochtends (gedurende de ochtend, algemeen)</p>
<p><strong>para mañana</strong> = voor morgen, tegen morgen (deadline)</p>

<p><strong>Vergelijk:</strong></p>
<ul>
<li><strong>Trabajo por la mañana.</strong> Ik werk 's ochtends (gewoonte).</li>
<li><strong>El informe es para mañana.</strong> Het rapport is voor morgen (deadline).</li>

<p><em>Dit onderscheid is fundamenteel en niet optioneel!</em></p>

<p>Extra frequentiewoorden: <strong>de vez en cuando</strong> (af en toe), <strong>casi siempre</strong> (bijna altijd), <strong>casi nunca</strong> (bijna nooit), <strong>por día</strong> (per dag).</p>

<h4>2. Bezittelijke bijvoeglijke naamwoorden (onbeklemtoond)</h4>
<p>Deze staan <strong>voor</strong> het zelfstandig naamwoord.</p>
<table class="conjugation-table">

<p><strong>Pretérito indefinido:</strong></p>

<li>Voorbeeld: Antes <strong>trabajaba</strong> todos los días.</li>

<h3>📚 Grammatica</h3>

<h4>1. Basisstructuur van vergelijkingen</h4>
<div class="grammar-box">
<p>Er zijn drie hoofdtypes:</p>
<ul>
<li><strong>Meer dan</strong> → más … que</li>
<li><strong>Minder dan</strong> → menos … que</li>
<li><strong>Even … als</strong> → tan … como</li>
</ul>
<p><strong>Structuur:</strong> bijvoeglijk naamwoord / bijwoord + vergelijkingswoord + tweede element</p>
</div>

<h4>2. Meer dan – más … que</h4>
<div class="grammar-box">
<p><strong>Structuur:</strong> más + adjectief / bijwoord + que</p>
</div>
<div class="example-box">
<div class="example-spanish">Juan es más alto que Pedro.</div>
<div>Juan is groter dan Pedro.</div>
</div>
<div class="example-box">
<div class="example-spanish">Madrid es más grande que Valencia.</div>
<div>Madrid is groter dan Valencia.</div>
</div>
<div class="example-box">
<div class="example-spanish">Este libro es más interesante que el otro.</div>
<div>Dit boek is interessanter dan het andere.</div>
</div>
<div class="example-box">
<div class="example-spanish">Trabajo más que tú.</div>
<div>Ik werk meer dan jij.</div>
</div>

<h4>3. Minder dan – menos … que</h4>
<div class="grammar-box">
<p><strong>Structuur:</strong> menos + adjectief / bijwoord + que</p>
</div>
<div class="example-box">
<div class="example-spanish">Ella es menos alta que su hermana.</div>
<div>Zij is minder groot dan haar zus.</div>
</div>
<div class="example-box">
<div class="example-spanish">Este trabajo es menos difícil que el anterior.</div>
<div>Dit werk is minder moeilijk dan het vorige.</div>
</div>

<h4>4. Even … als – tan … como</h4>
<div class="grammar-box">
<p><strong>Structuur:</strong> tan + adjectief + como</p>
<p><em>Tan wordt gebruikt bij adjectieven en bijwoorden. Niet más bij gelijkheid.</em></p>
<p>❌ Es más alto como tú. &nbsp;→&nbsp; ✅ Es tan alto como tú.</p>
</div>
<div class="example-box">
<div class="example-spanish">Juan es tan alto como Pedro.</div>
<div>Juan is even groot als Pedro.</div>
</div>
<div class="example-box">
<div class="example-spanish">Trabajo tan rápido como tú.</div>
<div>Ik werk even snel als jij.</div>
</div>

<li>Het verschil begrijpen tussen reële en irreële hypotheses</li>

<h3>📚 Grammatica</h3>

<h4>1. Condicional simple — regelmatige vormen</h4>
<div class="grammar-box">
<p>Net als het futuro: uitgangen op de volledige infinitief. Alle personen behalve nosotros hebben een accent op de -í.</p>
</div>
<table class="conjugation-table">
<tr><th>Persoon</th><th>Uitgang</th><th>Hablar</th><th>Comer</th><th>Vivir</th></tr>
<tr><td>yo</td><td>-ía</td><td>hablaría</td><td>comería</td><td>viviría</td></tr>
<tr><td>tú</td><td>-ías</td><td>hablarías</td><td>comerías</td><td>vivirías</td></tr>
<tr><td>él/ella</td><td>-ía</td><td>hablaría</td><td>comería</td><td>viviría</td></tr>
<tr><td>nosotros</td><td>-íamos</td><td>hablaríamos</td><td>comeríamos</td><td>viviríamos</td></tr>
<tr><td>vosotros</td><td>-íais</td><td>hablaríais</td><td>comeríais</td><td>viviríais</td></tr>
<tr><td>ellos</td><td>-ían</td><td>hablarían</td><td>comerían</td><td>vivirían</td></tr>
</table>

<h4>2. Condicional — onregelmatige stammen</h4>
<div class="grammar-box">
<p>Identiek aan de futuro-stammen:</p>
</div>
<table class="conjugation-table">
<tr><th>Infinitief</th><th>Stam</th><th>Yo condicionaal</th></tr>
<tr><td>tener</td><td>tendr-</td><td>tendría</td></tr>
<tr><td>venir</td><td>vendr-</td><td>vendría</td></tr>
<tr><td>hacer</td><td>har-</td><td>haría</td></tr>
<tr><td>decir</td><td>dir-</td><td>diría</td></tr>
<tr><td>poder</td><td>podr-</td><td>podría</td></tr>
<tr><td>saber</td><td>sabr-</td><td>sabría</td></tr>
<tr><td>poner</td><td>pondr-</td><td>pondría</td></tr>
<tr><td>salir</td><td>saldr-</td><td>saldría</td></tr>
</table>

<h4>3. Gebruik van de conditionalis</h4>
<div class="grammar-box">
<ul>
<li><strong>Beleefd verzoek:</strong> ¿Podría ayudarme? / Me gustaría... / Quisiera...</li>
<li><strong>Hypothetisch advies:</strong> Yo que tú, estudiaría más.</li>
<li><strong>Onderdeel van si-zinnen type 2</strong></li>
</ul>
</div>

<h4>4. Si-zinnen type 1 — reële hypothese</h4>
<div class="grammar-box">
<p>Structuur: <strong>si + presente indicativo + futuro/presente/imperativo</strong></p>
<p>Iets wat mogelijk en realistisch is:</p>

<div class="example-spanish">Si estudias, aprobarás.</div>
<div>Als je studeert, zul je slagen.</div>
</div>
<div class="example-box">
<div class="example-spanish">Si tienes tiempo, llámame.</div>

<h4>5. Si-zinnen type 2 — irreële hypothese</h4>
<div class="grammar-box">
<p>Structuur: <strong>si + imperfecto subjuntivo + condicional</strong></p>
<p>Iets wat niet werkelijk is, of onwaarschijnlijk:</p>

<div class="example-box">
<div class="example-spanish">Si tuviera dinero, viajaría por el mundo.</div>
<div>Als ik geld had, zou ik de wereld rondreizen.</div>

        // Sla score op voor een woord (spanish → meaning paar)
        // =====================================================
        // SM-2 SPACED REPETITION HELPERS
        // =====================================================
        function initSM2(wordStats) {
            if (!wordStats.easeFactor) wordStats.easeFactor = 2.5;
            if (!wordStats.interval) wordStats.interval = 0;
            if (!wordStats.nextReviewISO) wordStats.nextReviewISO = new Date().toISOString();
            if (!wordStats.sm2Repetitions) wordStats.sm2Repetitions = 0;
            if (!wordStats.sm2Quality) wordStats.sm2Quality = null;
            return wordStats;
        }

        function calculateSM2NextReview(quality, easeFactor, interval) {
            // quality: 0-5 (0=complete blackout, 5=perfect response)
            // Convert our result to SM2 quality
            let newInterval = interval;
            let newEF = easeFactor;

            if (quality < 3) {
                // Failed
                newInterval = 1;
            } else {
                // Passed
                if (interval === 0) {
                    newInterval = 1;
                } else if (interval === 1) {
                    newInterval = 3;
                } else {
                    newInterval = Math.round(interval * newEF);
                }
            }

            // Update EF
            newEF = Math.max(1.3, easeFactor + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02)));

            // Calculate next review date
            const nextDate = new Date();
            nextDate.setDate(nextDate.getDate() + newInterval);

            return {
                interval: newInterval,
                easeFactor: newEF,
                nextReviewISO: nextDate.toISOString()
            };
        }

        function resultToSM2Quality(result) {
            // Convert our 'correct'/'accent'/'fout' to SM2 0-5 quality
            if (result === 'correct') return 5;
            if (result === 'accent') return 4;
            if (result === 'fout') return 0;
            return 2;
        }

        function recordWordResult(spanish, meaning, result) {
            const state = getAppState();
            const key = spanish.toLowerCase();
            if (!state.wordStats[key]) {
                state.wordStats[key] = { spanish, meaning, seenCount: 0, correctCount: 0, lastResult: null, lastSeenISO: null };
            }
            let ws = state.wordStats[key];
            ws = initSM2(ws);  // Ensure SM2 properties exist

            ws.seenCount++;
            ws.lastResult = result; // 'correct' | 'accent' | 'fout'
            ws.lastSeenISO = new Date().toISOString();
            if (result === 'correct' || result === 'accent') ws.correctCount++;

            // SM-2 update
            const quality = resultToSM2Quality(result);
            const sm2Update = calculateSM2NextReview(quality, ws.easeFactor, ws.interval);
            ws.interval = sm2Update.interval;
            ws.easeFactor = sm2Update.easeFactor;
            ws.nextReviewISO = sm2Update.nextReviewISO;
            ws.sm2Repetitions++;
            ws.sm2Quality = quality;

            state.wordStats[key] = ws;
            saveAppState(state);
        }

            return all.filter(v => {

                if (seen.has(k)) return false;
                seen.add(k); return true;

        // =====================================================

        // =====================================================
        const diacriticsMap = {
            'á':'a','é':'e','í':'i','ó':'o','ú':'u','ü':'u','ñ':'n',
            'à':'a','è':'e','ì':'i','ò':'o','ù':'u'
        };
        function stripDiacritics(str) {
            return str.toLowerCase().replace(/[áéíóúüñàèìòù]/g, m => diacriticsMap[m] || m);
        }
        function checkAnswer(input, correct) {
            const inp = input.trim().toLowerCase();
            const cor = correct.trim().toLowerCase();
            if (inp === cor) return 'correct';
            if (stripDiacritics(inp) === stripDiacritics(cor)) return 'accent';
            // Scheid meerdere vormen (bv "amigo / amiga") en check elk
            const parts = cor.split(/[\/,]/).map(s => s.trim());
            for (const p of parts) {
                if (inp === p) return 'correct';
                if (stripDiacritics(inp) === stripDiacritics(p)) return 'accent';
            }
            return 'fout';
        }

            }).sort((a, b) => a.spanish.localeCompare(b.spanish));

            let html = `<div class="lesson-card slide-up" style="margin-top:1.5rem;">
                <h3 style="margin-top:0;">⭐ Mijn Woordenlijst <span style="opacity:0.5; font-size:0.9rem;">(${items.length} woorden)</span></h3>`;

            if (items.length === 0) {
                html += `<div class="wl-empty">
                    <span class="wl-empty-icon">📭</span>
                    <p>Je hebt nog geen woorden gemarkeerd.</p>
                    <p style="font-size:0.9rem;">Klik op ☆ bij een woord in een les om het hier toe te voegen.</p>
                </div>`;
            } else {
                html += `<div style="margin-bottom:1rem; display:flex; gap:0.8rem; flex-wrap:wrap;">
                    <button class="btn" id="oefenSterrenBtn" style="margin-top:0;">🃏 Oefen deze woorden</button>
                    <button class="btn" id="oefenSterrenTypBtn" style="margin-top:0; background:var(--ochre);">⌨️ Typ oefening</button>
                </div>`;
                html += `<div id="wl-lijst">`;
                items.forEach(v => {
                    html += `<div class="wl-row">
                        <span class="wl-spanish">${v.spanish}</span>
                        <span class="wl-meaning">${v.meaning}</span>
                        <span class="wl-dag">${typeof v.day === 'number' ? 'Dag ' + v.day : v.day}</span>
                        <button class="wl-delete" data-word="${v.key}" title="Verwijderen">🗑️</button>
                    </div>`;
                });
                html += `</div>`;
            }
            html += `<button class="btn" onclick="loadOefelenMenu()" style="background:var(--deep-blue); margin-top:1.5rem;">← Terug</button>
            </div>`;
            container.innerHTML = html;

            // Bind events
            container.querySelectorAll('.wl-delete').forEach(btn => {
                btn.addEventListener('click', function() {
                    const word = this.dataset.word;
                    starredWords.delete(word);
                    saveStarred();
                    this.closest('.wl-row').style.animation = 'slideUp 0.2s ease reverse';
                    setTimeout(() => renderWoordenlijst(container), 200);
                });
            });
            const oefBtn = document.getElementById('oefenSterrenBtn');
            if (oefBtn) oefBtn.addEventListener('click', () => startSterrenOefening('flashcards'));
            const typBtn = document.getElementById('oefenSterrenTypBtn');
            if (typBtn) typBtn.addEventListener('click', () => startSterrenOefening('typen'));
        }

        function startSterrenOefening(modus) {
            const lookup = buildVocabLookup();
            const deck = Array.from(starredWords).map(w => {
                const found = lookup[w.toLowerCase()];
                return found ? { spanish: found.spanish, meaning: found.meaning, day: found.day } : { spanish: w, meaning: '?', day: 0 };
            }).filter(v => v.meaning !== '?');

            if (deck.length === 0) { alert('Geen oefenbare woorden gevonden.'); return; }

            // Shuffle
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }

            const sub = document.getElementById('oef-sub');
            if (modus === 'flashcards') {
                fcDeck = deck; fcIndex = 0; fcTodayCorrect = 0; fcTodaySeen = 0; fcFlipped = false;
                renderFlashcard();
            } else if (modus === 'typen') {
                typDeck = deck; typIndex = 0; typCorrect = 0; typGezien = 0; typFouten = [];
                renderTypVraag();
            }
            scrollOefIntoView();
        }

        // Gedeeld: dag-selectie UI
        function buildDagFilterHTML(prefix, defaultAll=false) {
            let html = `<div style="margin:1rem 0;">
                <strong>Welke dagen?</strong>
                <label style="margin-left:1rem;cursor:pointer;">
                    <input type="checkbox" id="${prefix}-alle" ${defaultAll?'checked':''} onchange="toggleAlleCheck('${prefix}')"> Alle dagen
                </label>
                <div class="dag-filter" id="${prefix}-dagfilter" style="${defaultAll?'opacity:0.4;pointer-events:none;':''}">`;
            for (let d = 1; d <= 25; d++) {
                html += `<label class="dag-check"><input type="checkbox" class="${prefix}-dagcb" value="${d}"> Dag ${d}</label>`;
            }
            html += `</div></div>`;
            return html;
        }

        function toggleAlleCheck(prefix) {
            const alle = document.getElementById(`${prefix}-alle`).checked;
            const filter = document.getElementById(`${prefix}-dagfilter`);
            filter.style.opacity = alle ? '0.4' : '1';
            filter.style.pointerEvents = alle ? 'none' : 'auto';
            // Uitschakelen = geen dag voorgeselecteerd, zodat je zelf kiest
            if (!alle) {
                document.querySelectorAll(`.${prefix}-dagcb`).forEach(cb => cb.checked = false);
            }
        }

        function getGekozenDagen(prefix) {
            const alleEl = document.getElementById(`${prefix}-alle`);
            if (alleEl && alleEl.checked) return getAllDays();
            const cbs = document.querySelectorAll(`.${prefix}-dagcb:checked`);
            return Array.from(cbs).map(cb => parseInt(cb.value));
        }

        // =====================================================
        // MODUS 0: DAGELIJKSE LES (Daily practice with audio conversation)
        // =====================================================
        let dailyDay = null;
        let dailyMiniExercises = [];
        let dailySimDay = null;

        function renderDagelijkseLes(container) {
            const today = new Date().toDateString();
            const lastDailyDate = localStorage.getItem('daily_lesson_date') || '';

            let status = '';
            let actionBtn = '';

            if (lastDailyDate === today) {
                status = '<div style="color:#27ae60; font-weight:600; margin-bottom:1rem;">✅ Dagelijkse les al gedaan!</div>';
                actionBtn = '<button class="btn" onclick="startDailyLessonAgain()">Nog een ronde</button>';
            } else {
                status = '<div style="color:var(--ochre); margin-bottom:1rem;">📅 Klaar voor vandaag?</div>';
                actionBtn = '<button class="btn" onclick="startDailyLesson()">Start dagelijkse les</button>';
            }

            // Show SRS due words count
            const dState = getAppState();
            const dueCount = Object.values(dState.wordStats).filter(w => w.nextReviewISO && new Date(w.nextReviewISO) <= new Date()).length;
            const errCount = getErrorLog().length;

            container.innerHTML = `
                <div class="lesson-card" style="margin-top:1.5rem;">
                    <h3 style="margin-top:0;">📅 Dagelijkse Les</h3>
                    <p style="opacity:0.8;">Een snelle mix van oefeningen, herhalingen en een gesprek.</p>
                    ${status}
                    ${dueCount > 0 || errCount > 0 ? `<div style="display:flex; gap:0.8rem; margin-bottom:1rem; flex-wrap:wrap;">
                        ${dueCount > 0 ? `<span style="background:rgba(231,76,60,0.08); padding:0.4rem 0.8rem; border-radius:6px; font-size:0.9rem;">🔴 ${dueCount} woorden te herhalen</span>` : ''}
                        ${errCount > 0 ? `<span style="background:rgba(230,126,34,0.08); padding:0.4rem 0.8rem; border-radius:6px; font-size:0.9rem;">📋 ${errCount} fouten gelogd</span>` : ''}
                    </div>` : ''}
                    ${actionBtn}
                </div>
            `;
        }

        function startDailyLesson() {
            // Kies een willekeurige dag
            dailyDay = Math.floor(Math.random() * 25) + 1;

            // Pak mini-oefeningen voor die dag (de array zelf, niet .oefeningen)
            let miniExer = lesMiniOef[dailyDay] || [];
            if (!Array.isArray(miniExer)) miniExer = miniExer.oefeningen || [];

            // Als geen oefeningen, probeer andere dag
            if (miniExer.length === 0) {
                for (let attempt = 0; attempt < 5; attempt++) {
                    dailyDay = Math.floor(Math.random() * 25) + 1;
                    miniExer = lesMiniOef[dailyDay] || [];
                    if (!Array.isArray(miniExer)) miniExer = miniExer.oefeningen || [];
                    if (miniExer.length > 0) break;
                }
            }

            // Selecteer 2-3 willekeurige oefeningen
            const shuffled = [...miniExer].sort(() => Math.random() - 0.5);
            dailyMiniExercises = shuffled.slice(0, Math.min(3, shuffled.length));

            // Sim beschikbaar?
            dailySimDay = lesSims[dailyDay] ? dailyDay : null;

            const container = document.getElementById('oef-sub');
            renderDailyLessonContent(container);
        }

        function startDailyLessonAgain() {
            startDailyLesson();
        }

        function renderDailyLessonContent(container) {
            const lessonTitle = lessonTitles[dailyDay] || `Día ${dailyDay}`;

            // Haal SRS-woorden op die herhaald moeten worden
            const state = getAppState();
            const now = new Date();
            const dueWords = Object.entries(state.wordStats)
                .filter(([k, w]) => w.nextReviewISO && new Date(w.nextReviewISO) <= now)
                .sort((a, b) => new Date(a[1].nextReviewISO) - new Date(b[1].nextReviewISO))
                .slice(0, 5)
                .map(([k, w]) => w);

            // Haal ook invuloefeningen voor deze dag
            const invul = lesInvulOef[dailyDay] || [];
            const invulSlice = invul.slice(0, 3);

            let html = `
                <div class="lesson-card" style="margin-top:1.5rem;">
                    <h3 style="margin-top:0;">📅 Dagelijkse Les: Día ${dailyDay}</h3>
                    <p style="opacity:0.8; margin-bottom:1rem;">${lessonTitle}</p>

                    ${dueWords.length > 0 ? `
                        <div style="margin-bottom:1.5rem;">
                            <h4 style="margin-top:0;">🔁 Herhaling (${dueWords.length} woorden)</h4>
                            <div id="dailyReviewContainer"></div>
                        </div>
                    ` : ''}

                    ${dailyMiniExercises.length > 0 ? `
                        <h4 style="margin-top:0;">✍️ Oefeningen</h4>
                        <div id="dailyMiniContainer" style="margin-bottom:1.5rem;"></div>
                    ` : ''}

                    ${invulSlice.length > 0 ? `
                        <h4 style="margin-top:0;">📝 Invullen</h4>
                        <div id="dailyInvulContainer" style="margin-bottom:1.5rem;"></div>
                    ` : ''}

                    ${dailySimDay ? `
                        <h4>💬 Gesprek</h4>
                        <div id="dailySimContainer" style="margin-bottom:1.5rem;"></div>
                    ` : ''}

                    <button class="btn" onclick="completeDailyLesson()">✅ Dagelijkse les voltooid</button>
                </div>
            `;

            container.innerHTML = html;

            // Render SRS review woorden als snelle flashcards
            if (dueWords.length > 0) {
                const rc = document.getElementById('dailyReviewContainer');
                if (rc) {
                    rc.innerHTML = dueWords.map((w, i) => `
                        <div style="display:flex; align-items:center; gap:0.8rem; padding:0.6rem 0; border-bottom:1px solid rgba(230,126,34,0.15);" id="dailyRev${i}">
                            <span style="font-weight:600; color:var(--terracotta); min-width:120px;">${w.spanish}</span>
                            <input class="typ-input daily-rev-input" id="dailyRevInp${i}" placeholder="Betekenis…" style="flex:1; padding:0.4rem 0.6rem; font-size:0.9rem;">
                            <span id="dailyRevFb${i}" style="min-width:20px;"></span>
                        </div>
                    `).join('');

                    // Bind enter events
                    dueWords.forEach((w, i) => {
                        const inp = document.getElementById(`dailyRevInp${i}`);
                        if (inp) inp.addEventListener('keydown', e => {
                            if (e.key === 'Enter') {
                                e.preventDefault();
                                const fb = document.getElementById(`dailyRevFb${i}`);
                                const result = checkAnswer(inp.value, w.meaning || w.spanish);
                                inp.disabled = true;
                                if (result === 'correct' || result === 'accent') {
                                    fb.textContent = '✅';
                                    recordWordResult(w.spanish, w.meaning || '', result);
                                } else {
                                    fb.innerHTML = `❌ <span style="font-size:0.85rem;">${w.meaning || ''}</span>`;
                                    recordWordResult(w.spanish, w.meaning || '', 'fout');
                                }
                                const nextInp = document.getElementById(`dailyRevInp${i + 1}`);
                                if (nextInp && !nextInp.disabled) nextInp.focus();
                            }
                        });
                    });
                }
            }

            // Render mini oefeningen
            renderDailyMiniExercises();

            // Render invuloefeningen
            if (invulSlice.length > 0) {
                const ic = document.getElementById('dailyInvulContainer');
                if (ic) {
                    ic.innerHTML = invulSlice.map((v, i) => {
                        const parts = v.zin.split('___');
                        return `<div style="margin-bottom:0.5rem;">
                            ${parts[0]}<input class="invul-input" id="dailyInvulInp${i}" placeholder="…" style="width:100px;">${parts[1]||''}
                            <span id="dailyInvulFb${i}"></span>
                        </div>`;
                    }).join('');

                    invulSlice.forEach((v, i) => {
                        const inp = document.getElementById(`dailyInvulInp${i}`);
                        if (inp) inp.addEventListener('keydown', e => {
                            if (e.key === 'Enter') {
                                e.preventDefault();
                                const fb = document.getElementById(`dailyInvulFb${i}`);
                                const result = checkAnswer(inp.value, v.blank);
                                inp.disabled = true;
                                if (result === 'correct' || result === 'accent') {
                                    fb.innerHTML = `<span style="color:#27ae60;">✅ ${result === 'accent' ? v.blank : ''}</span>`;
                                } else {
                                    fb.innerHTML = `<span style="color:#e74c3c;">❌ ${v.blank} <em style="font-size:0.8rem;">(${v.hint})</em></span>`;
                                    logError({ spanish: v.blank, meaning: v.hint, userAnswer: inp.value, correctAnswer: v.blank, exerciseType: 'dagelijks-invul' });
                                }
                                const nextInp = document.getElementById(`dailyInvulInp${i + 1}`);
                                if (nextInp && !nextInp.disabled) nextInp.focus();
                            }
                        });
                    });
                }
            }

            // Render sim
            if (dailySimDay) renderDailySimulation();
        }

        function renderDailyMiniExercises() {
            const container = document.getElementById('dailyMiniContainer');
            if (!container || dailyMiniExercises.length === 0) return;

            dailyMiniExercises.forEach((oef, oi) => {
                const exerDiv = document.createElement('div');
                exerDiv.id = `dailyExer${oi}`;
                exerDiv.style.marginBottom = '1.5rem';
                exerDiv.style.padding = '1rem';
                exerDiv.style.background = 'rgba(230,126,34,0.06)';
                exerDiv.style.borderRadius = '8px';

                if (oef.type === 'meerkeuze') {
                    const vr = oef.vragen.map((v, vi) => {
                        const opts = v.opties.map((o, idx) =>
                            `<button class="mini-mc-opt" data-oef="d${oi}" data-vraag="${vi}" data-idx="${idx}">${o}</button>`
                        ).join('');
                        return `<div class="mini-mc-vraag" id="miniMcd${oi}_${vi}">
                            <div class="mini-mc-zin">${v.vraag}</div>
                            <div class="mini-mc-opts">${opts}</div>
                            <div class="mini-mc-fb" id="miniMcFbd${oi}_${vi}"></div>
                        </div>`;
                    }).join('');
                    exerDiv.innerHTML = `<h4>${oef.titel}</h4>${vr}`;
                } else if (oef.type === 'koppel') {
                    const shuffledRight = [...oef.items].sort(() => Math.random() - 0.5);
                    const leftItems = oef.items.map((item, idx) =>
                        `<div class="koppel-item koppel-left" data-oef="d${oi}" data-idx="${idx}" data-match="${item.right}">${item.left}</div>`
                    ).join('');
                    const rightItems = shuffledRight.map((item, idx) =>
                        `<div class="koppel-item koppel-right" data-oef="d${oi}" data-ridx="${idx}" data-val="${item.right}">${item.right}</div>`
                    ).join('');
                    exerDiv.innerHTML = `<h4>${oef.titel}</h4>
                        <p style="opacity:0.7;font-size:0.9rem;margin-bottom:0.5rem;">Klik links, dan rechts om te koppelen.</p>
                        <div class="koppel-container" id="koppelWrapd${oi}">
                            <div class="koppel-col">${leftItems}</div>
                            <div class="koppel-col">${rightItems}</div>
                        </div>
                        <div class="koppel-score" id="koppelScored${oi}"></div>`;
                } else if (oef.type === 'woordzoeker') {
                    const vr = oef.vragen.map((v, vi) =>
                        `<div class="mini-wz-vraag" id="miniWzd${oi}_${vi}">
                            <span class="mini-wz-hint">${v.hint} →</span>
                            <input class="mini-wz-input" id="miniWzInpd${oi}_${vi}" placeholder="..." data-oef="d${oi}" data-idx="${vi}">
                            <span class="mini-wz-fb" id="miniWzFbd${oi}_${vi}"></span>
                        </div>`
                    ).join('');
                    exerDiv.innerHTML = `<h4>${oef.titel}</h4>${vr}`;
                } else if (oef.type === 'volgorde') {
                    const zinBlokken = oef.zinnen.map((z, zi) => {
                        const shuffled = [...z.woorden].sort(() => Math.random() - 0.5);
                        const tiles = shuffled.map(w =>
                            `<button class="volgorde-tile" data-oef="d${oi}" data-zin="${zi}" data-word="${w}">${w}</button>`
                        ).join('');
                        return `<div class="volgorde-vraag" id="volgorded${oi}_${zi}">
                            <div class="volgorde-answer" id="volgordeAnsd${oi}_${zi}"></div>
                            <div class="volgorde-tiles" id="volgordeTilesd${oi}_${zi}">${tiles}</div>
                            <div class="volgorde-fb" id="volgordeFbd${oi}_${zi}"></div>
                        </div>`;
                    }).join('');
                    exerDiv.innerHTML = `<h4>${oef.titel}</h4>
                        <p style="opacity:0.7;font-size:0.9rem;margin-bottom:0.5rem;">Klik op de woorden in de juiste volgorde.</p>
                        ${zinBlokken}`;
                } else if (oef.type === 'foutzoeken') {
                    const zinBlokken = oef.zinnen.map((z, zi) => {
                        const words = z.zin.map((w, wi) =>
                            `<button class="foutzoek-word" data-oef="d${oi}" data-zin="${zi}" data-idx="${wi}">${w}</button>`
                        ).join(' ');
                        return `<div class="foutzoek-vraag" id="foutzoekd${oi}_${zi}">
                            <div class="foutzoek-zin">${words}</div>
                            <div class="foutzoek-fb" id="foutzoekFbd${oi}_${zi}"></div>
                        </div>`;
                    }).join('');
                    exerDiv.innerHTML = `<h4>${oef.titel}</h4>
                        <p style="opacity:0.7;font-size:0.9rem;margin-bottom:0.5rem;">Klik op het woord dat fout is.</p>
                        ${zinBlokken}`;
                } else {
                    exerDiv.innerHTML = `<p>Oefening ${oi + 1}: ${oef.titel || 'Oefening'}</p>`;
                }

                container.appendChild(exerDiv);
            });

            // Bind events for daily mini exercises (reuse same logic as lesson exercises)
            bindDailyMiniEvents();
        }

        function bindDailyMiniEvents() {
            // Meerkeuze
            document.querySelectorAll('[data-oef^="d"] .mini-mc-opt, .mini-mc-opt[data-oef^="d"]').forEach(btn => {
                btn.addEventListener('click', function() {
                    const oef = this.dataset.oef;
                    const vraag = this.dataset.vraag;
                    const idx = parseInt(this.dataset.idx);
                    const miniOefIdx = parseInt(oef.replace('d', ''));
                    const oefData = dailyMiniExercises[miniOefIdx];
                    if (!oefData || !oefData.vragen) return;
                    const v = oefData.vragen[vraag];
                    const fb = document.getElementById(`miniMcFb${oef}_${vraag}`);
                    const parent = this.closest('.mini-mc-vraag');
                    parent.querySelectorAll('.mini-mc-opt').forEach(b => b.disabled = true);
                    if (idx === v.correct) {
                        this.classList.add('correct', 'bounce-in');
                        fb.innerHTML = '<span style="color:#27ae60;">✅ Correct!</span>';
                    } else {
                        this.classList.add('fout');
                        parent.querySelectorAll('.mini-mc-opt')[v.correct].classList.add('correct');
                        fb.innerHTML = `<span style="color:#e74c3c;">❌ Het juiste antwoord: <strong>${v.opties[v.correct]}</strong></span>`;
                        logError({ spanish: v.opties[v.correct], meaning: v.vraag, userAnswer: v.opties[idx], correctAnswer: v.opties[v.correct], exerciseType: 'dagelijks-meerkeuze' });
                    }
                });
            });

            // Woordzoeker
            document.querySelectorAll('.mini-wz-input[data-oef^="d"]').forEach(inp => {
                inp.addEventListener('keydown', function(e) {
                    if (e.key !== 'Enter') return;
                    const oef = this.dataset.oef;
                    const idx = this.dataset.idx;
                    const miniOefIdx = parseInt(oef.replace('d', ''));
                    const oefData = dailyMiniExercises[miniOefIdx];
                    if (!oefData || !oefData.vragen) return;
                    const v = oefData.vragen[idx];
                    const fb = document.getElementById(`miniWzFb${oef}_${idx}`);
                    const result = checkAnswer(this.value, v.antwoord);
                    this.disabled = true;
                    if (result === 'correct' || result === 'accent') {
                        fb.innerHTML = `<span style="color:#27ae60;">✅ ${result === 'accent' ? 'Bijna! ' : ''}${v.antwoord}</span>`;
                    } else {
                        fb.innerHTML = `<span style="color:#e74c3c;">❌ ${v.antwoord}</span>`;
                        logError({ spanish: v.antwoord, meaning: v.hint, userAnswer: this.value, correctAnswer: v.antwoord, exerciseType: 'dagelijks-woordzoeker' });
                    }
                });
            });

            // Volgorde
            document.querySelectorAll('.volgorde-tile[data-oef^="d"]').forEach(tile => {
                tile.addEventListener('click', function() {
                    const oef = this.dataset.oef;
                    const zin = this.dataset.zin;
                    const word = this.dataset.word;
                    const ansDiv = document.getElementById(`volgordeAns${oef}_${zin}`);
                    const miniOefIdx = parseInt(oef.replace('d', ''));
                    const oefData = dailyMiniExercises[miniOefIdx];
                    if (!oefData || !oefData.zinnen) return;

                    this.style.display = 'none';
                    const span = document.createElement('span');
                    span.className = 'volgorde-placed';
                    span.textContent = word;
                    ansDiv.appendChild(span);

                    const placed = ansDiv.querySelectorAll('.volgorde-placed');
                    const tilesLeft = this.parentElement.querySelectorAll('.volgorde-tile:not([style*="display: none"])');
                    if (tilesLeft.length === 0) {
                        const userZin = Array.from(placed).map(s => s.textContent).join(' ');
                        const fb = document.getElementById(`volgordeFb${oef}_${zin}`);
                        if (userZin === oefData.zinnen[zin].correct) {
                            fb.innerHTML = '<span style="color:#27ae60;">✅ Correct!</span>';
                        } else {
                            fb.innerHTML = `<span style="color:#e74c3c;">❌ Juiste volgorde: ${oefData.zinnen[zin].correct}</span>`;
                            logError({ spanish: oefData.zinnen[zin].correct, meaning: '', userAnswer: userZin, correctAnswer: oefData.zinnen[zin].correct, exerciseType: 'dagelijks-volgorde' });
                        }
                    }
                });
            });

            // Foutzoeken
            document.querySelectorAll('.foutzoek-word[data-oef^="d"]').forEach(btn => {
                btn.addEventListener('click', function() {
                    const oef = this.dataset.oef;
                    const zin = this.dataset.zin;
                    const idx = parseInt(this.dataset.idx);
                    const miniOefIdx = parseInt(oef.replace('d', ''));
                    const oefData = dailyMiniExercises[miniOefIdx];
                    if (!oefData || !oefData.zinnen) return;
                    const z = oefData.zinnen[zin];
                    const fb = document.getElementById(`foutzoekFb${oef}_${zin}`);
                    this.parentElement.querySelectorAll('.foutzoek-word').forEach(b => b.disabled = true);
                    if (idx === z.fout) {
                        this.classList.add('correct');
                        fb.innerHTML = `<span style="color:#27ae60;">✅ Correct! ${z.correctie}: ${z.uitleg}</span>`;
                    } else {
                        this.classList.add('fout');
                        fb.innerHTML = `<span style="color:#e74c3c;">❌ ${z.uitleg}</span>`;
                        logError({ spanish: z.zin.join(' '), meaning: z.uitleg, userAnswer: z.zin[idx], correctAnswer: z.correctie, exerciseType: 'dagelijks-foutzoeken' });
                    }
                });
            });

        async function sendGesprekAI(mode) {
            const chat = document.getElementById('gesprekChat');

REGELS:
- Spreek ALTIJD in het Spaans
- Houd je antwoorden kort (2-3 zinnen)

ONDERWERP: ${gesprekTopic}`;

            duolingoSession = generateDuolingoExercises(window.duoCount, window.duoDifficulty, days);
            if (duolingoSession.length === 0) {
                alert('Geen oefeningen gevonden voor deze selectie.');
                return;
            }

            duolingoIndex = 0;
            duolingoScore = 0;
            renderDuolingoExercise();
        }

        function generateDuolingoExercises(count, difficulty, days) {
            const exercises = [];
            const types = ['meerkeuze', 'foutzoeken', 'luister', 'typen', 'koppel', 'zin'];

            for (let d of days) {
                // Collect exercises from this day
                const mini = (lesMiniOef[d] || {}).oefeningen || [];
                const invul = lesInvulOef[d] || [];
                const zin = lesZinOef[d] || [];

                mini.forEach(m => exercises.push({...m, day: d, source: 'mini'}));
                invul.forEach((inv, i) => exercises.push({
                    type: 'invul',
                    day: d,
                    source: 'invul',
                    zin: inv.zin,
                    blank: inv.blank,
                    hint: inv.hint,
                    idx: i
                }));
                zin.forEach((z, i) => exercises.push({
                    type: 'zin-vertaling',
                    day: d,
                    source: 'zin',
                    nl: z.nl,
                    es: z.es,
                    idx: i
                }));
            }

            // Filter by difficulty (simple: count + type-based)
            let filtered = exercises;
            if (difficulty === 'easy') {
                filtered = exercises.filter(e => ['meerkeuze', 'koppel', 'luister'].includes(e.type));
            } else if (difficulty === 'hard') {
                filtered = exercises.filter(e => ['foutzoeken', 'zin-vertaling', 'typ'].includes(e.type) || (e.source === 'zin'));
            }

            // Shuffle and limit to count
            filtered = filtered.sort(() => Math.random() - 0.5).slice(0, count);

            // Ensure no 2x same type in a row
            const result = [];
            let lastType = null;
            for (let e of filtered) {
                if (e.type !== lastType) {
                    result.push(e);
                    lastType = e.type;
                } else {
                    // Defer this exercise to later
                    result.push(e);
                }
            }

            return result;
        }

        function startFlashcards() {
            const dagen = getGekozenDagen('fc');
            if (dagen.length === 0) { alert('Selecteer minimaal 1 dag.'); return; }
            let rawDeck = parseVocabFromDays(dagen);
            if (rawDeck.length === 0) {
                document.getElementById('oef-sub').innerHTML = `<div class="lesson-card" style="margin-top:1.5rem;"><div class="empty-state"><span class="empty-icon">📭</span>Geen vocabulaire gevonden voor de geselecteerde dagen.</div></div>`;
                return;
            }

            // Afwisseling: maak kaarten voor beide richtingen (ES→NL en NL→ES)
            fcDeck = [];
            rawDeck.forEach((v, i) => {
                if (i % 2 === 0) {
                    fcDeck.push({ ...v, direction: 'es-nl', prompt: v.spanish, answer: v.meaning });
                } else {
                    fcDeck.push({ ...v, direction: 'nl-es', prompt: v.meaning, answer: v.spanish });
                }
            });

            const srsMode = document.getElementById('fcSrsMode') && document.getElementById('fcSrsMode').checked;
            if (srsMode) {
                const state = getAppState();
                const now = new Date();
                fcDeck.sort((a, b) => {
                    const wsA = state.wordStats[a.spanish.toLowerCase()];
                    const wsB = state.wordStats[b.spanish.toLowerCase()];
                    return srsCardScore(wsB, now) - srsCardScore(wsA, now);
                });
            } else {
                fcDeck = fcDeck.sort(() => Math.random() - 0.5);
            }
            fcIndex = 0; fcTodayCorrect = 0; fcTodaySeen = 0; fcFlipped = false;
            renderFlashcard();
            scrollOefIntoView();
        }

        function srsCardScore(ws, now) {
            if (!ws) return 500; // Unseen words: medium priority
            const wsInit = initSM2(ws);
            const nextReview = new Date(wsInit.nextReviewISO);
            const daysUntil = (nextReview - now) / (1000 * 60 * 60 * 24);
            const accuracy = wsInit.seenCount > 0 ? wsInit.correctCount / wsInit.seenCount : 0.5;

            if (daysUntil <= 0) {
                // Due for review: highest priority, more overdue = higher
                return 1000 + Math.abs(daysUntil) + (1 - accuracy) * 50;
            }
            // Not yet due: lower priority, weaker words slightly higher
            return 200 - daysUntil + (1 - accuracy) * 100;
        }

        // Flashcard: toon Spaans woord → gebruiker typt Nederlands → flip → Goed/Fout
        let fcChecked = false; // true = antwoord is al beoordeeld, Enter = volgende

            const kaart = fcDeck[fcIndex];

            const state = getAppState();
            const ws = state.wordStats[kaart.spanish.toLowerCase()];
            const accW = ws && ws.seenCount > 0 ? Math.round((ws.correctCount / ws.seenCount)*100) : null;
            let accTxt = accW !== null ? `${accW}% goed (${ws.seenCount}×)` : 'Nieuw woord';
            if (ws && ws.nextReviewISO) {
                const nextR = new Date(ws.nextReviewISO);
                const daysUntil = Math.round((nextR - new Date()) / (1000*60*60*24));
                if (daysUntil <= 0) accTxt += ' · 🔴 Herhaling nodig';

            }

            const dirLabel = isEsNl ? '🌍 → 🇳🇱' : '🇳🇱 → 🌍';

            sub.innerHTML = `

                        <button type="submit" style="position:absolute; left:-9999px;" tabindex="-1" aria-hidden="true">OK</button>

                        <button type="button" id="fcVolgendeBtn" class="btn" onclick="fcVolgende()" style="display:none; margin-top:0.5rem;">Volgende →</button>
                    </form>
                </div>`;

            const form = document.getElementById('fcForm');
            // Mobiel 'gereed/ga' en desktop Enter komen allebei binnen als form-submit:
            // eerste keer = controleren, tweede keer = volgende kaart. Zo blijf je typen
            // zonder te scrollen of te klikken.
            if (form) form.addEventListener('submit', e => { e.preventDefault(); fcSubmit(); });

                setTimeout(() => { try { typInp.focus(); } catch(e) {} }, 60);
            }
        }

        function startQuiz() {
            const dagen = getGekozenDagen('quiz');
            if (dagen.length === 0) { alert('Selecteer minimaal 1 dag.'); return; }
            const vocab = parseVocabFromDays(dagen);
            if (vocab.length < 4) {
                alert('Je hebt minimaal 4 vocabulaire-items nodig voor een quiz. Selecteer meer dagen.');
                return;
            }
            // Genereer vragen
            const shuffle = arr => arr.sort(() => Math.random() - 0.5);
            const pool = shuffle([...vocab]);
            quizVragen = [];
            for (let i = 0; i < Math.min(QUIZ_LENGTE, pool.length); i++) {
                const correct = pool[i];
                // 3 distractors uit de rest
                const rest = vocab.filter(v => v.spanish !== correct.spanish);
                const distractors = shuffle(rest).slice(0, 3);
                const opties = shuffle([correct, ...distractors]);
                quizVragen.push({ correct, opties });

            quizIndex = 0; quizScore = 0;
            renderQuizVraag();
            scrollOefIntoView();

        // Bereken een prioriteitsscore voor een woord (hoger = meer urgent herhalen)
        function herhalenScore(ws) {
            const now = Date.now();
            const hoursSinceSeen = ws.lastSeenISO
                ? (now - new Date(ws.lastSeenISO).getTime()) / 3600000
                : 9999;
            const accuracy = ws.seenCount > 0 ? ws.correctCount / ws.seenCount : 0;
            const foutPenalty = ws.lastResult === 'fout' ? 50 : 0;
            const oudheidBonus = Math.min(hoursSinceSeen, 168); // max 1 week
            const nieuwBonus = ws.seenCount < 3 ? 30 : 0;
            // Hoge score = hoog prioriteit
            return foutPenalty + oudheidBonus + nieuwBonus + (1 - accuracy) * 40;
        }

        // Geeft uitleg waarom een woord gekozen is (in eenvoudige taal)
        function herhalenReden(ws) {
            if (!ws.lastSeenISO) return 'Nieuw woord, nog nooit geoefend';
            const hours = (Date.now() - new Date(ws.lastSeenISO).getTime()) / 3600000;
            const accuracy = ws.seenCount > 0 ? Math.round((ws.correctCount / ws.seenCount) * 100) : 0;
            if (ws.lastResult === 'fout') return `Vorige keer fout (${accuracy}% correct)`;
            if (ws.seenCount < 3) return `Weinig geoefend (${ws.seenCount}×)`;
            if (hours > 48) return `Lang niet gezien (${Math.round(hours / 24)} dagen geleden)`;
            return `Accuracy laag (${accuracy}%)`;
        }

        // Info voor het menu (hoeveel woorden klaarstaan)
        function getHerhalenInfo() {
            const allVocab = parseVocabFromDays(getAllDays());
            const state = getAppState();
            let ongezien = 0, teHerhalen = 0;
            allVocab.forEach(v => {
                const ws = state.wordStats[v.spanish.toLowerCase()];
                if (!ws) ongezien++;
                else if (herhalenScore(ws) > 20) teHerhalen++;
            });
            if (ongezien + teHerhalen === 0) {
                return { uitleg: '✅ Geen woorden om te herhalen. Goed gedaan!' };
            }
            return { uitleg: `${teHerhalen} woorden om te herhalen, ${ongezien} nog nooit geoefend.` };
        }

        // Kiest de beste woorden op basis van spaced repetition score
        function kiesHerhalenDeck(aantal) {
            const allVocab = parseVocabFromDays(getAllDays());
            const state = getAppState();
            const now = new Date();

            const gescoord = allVocab.map(v => {
                let ws = state.wordStats[v.spanish.toLowerCase()];

                if (!ws) {
                    // Unseen word
                    return { ...v, score: 999, reden: 'Nieuw woord, nog nooit geoefend', ws: null, daysUntilReview: 0 };
                }

                // Initialize SM2 if needed
                ws = initSM2(ws);

                // Check if review is due
                const nextReview = new Date(ws.nextReviewISO);
                const daysUntil = (nextReview - now) / (1000 * 60 * 60 * 24);

                // Score: words due for review come first (negative days), then unseen, then future reviews
                let score = 0;
                if (daysUntil <= 0) {
                    score = 1000 + Math.abs(daysUntil); // Due words: higher score
                } else {
                    score = 500 - daysUntil; // Future reviews: lower score
                }

                // Also consider accuracy - weak words get boosted
                const accuracy = ws.seenCount > 0 ? ws.correctCount / ws.seenCount : 0;
                if (accuracy < 0.5) score += 100;  // Weak words get boost

                return { ...v, score, reden: `Volgende review: ${daysUntil.toFixed(1)} dagen`, ws, daysUntilReview: daysUntil };
            });

            // Sort: due first, then by score
            gescoord.sort((a, b) => {
                // Due reviews first
                if ((a.daysUntilReview <= 0) && (b.daysUntilReview > 0)) return -1;
                if ((a.daysUntilReview > 0) && (b.daysUntilReview <= 0)) return 1;
                // Then by score
                return b.score - a.score;
            });

            return gescoord.slice(0, aantal);
        }
