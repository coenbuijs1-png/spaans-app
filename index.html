        // Rendert de interactieve oefensectie onderaan een les
        // Bouw les-oefeningen via DOM (geen inline onclick-strings met speciale tekens)
        function renderLesOefeningen(day) {
            // Deze oefendata is Spaans; in andere cursussen niets tonen
            if (typeof activeLangCode !== 'undefined' && activeLangCode !== 'es') return '';
            const invul = lesInvulOef[day] || [];
            const zinnen = lesZinOef[day] || [];
            const sim = lesSims[day] || null;
            const mini = lesMiniOef[day] || [];
            if (invul.length === 0 && zinnen.length === 0 && !sim && mini.length === 0) return '';

            window._lesDay = day;

            const hasInvul = invul.length > 0;
            const hasZin = zinnen.length > 0;
            const hasMini = mini.length > 0;

            let tabs = '';
            let firstActive = true;
            if (hasMini) { tabs += `<button class="les-oef-tab ${firstActive?'active':''}" data-panel="lop-mini">Mini oefeningen</button>`; firstActive = false; }
            if (hasInvul) { tabs += `<button class="les-oef-tab ${firstActive?'active':''}" data-panel="lop-invul">Invuloefening</button>`; firstActive = false; }
            if (hasZin) { tabs += `<button class="les-oef-tab ${firstActive?'active':''}" data-panel="lop-zinnen">Zinnen vertalen</button>`; firstActive = false; }
            if (sim) { tabs += `<button class="les-oef-tab ${firstActive?'active':''}" data-panel="lop-sim">Gesprekssimulator</button>`; firstActive = false; }

            // Mini exercises HTML
            let miniHTML = '';
            if (hasMini) {
                let miniContent = mini.map((oef, oi) => {
                    if (oef.type === 'meerkeuze') {
                        const vr = oef.vragen.map((v, vi) => {
                            const opts = v.opties.map((o, idx) =>
                                `<button class="mini-mc-opt" data-oef="${oi}" data-vraag="${vi}" data-idx="${idx}">${o}</button>`
                            ).join('');
                            return `<div class="mini-mc-vraag" id="miniMc${oi}_${vi}">
                                <div class="mini-mc-zin">${v.vraag}</div>
                                <div class="mini-mc-opts">${opts}</div>
                                <div class="mini-mc-fb" id="miniMcFb${oi}_${vi}"></div>
                            </div>`;
                        }).join('');
                        return `<div class="mini-oef-blok"><h4>${oef.titel}</h4>${vr}</div>`;
                    } else if (oef.type === 'koppel') {
                        const shuffledRight = [...oef.items].sort(() => Math.random() - 0.5);
                        const leftItems = oef.items.map((item, idx) =>
                            `<div class="koppel-item koppel-left" data-oef="${oi}" data-idx="${idx}" data-match="${item.right}">${item.left}</div>`
                        ).join('');
                        const rightItems = shuffledRight.map((item, idx) =>
                            `<div class="koppel-item koppel-right" data-oef="${oi}" data-ridx="${idx}" data-val="${item.right}">${item.right}</div>`
                        ).join('');
                        return `<div class="mini-oef-blok"><h4>${oef.titel}</h4>
                            <p style="opacity:0.7;font-size:0.9rem;margin-bottom:0.5rem;">Klik links, dan rechts om te koppelen.</p>
                            <div class="koppel-container" id="koppelWrap${oi}">
                                <div class="koppel-col">${leftItems}</div>
                                <div class="koppel-col">${rightItems}</div>
                            </div>
                            <div class="koppel-score" id="koppelScore${oi}"></div>
                        </div>`;
                    } else if (oef.type === 'woordzoeker') {
                        const vr = oef.vragen.map((v, vi) =>
                            `<div class="mini-wz-vraag" id="miniWz${oi}_${vi}">
                                <span class="mini-wz-hint">${v.hint} →</span>
                                <input class="mini-wz-input" id="miniWzInp${oi}_${vi}" placeholder="..." data-oef="${oi}" data-idx="${vi}">
                                <span class="mini-wz-fb" id="miniWzFb${oi}_${vi}"></span>
                            </div>`
                        ).join('');
                        return `<div class="mini-oef-blok"><h4>${oef.titel}</h4>${vr}</div>`;
                    } else if (oef.type === 'volgorde') {
                        const zinBlokken = oef.zinnen.map((z, zi) => {
                            const shuffled = [...z.woorden].sort(() => Math.random() - 0.5);
                            const tiles = shuffled.map(w =>
                                `<button class="volgorde-tile" data-oef="${oi}" data-zin="${zi}" data-word="${w}">${w}</button>`
                            ).join('');
                            return `<div class="volgorde-vraag" id="volgorde${oi}_${zi}">
                                <div class="volgorde-answer" id="volgordeAns${oi}_${zi}"></div>
                                <div class="volgorde-tiles" id="volgordeTiles${oi}_${zi}">${tiles}</div>
                                <div class="volgorde-fb" id="volgordeFb${oi}_${zi}"></div>
                            </div>`;
                        }).join('');
                        return `<div class="mini-oef-blok"><h4>${oef.titel}</h4>
                            <p style="opacity:0.7;font-size:0.9rem;margin-bottom:0.5rem;">Klik op de woorden in de juiste volgorde.</p>
                            ${zinBlokken}</div>`;
                    } else if (oef.type === 'foutzoeken') {
                        const zinBlokken = oef.zinnen.map((z, zi) => {
                            const words = z.zin.map((w, wi) =>
                                `<button class="foutzoek-word" data-oef="${oi}" data-zin="${zi}" data-idx="${wi}">${w}</button>`
                            ).join(' ');
                            return `<div class="foutzoek-vraag" id="foutzoek${oi}_${zi}">
                                <div class="foutzoek-zin">${words}</div>
                                <div class="foutzoek-fb" id="foutzoekFb${oi}_${zi}"></div>
                            </div>`;
                        }).join('');
                        return `<div class="mini-oef-blok"><h4>${oef.titel}</h4>
                            <p style="opacity:0.7;font-size:0.9rem;margin-bottom:0.5rem;">Klik op het woord dat fout is.</p>
                            ${zinBlokken}</div>`;
                    } else if (oef.type === 'luister') {
                        const zinBlokken = oef.zinnen.map((z, zi) =>
                            `<div class="luister-vraag" id="luister${oi}_${zi}">
                                <button class="luister-play" data-oef="${oi}" data-zin="${zi}">🔊</button>
                                <span class="luister-hint">(${z.hint})</span>
                                <input class="luister-input" id="luisterInp${oi}_${zi}" placeholder="Typ wat je hoort…">
                                <div class="luister-fb" id="luisterFb${oi}_${zi}"></div>
                            </div>`
                        ).join('');
                        return `<div class="mini-oef-blok"><h4>${oef.titel}</h4>
                            <p style="opacity:0.7;font-size:0.9rem;margin-bottom:0.5rem;">Luister en typ de zin.</p>
                            ${zinBlokken}</div>`;
                    } else if (oef.type === 'conjugatie') {
                        const conjTables = (oef.paradigmen || []).map((par, pi) => {
                            const rows = par.pronouns.map((pron, prIdx) => {
                                const isFilled = par.toFill && par.toFill.includes(prIdx);
                                const value = par.volledig[prIdx] || '';
                                const cellHtml = isFilled
                                    ? `<input class="conj-input" data-oef="${oi}" data-par="${pi}" data-pron="${prIdx}" placeholder="…">`
                                    : `<span style="opacity:0.8;">${value}</span>`;
                                return `<tr><td style="font-weight:600;">${pron}</td><td>${cellHtml}</td></tr>`;
                            }).join('');
                            return `
                                <div style="margin-bottom:1rem;">
                                    <p style="font-weight:600; margin-bottom:0.5rem;">${par.woord}</p>
                                    <table class="conj-table">
                                        <tbody>${rows}</tbody>
                                    </table>
                                </div>
                            `;
                        }).join('');
                        return `<div class="mini-oef-blok"><h4>${oef.titel}</h4>
                            <p style="opacity:0.7;font-size:0.9rem;margin-bottom:0.5rem;">Vul de ontbrekende vormen in. Enter = volgende cel.</p>
                            ${conjTables}
                            <button class="btn btn-sm conj-submit" data-oef="${oi}">Controleer</button>
                            <div class="conj-feedback" id="conjFb${oi}"></div>
                        </div>`;
                    } else if (oef.type === 'verhaal') {
                        const zinnen = (oef.zinnen || []).map((z, idx) =>
                            `<button class="verhaal-tile" data-oef="${oi}" data-idx="${idx}" id="verhaalTile${oi}_${idx}">${z.tekst}</button>`
                        ).join('');
                        return `<div class="mini-oef-blok"><h4>${oef.titel}</h4>
                            <p style="opacity:0.7;font-size:0.9rem;margin-bottom:0.5rem;">Zet de zinnen in de juiste volgorde om het verhaal te vormen.</p>
                            <div class="verhaal-answer" id="verhaalAns${oi}"></div>
                            <div class="verhaal-tiles" id="verhaalTiles${oi}">${zinnen}</div>
                            <div class="verhaal-fb" id="verhaalFb${oi}"></div>
                        </div>`;
                    }
                    return '';
                }).join('');
                miniHTML = `<div class="les-oef-panel active" id="lop-mini">
                    <p style="opacity:0.8;margin-bottom:1rem;">Snelle oefeningetjes bij deze les!</p>
                    ${miniContent}
                </div>`;
            }

            let invulHTML = '';
            if (hasInvul) {
                const rijen = invul.map((v, i) => {
                    const parts = v.zin.split('___');
                    return `<div class="invul-zin" id="invulRij${i}">
                        ${parts[0]}<input class="invul-input" id="invulInp${i}" data-idx="${i}" placeholder="…">${parts[1]||''}
                        <span class="invul-result" id="invulRes${i}"></span>
                    </div>`;
                }).join('');
                invulHTML = `
                    <div class="les-oef-panel ${!hasMini?'active':''}" id="lop-invul">
                        <p style="opacity:0.8;margin-bottom:1rem;">Vul het juiste Spaanse woord in. Enter of ✓ = controleer.</p>
                        <div id="invulForm">${rijen}</div>
                        <div style="margin-top:1rem;display:flex;gap:0.8rem;flex-wrap:wrap;">
                            <button class="btn btn-sm" id="invulAllesBtn">Controleer alles</button>
                            <button class="btn btn-sm" id="invulResetBtn" style="background:var(--deep-blue)">↺ Opnieuw</button>
                        </div>
                        <div id="invulScore" style="margin-top:1rem;font-weight:600;color:var(--terracotta);"></div>
                    </div>`;
            }

            let zinHTML = '';
            if (hasZin) {
                const blokken = zinnen.map((z, i) =>
                    `<div class="zin-blok">
                        <div class="zin-nl">🇳🇱 ${z.nl}</div>
                        <input class="zin-input" id="zinInp${i}" data-idx="${i}" placeholder="Typ de Spaanse vertaling…">
                        <div class="zin-feedback" id="zinFb${i}"></div>
                    </div>`
                ).join('');
                zinHTML = `
                    <div class="les-oef-panel ${!hasMini&&!hasInvul?'active':''}" id="lop-zinnen">
                        <p style="opacity:0.8;margin-bottom:1rem;">Vertaal naar het Spaans. Enter = controleer.</p>
                        ${blokken}
                        <button class="btn btn-sm" id="zinAllesBtn" style="margin-top:1rem;">Controleer alles</button>
                    </div>`;
            }

            let simHTML = '';
            if (sim) {
                simHTML = `
                    <div class="les-oef-panel ${!hasMini&&!hasInvul&&!hasZin?'active':''}" id="lop-sim">
                        <p style="opacity:0.8;margin-bottom:0.8rem;">Kies de juiste reactie in het gesprek.</p>
                        <div id="simChat" class="sim-chat"></div>
                        <div id="simOpties" class="sim-opties"></div>
                        <div class="sim-score" id="simScore"></div>
                        <button class="btn btn-sm" id="simOpnieuwBtn" style="margin-top:1rem;">↺ Opnieuw</button>
                    </div>`;
            }

            return `
                <div class="les-oef-wrap" id="lesOefWrap">
                    <h3 style="margin-top:0;">✍️ Interactief oefenen</h3>
                    <div class="les-oef-tabs">${tabs}</div>
                    ${miniHTML}${invulHTML}${zinHTML}${simHTML}
                </div>`;
        }

        // Bind alle event listeners voor les-oefeningen via DOM (geen inline onclick met speciale tekens)
        function bindLesOefelenEvents(day) {
            const invul = lesInvulOef[day] || [];
            const zinnen = lesZinOef[day] || [];
            const sim = lesSims[day] || null;

            // Tab switching
            document.querySelectorAll('#lesOefWrap .les-oef-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    const panelId = this.dataset.panel;
                    document.querySelectorAll('#lesOefWrap .les-oef-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('#lesOefWrap .les-oef-panel').forEach(p => p.classList.remove('active'));
                    this.classList.add('active');
                    const panel = document.getElementById(panelId);
                    if (panel) panel.classList.add('active');
                    if (panelId === 'lop-sim') startSim(day);
                });
            });

            // Invul: Enter controleert + springt naar volgende
            invul.forEach((v, i) => {
                const inp = document.getElementById(`invulInp${i}`);
                if (inp) inp.addEventListener('keydown', e => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        controleerInvul(i, v.blank, v.hint);
                        // Focus naar volgende input
                        const nextInp = document.getElementById(`invulInp${i + 1}`);
                        if (nextInp && !nextInp.disabled) nextInp.focus();
                    }
                });
            });
            const invulAlles = document.getElementById('invulAllesBtn');
            const invulReset = document.getElementById('invulResetBtn');
            if (invulAlles) invulAlles.addEventListener('click', () => controleerAlleInvul(day));
            if (invulReset) invulReset.addEventListener('click', () => resetInvul(day));

            // Zinnen: Enter
            zinnen.forEach((z, i) => {
                const inp = document.getElementById(`zinInp${i}`);
                if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') controleerZin(i, z.es, z.nl); });
            });
            const zinAlles = document.getElementById('zinAllesBtn');
            if (zinAlles) zinAlles.addEventListener('click', () => controleerAlleZinnen(day));

            // Sim opnieuw
            const simBtn = document.getElementById('simOpnieuwBtn');
            if (simBtn) simBtn.addEventListener('click', () => startSim(day));

            // Mini oefeningen events
            const mini = lesMiniOef[day] || [];
            mini.forEach((oef, oi) => {
                if (oef.type === 'meerkeuze') {
                    oef.vragen.forEach((v, vi) => {
                        document.querySelectorAll(`.mini-mc-opt[data-oef="${oi}"][data-vraag="${vi}"]`).forEach(btn => {
                            btn.addEventListener('click', function() {
                                const idx = parseInt(this.dataset.idx);
                                const fb = document.getElementById(`miniMcFb${oi}_${vi}`);
                                const parent = document.getElementById(`miniMc${oi}_${vi}`);
                                parent.querySelectorAll('.mini-mc-opt').forEach((b, bi) => {
                                    b.disabled = true;
                                    if (bi === v.correct) b.classList.add('mc-correct', 'bounce-in');
                                    else if (bi === idx && idx !== v.correct) b.classList.add('mc-fout');
                                    else b.style.opacity = '0.4';
                                });
                                if (idx === v.correct) awardXP(10, 'Meerkeuze goed');
                                fb.textContent = idx === v.correct ? '✅ Goed!' : '❌ Helaas, het juiste antwoord is gemarkeerd.';
                                fb.className = 'mini-mc-fb ' + (idx === v.correct ? 'ok' : 'nee');
                            });
                        });
                    });
                } else if (oef.type === 'koppel') {
                    const wrap = document.getElementById(`koppelWrap${oi}`);
                    if (wrap) {
                        let selectedLeft = null;
                        let matchCount = 0;
                        wrap.querySelectorAll('.koppel-left').forEach(el => {
                            el.addEventListener('click', function() {
                                if (this.classList.contains('koppel-done')) return;
                                wrap.querySelectorAll('.koppel-left').forEach(l => l.classList.remove('koppel-selected'));
                                this.classList.add('koppel-selected');
                                selectedLeft = this;
                            });
                        });
                        wrap.querySelectorAll('.koppel-right').forEach(el => {
                            el.addEventListener('click', function() {
                                if (!selectedLeft || this.classList.contains('koppel-done')) return;
                                const match = selectedLeft.dataset.match;
                                const val = this.dataset.val;
                                if (match === val) {
                                    selectedLeft.classList.add('koppel-done');
                                    this.classList.add('koppel-done');
                                    selectedLeft.classList.remove('koppel-selected');
                                    matchCount++;
                                    awardXP(8, 'Koppel goed');
                                    const score = document.getElementById(`koppelScore${oi}`);
                                    if (matchCount === oef.items.length && score) {
                                        score.textContent = '✅ Alles gekoppeld!';
                                        score.style.color = '#2d7a3a';
                                    }
                                } else {
                                    selectedLeft.classList.add('koppel-wrong');
                                    this.classList.add('koppel-wrong');
                                    setTimeout(() => {
                                        selectedLeft.classList.remove('koppel-wrong', 'koppel-selected');
                                        this.classList.remove('koppel-wrong');
                                    }, 600);
                                }
                                selectedLeft = null;
                            });
                        });
                    }
                } else if (oef.type === 'woordzoeker') {
                    oef.vragen.forEach((v, vi) => {
                        const inp = document.getElementById(`miniWzInp${oi}_${vi}`);
                        if (inp) {
                            inp.addEventListener('keydown', function(e) {
                                if (e.key === 'Enter') {
                                    const fb = document.getElementById(`miniWzFb${oi}_${vi}`);
                                    const result = checkAnswer(this.value, v.antwoord);
                                    this.disabled = true;
                                    if (result === 'correct') {
                                        fb.textContent = '✅';
                                        fb.className = 'mini-wz-fb ok';
                                        this.classList.add('correct-inp');
                                        awardXP(10, 'Woordzoeker goed');
                                    } else if (result === 'accent') {
                                        fb.textContent = `⚠️ (${v.antwoord})`;
                                        fb.className = 'mini-wz-fb ok';
                                        this.classList.add('correct-inp');
                                        awardXP(5, 'Woordzoeker bijna');
                                    } else {
                                        fb.innerHTML = `❌ ${v.antwoord}`;
                                        fb.className = 'mini-wz-fb nee';
                                        this.classList.add('fout-inp');
                                    }
                                }
                            });
                        }
                    });
                } else if (oef.type === 'volgorde') {
                    oef.zinnen.forEach((z, zi) => {
                        const tilesWrap = document.getElementById(`volgordeTiles${oi}_${zi}`);
                        const ansWrap = document.getElementById(`volgordeAns${oi}_${zi}`);
                        const fb = document.getElementById(`volgordeFb${oi}_${zi}`);
                        if (!tilesWrap || !ansWrap) return;
                        let done = false;
                        tilesWrap.querySelectorAll('.volgorde-tile').forEach(tile => {
                            tile.addEventListener('click', function() {
                                if (done) return;
                                this.classList.add('used');
                                const clone = document.createElement('button');
                                clone.className = 'volgorde-tile';
                                clone.textContent = this.textContent;
                                clone.dataset.srcWord = this.dataset.word;
                                clone.addEventListener('click', function() {
                                    if (done) return;
                                    const orig = tilesWrap.querySelector(`.volgorde-tile[data-word="${this.dataset.srcWord}"].used`);
                                    if (orig) orig.classList.remove('used');
                                    this.remove();
                                });
                                ansWrap.appendChild(clone);
                                if (ansWrap.children.length === z.woorden.length) {
                                    done = true;
                                    const answer = Array.from(ansWrap.children).map(t => t.textContent).join(' ');
                                    if (answer === z.correct) {
                                        fb.textContent = '✅ Correct!';
                                        fb.className = 'volgorde-fb ok bounce-in';
                                        ansWrap.classList.add('correct');
                                        awardXP(15, 'Volgorde goed');
                                    } else {
                                        fb.innerHTML = `❌ Juist: <strong>${z.correct}</strong>`;
                                        fb.className = 'volgorde-fb nee';
                                        ansWrap.classList.add('fout');
                                    }
                                }
                            });
                        });
                    });
                } else if (oef.type === 'foutzoeken') {
                    oef.zinnen.forEach((z, zi) => {
                        const vraag = document.getElementById(`foutzoek${oi}_${zi}`);
                        const fb = document.getElementById(`foutzoekFb${oi}_${zi}`);
                        if (!vraag) return;
                        let answered = false;
                        vraag.querySelectorAll('.foutzoek-word').forEach(word => {
                            word.addEventListener('click', function() {
                                if (answered) return;
                                answered = true;
                                const idx = parseInt(this.dataset.idx);
                                vraag.querySelectorAll('.foutzoek-word').forEach(w => { w.disabled = true; if (parseInt(w.dataset.idx) !== z.fout) w.classList.add('correct-woord'); });
                                if (idx === z.fout) {
                                    this.classList.add('fout-gevonden');
                                    fb.innerHTML = `✅ Goed! <strong>${z.zin[z.fout]}</strong> → <strong>${z.correctie}</strong> — <em>${z.uitleg}</em>`;
                                    fb.className = 'foutzoek-fb ok bounce-in';
                                    awardXP(12, 'Fout gevonden');
                                } else {
                                    this.classList.add('shake');
                                    const foutW = vraag.querySelector(`.foutzoek-word[data-idx="${z.fout}"]`);
                                    if (foutW) foutW.classList.add('fout-gevonden');
                                    fb.innerHTML = `❌ De fout was: <strong>${z.zin[z.fout]}</strong> → <strong>${z.correctie}</strong> — <em>${z.uitleg}</em>`;
                                    fb.className = 'foutzoek-fb nee';
                                }
                            });
                        });
                    });
                } else if (oef.type === 'luister') {
                    oef.zinnen.forEach((z, zi) => {
                        const playBtn = document.querySelector(`.luister-play[data-oef="${oi}"][data-zin="${zi}"]`);
                        const inp = document.getElementById(`luisterInp${oi}_${zi}`);
                        const fb = document.getElementById(`luisterFb${oi}_${zi}`);
                        if (playBtn) playBtn.addEventListener('click', () => spreekZin(z.zin));
                        if (inp) inp.addEventListener('keydown', function(e) {
                            if (e.key !== 'Enter' || this.disabled) return;
                            const result = checkAnswer(this.value, z.zin);
                            this.disabled = true;
                            if (result === 'correct') {
                                fb.textContent = '✅ Perfect!';
                                fb.className = 'luister-fb ok bounce-in';
                                this.classList.add('correct-inp');
                                awardXP(15, 'Luister goed');
                            } else if (result === 'accent') {
                                fb.innerHTML = `⚠️ Bijna! <strong>${z.zin}</strong>`;
                                fb.className = 'luister-fb ok';
                                this.classList.add('correct-inp');
                                awardXP(7, 'Luister bijna');
                            } else {
                                fb.innerHTML = `❌ <strong>${z.zin}</strong>`;
                                fb.className = 'luister-fb nee';
                                this.classList.add('fout-inp');
                                this.classList.add('shake');
                            }
                        });
                    });
                } else if (oef.type === 'conjugatie') {
                    const inputs = document.querySelectorAll(`.conj-input[data-oef="${oi}"]`);
                    const submitBtn = document.querySelector(`.conj-submit[data-oef="${oi}"]`);
                    const fb = document.getElementById(`conjFb${oi}`);

                    // Tab navigation
                    inputs.forEach((inp, idx) => {
                        inp.addEventListener('keydown', (e) => {
                            if (e.key === 'Tab') e.preventDefault();
                            if (e.key === 'Enter') {
                                if (idx < inputs.length - 1) inputs[idx + 1].focus();
                            }
                        });
                    });

                    // Submit button
                    if (submitBtn) submitBtn.addEventListener('click', () => {
                        let allCorrect = true;
                        let score = 0;

                        inputs.forEach((inp) => {
                            const oefIdx = parseInt(inp.dataset.oef);
                            const parIdx = parseInt(inp.dataset.par);
                            const pronIdx = parseInt(inp.dataset.pron);
                            const par = oef.paradigmen[parIdx];

                            if (!par) return;

                            const expected = par.volledig[pronIdx];
                            const result = checkAnswer(inp.value, expected);

                            if (result === 'correct' || result === 'accent') {
                                inp.classList.remove('conj-fout');
                                inp.classList.add('conj-correct');
                                score++;
                            } else {
                                inp.classList.remove('conj-correct');
                                inp.classList.add('conj-fout');
                                allCorrect = false;
                            }
                        });

                        submitBtn.disabled = true;
                        if (allCorrect && inputs.length > 0) {
                            fb.textContent = '✅ Perfect!';
                            fb.className = 'conj-feedback ok bounce-in';
                            awardXP(20, 'Conjugatie goed');
                        } else {
                            fb.innerHTML = `❌ ${score} / ${inputs.length} correct. Kijk goed naar de rode velden!`;
                            fb.className = 'conj-feedback nee';
                        }
                    });
                } else if (oef.type === 'verhaal') {
                    const ans = document.getElementById(`verhaalAns${oi}`);
                    const tiles = document.getElementById(`verhaalTiles${oi}`);
                    const fb = document.getElementById(`verhaalFb${oi}`);
                    let done = false;

                    tiles.querySelectorAll('.verhaal-tile').forEach(tile => {
                        tile.addEventListener('click', function() {
                            if (done) return;
                            const idx = parseInt(this.dataset.idx);

                            // Create sortable copy in answer area
                            const zin = oef.zinnen[idx];
                            const clone = document.createElement('div');
                            clone.className = 'verhaal-zin';
                            clone.textContent = zin.tekst;
                            clone.dataset.originalIdx = idx;
                            clone.dataset.correctIdx = zin.correct_idx || idx;
                            clone.addEventListener('click', (e) => {
                                e.stopPropagation();
                                if (done) return;
                                clone.remove();
                                this.classList.remove('used');
                                checkVerhaalComplete();
                            });

                            ans.appendChild(clone);
                            this.classList.add('used');
                            checkVerhaalComplete();
                        });
                    });

                    function checkVerhaalComplete() {
                        if (ans.children.length === oef.zinnen.length && !done) {
                            done = true;
                            const order = Array.from(ans.children).map(el => parseInt(el.dataset.originalIdx));
                            const expected = oef.zinnen.map((z, i) => z.correct_idx !== undefined ? z.correct_idx : i);
                            const isCorrect = JSON.stringify(order) === JSON.stringify(expected);

                            if (isCorrect) {
                                fb.textContent = '✅ Perfect verhaal!';
                                fb.className = 'verhaal-fb ok bounce-in';
                                ans.classList.add('verhaal-complete');
                                if (oef.context) {
                                    fb.innerHTML += `<div class="verhaal-complete" style="margin-top:1rem;"><strong>Verhaal:</strong><p>${oef.context}</p></div>`;
                                }
                                awardXP(18, 'Verhaal goed');
                            } else {
                                fb.textContent = '❌ Niet de juiste volgorde. Probeer opnieuw!';
                                fb.className = 'verhaal-fb nee shake';
                                done = false;
                                setTimeout(() => {
                                    Array.from(ans.children).forEach(el => el.remove());
                                    tiles.querySelectorAll('.verhaal-tile').forEach(t => t.classList.remove('used'));
                                }, 1200);
                            }
                        }
                    }
                }
            });
        }

        function controleerInvul(idx, correct, hint) {
            const inp = document.getElementById(`invulInp${idx}`);
            const res = document.getElementById(`invulRes${idx}`);
            if (!inp || inp.disabled) return;
            const result = checkAnswer(inp.value, correct);
            inp.disabled = true;
            if (result === 'correct') {
                inp.classList.add('correct-inp');
                res.textContent = '✅';
                res.className = 'invul-result ok';
                awardXP(10, 'Invuloefening goed');
            } else if (result === 'accent') {
                inp.classList.add('correct-inp');
                res.textContent = `⚠️ (${correct})`;
                res.className = 'invul-result ok';
                awardXP(5, 'Invul bijna goed');
            } else {
                inp.classList.add('fout-inp', 'shake');
                res.innerHTML = `❌ → <strong>${correct}</strong> <em style="font-size:0.82rem">(${hint})</em>`;
                res.className = 'invul-result nee';
                logError({ spanish: correct, meaning: hint, userAnswer: inp.value, correctAnswer: correct, exerciseType: 'invul' });
            }
        }

        function controleerAlleInvul(day) {
            const oef = lesInvulOef[day] || [];
            let goed = 0;
            oef.forEach((v, i) => {
                controleerInvul(i, v.blank, v.hint);
                const inp = document.getElementById(`invulInp${i}`);
                if (inp && inp.classList.contains('correct-inp')) goed++;
            });
            const score = document.getElementById('invulScore');
            if (score) score.textContent = `Score: ${goed} / ${oef.length}`;
        }

        function resetInvul(day) {
            const oef = lesInvulOef[day] || [];
            oef.forEach((_, i) => {
                const inp = document.getElementById(`invulInp${i}`);
                const res = document.getElementById(`invulRes${i}`);
                if (inp) { inp.value = ''; inp.disabled = false; inp.className = 'invul-input'; }
                if (res) { res.textContent = ''; res.className = 'invul-result'; }
            });
            const score = document.getElementById('invulScore');
            if (score) score.textContent = '';
        }

        function controleerZin(idx, correct, nl) {
            const inp = document.getElementById(`zinInp${idx}`);
            const fb = document.getElementById(`zinFb${idx}`);
            if (!inp || !fb || inp.disabled) return;
            // Zins-vergelijking: case-insensitive, diacritics-tolerant, trim interpunctie
            const strip = s => stripDiacritics(s.replace(/[¿¡.,!?]/g,'').trim().toLowerCase());
            const inp_s = strip(inp.value);
            const cor_s = strip(correct);
            inp.disabled = true;
            fb.classList.add('show');
            if (inp_s === cor_s) {
                fb.className = 'zin-feedback show ok';
                fb.textContent = '✅ Correct!';
                awardXP(15, 'Zinvertaling goed');
            } else if (inp_s === strip(inp.value) && inp.value.trim() !== '') {
                // Probeer losser: accenten negeren
                fb.className = 'zin-feedback show nee';
                fb.innerHTML = `❌ Antwoord: <strong>${correct}</strong>`;
            } else {
                fb.className = 'zin-feedback show nee';
                fb.innerHTML = `❌ Antwoord: <strong>${correct}</strong>`;
            }
        }

        let simDay = null;
        let simKlaar = false;

        function startSim(day) {
            simDay = day;
            simStap = 0;
            simScore = 0;
            simKlaar = false;
            const chat = document.getElementById('simChat');
            const opties = document.getElementById('simOpties');
            const score = document.getElementById('simScore');
            if (!chat) return;
            chat.innerHTML = '';
            opties.innerHTML = '';
            score.textContent = '';
            renderSimStap();
        }

        function renderSimStap() {
            const sim = lesSims[simDay];
            if (!sim) return;
            const chat = document.getElementById('simChat');
            const opties = document.getElementById('simOpties');

            if (simStap >= sim.stappen.length) {
                // Klaar
                opties.innerHTML = '';
                const sc = document.getElementById('simScore');
                if (sc) sc.textContent = `🎉 Klaar! Score: ${simScore} / ${sim.stappen.length}`;
                return;
            }

            const stap = sim.stappen[simStap];
            // Bot bericht met audio button
            const botDiv = document.createElement('div');
            botDiv.style.display = 'flex';
            botDiv.style.alignItems = 'center';
            botDiv.style.gap = '0.5rem';
            const botMsg = document.createElement('div');
            botMsg.className = 'sim-msg bot';
            botMsg.textContent = stap.bot;
            botMsg.style.flex = '1';
            const audioBtn = document.createElement('button');
            audioBtn.textContent = '🔊';
            audioBtn.title = 'Luister naar dit';
            audioBtn.style.background = 'none';
            audioBtn.style.border = 'none';
            audioBtn.style.cursor = 'pointer';
            audioBtn.style.fontSize = '1.2rem';
            audioBtn.onclick = () => spreekZin(stap.bot);
            botDiv.appendChild(botMsg);
            botDiv.appendChild(audioBtn);
            chat.appendChild(botDiv);

            // Hint
            const hintMsg = document.createElement('div');
            hintMsg.className = 'sim-msg hint';
            hintMsg.textContent = `💡 "${stap.hint}"`;
            chat.appendChild(hintMsg);

            chat.scrollTop = chat.scrollHeight;

            // Opties met audio buttons
            opties.innerHTML = stap.opties.map((opt, i) =>
                `<div style="display: flex; gap: 0.5rem; align-items: center;">
                    <button class="sim-opt" id="simOpt${i}" style="flex: 1;" onclick="kiesSim(${i})">${opt.tekst}</button>
                    <button style="background: none; border: none; cursor: pointer; font-size: 1rem; padding: 0.5rem;" id="audioBtn${i}" title="Spreek je antwoord in" onclick="speakSimResponse(${i})">🎤</button>
                 </div>`
            ).join('');
        }

        function speakSimResponse(idx) {
            const sim = lesSims[simDay];
            if (!sim || simKlaar || simStap >= sim.stappen.length) return;
            const stap = sim.stappen[simStap];
            const opt = stap.opties[idx];

            const btn = document.getElementById(`audioBtn${idx}`);
            if (btn) btn.disabled = true;

            startAudioRecording(
                (transcript) => {
                    if (btn) btn.disabled = false;
                    // Vergelijk transcript met verwacht antwoord
                    const expected = opt.tekst.toLowerCase().trim();
                    const received = transcript.toLowerCase().trim();

                    // Lenient matching: check of de transcript de juiste elementen bevat
                    const isCorrect = expected.includes(received) || received.includes(expected) ||
                                    checkAnswer(received, expected);

                    if (isCorrect === true || isCorrect === 'correct' || isCorrect === 'accent') {
                        // Treat audio response as choosing this option
                        kiesSim(idx);
                    } else {
                        // Show error
                        const chat = document.getElementById('simChat');
                        const fbMsg = document.createElement('div');
                        fbMsg.className = 'sim-msg hint';
                        fbMsg.style.color = '#c0392b';
                        fbMsg.textContent = `❌ Niet helemaal. Je zei: "${transcript}". Probeer: "${expected}"`;
                        chat.appendChild(fbMsg);
                        chat.scrollTop = chat.scrollHeight;
                    }
                },
                (error) => {
                    if (btn) btn.disabled = false;
                    console.warn('Audio error:', error);
                }
            );
        }

        function kiesSim(idx) {
            const sim = lesSims[simDay];
            if (!sim || simKlaar) return;
            const stap = sim.stappen[simStap];
            const gekozen = stap.opties[idx];
            const chat = document.getElementById('simChat');
            const opties = document.getElementById('simOpties');

            // Disable alle knoppen
            document.querySelectorAll('.sim-opt').forEach((b, i) => {
                b.disabled = true;
                if (stap.opties[i].correct) b.classList.add('correct-keuze');
                else if (i === idx && !gekozen.correct) b.classList.add('fout-keuze');
                else b.style.opacity = '0.5';
            });

            // User bericht in chat
            const userMsg = document.createElement('div');
            userMsg.className = 'sim-msg user';
            userMsg.textContent = gekozen.tekst;
            chat.appendChild(userMsg);

            // Feedback bericht
            const fbMsg = document.createElement('div');
            fbMsg.className = 'sim-msg hint';
            fbMsg.textContent = gekozen.uitleg;
            chat.appendChild(fbMsg);
            chat.scrollTop = chat.scrollHeight;

            if (gekozen.correct) { simScore++; awardXP(15, 'Sim correct'); }
            simStap++;

            setTimeout(() => {
                opties.innerHTML = '';
                renderSimStap();
            }, 1200);
        }

        // Thema zin controle
        function controleerThemaZin(idx, correct) {
            const inp = document.getElementById(`tzmInp${idx}`);
            const fb = document.getElementById(`tzmFb${idx}`);
            if (!inp || !fb || inp.disabled) return;
            const strip = s => stripDiacritics(s.replace(/[¿¡.,!?]/g,'').trim().toLowerCase());
            inp.disabled = true;
            fb.classList.add('show');
            if (strip(inp.value) === strip(correct)) {
                fb.className = 'zin-feedback show ok';
                fb.textContent = '✅ Correct!';
            } else {
                fb.className = 'zin-feedback show nee';
                fb.innerHTML = `❌ Antwoord: <strong>${correct}</strong>`;
            }
        }

        // =====================================================
        // FEATURE: WEB SPEECH API — Voorbeeldzinnen uitspreken
        // =====================================================
        function spreekZin(tekst) {
            if (!('speechSynthesis' in window)) return;
            speechSynthesis.cancel();
            const utt = new SpeechSynthesisUtterance(tekst);
            utt.lang = 'es-ES';
            utt.rate = 0.9;
            const voices = speechSynthesis.getVoices();
            const esVoice = voices.find(v => v.lang.startsWith('es'));
            if (esVoice) utt.voice = esVoice;
            speechSynthesis.speak(utt);
        }
        // Warm up voices list (some browsers need this)
        if ('speechSynthesis' in window) speechSynthesis.getVoices();

        // =====================================================
        // FEATURE: SPRAAKHERKENNING (Speech Recognition)
        // =====================================================
        let isRecording = false;
        let recognition = null;

        function initSpeechRecognition() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                console.warn('Speech Recognition niet ondersteund');
                return false;
            }
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'es-ES';
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
            return true;
        }

        function startAudioRecording(onResult, onError) {
            if (!recognition && !initSpeechRecognition()) {
                onError && onError('Speech Recognition not supported');
                return;
            }

            isRecording = true;
            let transcript = '';

            recognition.onstart = () => {
                isRecording = true;
            };

            recognition.onresult = (event) => {
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                isRecording = false;
                onResult && onResult(transcript);
            };

            recognition.onerror = (event) => {
                isRecording = false;
                onError && onError(event.error);
            };

            recognition.onend = () => {
                isRecording = false;
            };

            try {
                recognition.start();
            } catch (e) {
                console.warn('Error starting recognition:', e);
                onError && onError('Could not start recording');
            }
        }

        function stopAudioRecording() {
            if (recognition && isRecording) {
                recognition.stop();
                isRecording = false;
            }
        }

        // FEATURE: KOPIEERKNOP
        // =====================================================
        function kopieerZin(tekst, btn) {
            navigator.clipboard.writeText(tekst).then(() => {
                const orig = btn.textContent;
                btn.textContent = '✅';
                btn.classList.add('copied');
                setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1200);
            });
        }

        let totalXP = 0;

        function loadXP() {
            try { totalXP = parseInt(localStorage.getItem('xp_total') || '0'); } catch(e) {}
        }
        function saveXP() {
            try { localStorage.setItem('xp_total', totalXP); } catch(e) {}
        }
        function getLevel() {
            let lvl = XP_LEVELS[0];
            for (const l of XP_LEVELS) { if (totalXP >= l.min) lvl = l; }
            return lvl;
        }
        function getNextLevel() {
            const cur = getLevel();
            const idx = XP_LEVELS.indexOf(cur);
            return idx < XP_LEVELS.length - 1 ? XP_LEVELS[idx + 1] : null;
        }
        function updateXPDisplay() {
            const lvl = getLevel();
            const next = getNextLevel();
            document.getElementById('xpLevel').textContent = lvl.naam;
            document.getElementById('xpLabel').textContent = totalXP + ' XP';
            if (next) {
                const progress = ((totalXP - lvl.min) / (next.min - lvl.min)) * 100;
                document.getElementById('xpFill').style.width = Math.min(progress, 100) + '%';
            } else {
                document.getElementById('xpFill').style.width = '100%';
            }
        }
        // ===== Daily Goal Ring helpers =====
        const DAILY_GOAL_KEY  = 'duocoengo_daily_goal';
        const DAILY_GOAL_DEFAULT = 30;
        function _todayKey() { return 'xp_day_' + new Date().toISOString().slice(0,10); }
        function getTodayXP()   { try { return parseInt(localStorage.getItem(_todayKey()) || '0'); } catch(e) { return 0; } }
        function setTodayXP(n)  { try { localStorage.setItem(_todayKey(), String(n)); } catch(e) {} }
        function getDailyGoal() { try { return parseInt(localStorage.getItem(DAILY_GOAL_KEY) || String(DAILY_GOAL_DEFAULT)); } catch(e) { return DAILY_GOAL_DEFAULT; } }
        function setDailyGoal(n){ try { localStorage.setItem(DAILY_GOAL_KEY, String(n)); } catch(e) {} updateDailyStrip(); }
        function addTodayXP(n)  { setTodayXP(getTodayXP() + (n || 0)); updateDailyStrip(); }
        function updateDailyStrip() {
            const todayXP = getTodayXP();
            const goal    = getDailyGoal();
            const pct     = Math.min(100, Math.round((todayXP / goal) * 100));
            const ring    = document.getElementById('dailyRingFg');
            const xpEl    = document.getElementById('dailyXpVal');
            const strkEl  = document.getElementById('dailyStreakVal');
            const totEl   = document.getElementById('totalXpVal');
            const chip    = document.getElementById('dailyGoalChip');
            if (ring) ring.style.strokeDasharray = `${(pct / 100) * 99.9} 100`;
            if (xpEl) xpEl.textContent = `${todayXP}/${goal}`;
            if (strkEl) strkEl.textContent = (typeof streakCount !== 'undefined') ? streakCount : 0;
            if (totEl)  totEl.textContent  = (typeof totalXP !== 'undefined') ? totalXP : 0;
            if (chip) chip.classList.toggle('completed', pct >= 100);
            // Celebrate goal completion once per day
            const celebKey = 'goal_celebrated_' + new Date().toISOString().slice(0,10);
            if (pct >= 100 && !sessionStorage.getItem(celebKey)) {
                sessionStorage.setItem(celebKey, '1');
                if (typeof launchConfetti === 'function') launchConfetti();
            }
        }

        function awardXP(amount, label) {
            const oldLevel = getLevel().naam;
            totalXP += amount;
            addTodayXP(amount);
            saveXP();
            updateXPDisplay();
            // Popup
            const popup = document.getElementById('xpPopup');
            popup.textContent = `+${amount} XP — ${label}`;
            popup.classList.add('show');
            setTimeout(() => popup.classList.remove('show'), 2000);
            // Level up check
            if (getLevel().naam !== oldLevel) {
                setTimeout(() => launchConfetti(), 500);
            }
            // Streak update (first activity of the day)
            updateStreak();
        }

        // =====================================================
        // FEATURE: STREAKS (dagelijkse reeks)
        // =====================================================
        let streakCount = 0, streakBest = 0, streakLastDate = '';

        function loadStreak() {
            try {
                streakCount = parseInt(localStorage.getItem('streak_count') || '0');
                streakBest = parseInt(localStorage.getItem('streak_best') || '0');
                streakLastDate = localStorage.getItem('streak_last_date') || '';
            } catch(e) {}
            checkStreakValidity();
            updateStreakDisplay();
        }
        function checkStreakValidity() {
            if (!streakLastDate) return;
            const today = new Date().toDateString();
            const last = new Date(streakLastDate).toDateString();
            if (today === last) return; // already counted today
            const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
            if (last !== yesterday.toDateString()) {
                // Streak broken
                streakCount = 0;
            }
        }
        function updateStreak() {
            const today = new Date().toDateString();
            if (streakLastDate === today) return; // already counted
            const last = streakLastDate ? new Date(streakLastDate).toDateString() : '';
            const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
            if (last === yesterday.toDateString()) {
                streakCount++;
            } else if (last !== today) {
                streakCount = 1;
            }
            streakLastDate = today;
            if (streakCount > streakBest) streakBest = streakCount;
            try {
                localStorage.setItem('streak_count', streakCount);
                localStorage.setItem('streak_best', streakBest);
                localStorage.setItem('streak_last_date', streakLastDate);
            } catch(e) {}
            updateStreakDisplay();
        }
        function updateStreakDisplay() {
            const badge = document.getElementById('streakBadge');
            const countEl = document.getElementById('streakCount');
            if (streakCount > 0) {
                badge.style.display = 'inline-flex';
                countEl.textContent = streakCount;
            } else {
                badge.style.display = 'none';
            }
        }

        // =====================================================
        // FEATURE: CONFETTI-ANIMATIE
        // =====================================================
        function launchConfetti() {
            const canvas = document.getElementById('confettiCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const colors = ['#c0392b', '#e67e22', '#f1c40f', '#27ae60', '#2980b9', '#8e44ad'];
            const pieces = [];
            for (let i = 0; i < 120; i++) {
                pieces.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height * -1,
                    w: Math.random() * 10 + 5,
                    h: Math.random() * 6 + 3,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    vy: Math.random() * 3 + 2,
                    vx: (Math.random() - 0.5) * 4,
                    rot: Math.random() * 360,
                    rv: (Math.random() - 0.5) * 10,
                });
            }
            let frames = 0;
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let active = false;
                for (const p of pieces) {
                    if (p.y > canvas.height + 20) continue;
                    active = true;
                    p.x += p.vx; p.y += p.vy; p.rot += p.rv; p.vy += 0.05;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate((p.rot * Math.PI) / 180);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                    ctx.restore();
                }
                frames++;
                if (active && frames < 180) requestAnimationFrame(draw);
                else ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
            requestAnimationFrame(draw);
        }

        // =====================================================
        // FEATURE: EIGEN WOORDENLIJST (ster-icoon)

        let starredWords = new Set();

        function loadStarred() {
            try {
                const data = localStorage.getItem('starred_words');
                if (data) starredWords = new Set(JSON.parse(data));
            } catch(e) {}
        }
        function saveStarred() {
            try { localStorage.setItem('starred_words', JSON.stringify(Array.from(starredWords))); } catch(e) {}

        function toggleStar(word, btn) {
            if (starredWords.has(word)) {
                starredWords.delete(word);
                btn.classList.remove('starred');
                btn.textContent = '☆';
            } else {
                starredWords.add(word);
                btn.classList.add('starred', 'celebrate-star');
                btn.textContent = '★';
                setTimeout(() => btn.classList.remove('celebrate-star'), 500);
            }
            saveStarred();
        }

        // =====================================================
        // FEATURE: TOETSENBORD-FIRST BEDIENING
        // =====================================================
        document.addEventListener('keydown', function(e) {
            // Don't intercept when typing in an input/textarea/contenteditable
            const tag = (e.target && e.target.tagName) || '';
            const ae = document.activeElement;
            const aeTag = (ae && ae.tagName) || '';
            const isTypingTarget = (tag === 'INPUT' || tag === 'TEXTAREA' || (e.target && e.target.isContentEditable));
            const isTypingActive = (aeTag === 'INPUT' || aeTag === 'TEXTAREA' || (ae && ae.isContentEditable));
            if (isTypingTarget || isTypingActive) return;

            // Don't intercept when an exercise session is open
            const sessionOpen = document.getElementById('sessionOverlay')?.classList.contains('open');
            if (sessionOpen) return;

            // D = toggle dark mode
            if (e.key === 'd' || e.key === 'D') { toggleDarkMode(); return; }

            // 1-4 = switch tabs
            const tabMap = { '1': 'lessen', '2': 'voortgang', '3': 'oefenen', '4': 'themas' };
            if (tabMap[e.key]) { switchTab(tabMap[e.key]); return; }

            // ← → = previous / next lesson — alleen op het lessen-tabblad
            const onLessen = document.getElementById('lessen-tab')?.classList.contains('active');
            if (!onLessen) return;
            if (e.key === 'ArrowLeft' && currentDay > 1) { loadLesson(currentDay - 1); return; }
            if (e.key === 'ArrowRight' && currentDay < getAllDays().length) { loadLesson(currentDay + 1); return; }
        });

        // =====================================================
        // INJECT SPEAK/COPY/STAR INTO LESSON CONTENT
        // =====================================================
        // Called after lesson HTML is rendered
        function injectLessonButtons() {
            // Add speak & copy buttons to .example-spanish elements
            document.querySelectorAll('#lessonContent .example-spanish').forEach(el => {
                const tekst = el.textContent.trim();
                if (!el.querySelector('.speak-btn')) {
                    const speakBtn = document.createElement('button');
                    speakBtn.className = 'speak-btn'; speakBtn.textContent = '🔊';
                    speakBtn.title = 'Uitspreken';
                    speakBtn.addEventListener('click', () => spreekZin(tekst));
                    el.appendChild(speakBtn);

                    const copyBtn = document.createElement('button');
                    copyBtn.className = 'copy-btn'; copyBtn.textContent = '📋';
                    copyBtn.title = 'Kopieer';
                    copyBtn.addEventListener('click', function() { kopieerZin(tekst, this); });
                    el.appendChild(copyBtn);
                }
            });

            // Add star buttons to .vocab-item elements
            document.querySelectorAll('#lessonContent .vocab-item').forEach(el => {
                const wordEl = el.querySelector('.vocab-word');
                if (!wordEl || el.querySelector('.star-btn')) return;
                const word = wordEl.textContent.trim();
                const starBtn = document.createElement('button');
                starBtn.className = 'star-btn' + (starredWords.has(word) ? ' starred' : '');
                starBtn.textContent = starredWords.has(word) ? '★' : '☆';
                starBtn.title = 'Bewaar in mijn woordenlijst';
                starBtn.addEventListener('click', function() { toggleStar(word, this); });
                el.appendChild(starBtn);
            });
        }

        // loadProgressOverview already includes gamification stats (see original function)
